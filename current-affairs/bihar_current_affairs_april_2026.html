<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bihar Current Affairs April 2026 — BPSC/UPSC Comprehensive Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0f1a;
    }
    .whitespace-keep { white-space: normal; word-break: keep-all; overflow-wrap: break-word; }
    @media (max-width: 640px) {
      .mobile-stack { flex-direction: column !important; }
      .mobile-full { width: 100% !important; }
      .mobile-text-sm { font-size: 0.75rem !important; }
      .mobile-p-2 { padding: 0.5rem !important; }
    }
    .glow-card:hover {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }
    .gradient-top {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    }
    .gradient-card-1 { background: linear-gradient(145deg, #1e293b, #0f172a); }
    .gradient-card-2 { background: linear-gradient(145deg, #1c1917, #0f172a); }
    .gradient-card-3 { background: linear-gradient(145deg, #0f1a1f, #0f172a); }
    .gradient-card-4 { background: linear-gradient(145deg, #1a0f1f, #0f172a); }

    .hl-dynasty { color: #fbbf24; font-weight: 600; }
    .hl-ruler { color: #60a5fa; font-weight: 600; }
    .hl-date { color: #a78bfa; font-weight: 500; }
    .hl-policy { color: #34d399; font-weight: 600; }
    .hl-event { color: #fb923c; font-weight: 600; }
    .hl-term { color: #2dd4bf; font-weight: 600; }
    .hl-place { color: #a3e635; font-weight: 500; }
    .hl-num { color: #c084fc; font-weight: 600; }

    .hl-bg-dynasty { background: rgba(251, 191, 36, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-ruler { background: rgba(96, 165, 250, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-date { background: rgba(167, 139, 250, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-policy { background: rgba(52, 211, 153, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-event { background: rgba(251, 146, 60, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-term { background: rgba(45, 212, 191, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-place { background: rgba(163, 227, 53, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-num { background: rgba(192, 132, 252, 0.15); padding: 0 4px; border-radius: 3px; }

    .section-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      .section-heading { font-size: 1rem; }
    }
    .subsection-heading {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      margin-top: 1rem;
    }
    @media (max-width: 640px) {
      .subsection-heading { font-size: 0.9rem; }
    }

    .content-text {
      font-size: 0.9rem;
      line-height: 1.75;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }
    @media (max-width: 640px) {
      .content-text { font-size: 0.8rem; line-height: 1.6; }
    }

    .bullet-list {
      list-style: none;
      padding-left: 1rem;
    }
    .bullet-list li {
      position: relative;
      padding-left: 1.25rem;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    @media (max-width: 640px) {
      .bullet-list li { font-size: 0.78rem; }
    }
    .bullet-list li::before {
      content: '\f111';
      font-family: 'Font Awesome 6 Free';
      font-weight: 400;
      position: absolute;
      left: 0;
      top: 0.35rem;
      font-size: 0.4rem;
      color: #6366f1;
    }

    .timeline-item {
      border-left: 2px solid #6366f1;
      padding-left: 1rem;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #818cf8;
    }
    .timeline-year {
      color: #a78bfa;
      font-weight: 700;
      font-size: 0.85rem;
    }
    @media (max-width: 640px) {
      .timeline-year { font-size: 0.78rem; }
    }

    .fact-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(168,85,247,0.08));
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
    }
    .fact-box-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #818cf8;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .fact-box-content {
      font-size: 0.82rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    @media (max-width: 640px) {
      .fact-box-content { font-size: 0.75rem; }
    }

    .table-wrap {
      overflow-x: auto;
      margin: 0.75rem 0;
    }
    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    @media (max-width: 640px) {
      .table-wrap table { font-size: 0.72rem; }
    }
    .table-wrap th {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid rgba(99,102,241,0.3);
      font-weight: 600;
    }
    .table-wrap td {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #94a3b8;
    }
    .table-wrap tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .ca-badge {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.025em;
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen">

<div id="app" class="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>

      { q: "What is the land rate for semiconductor projects under the new policy?", a: "₹<span class='hl-num hl-bg-num'>1</span>/acre per ₹<span class='hl-num'>100</span> crore project investment" },
      { q: "What is the last date for application under Bihar Paan Vikas Yojana 2026?", a: "<span class='hl-date hl-bg-date'>20 April 2026</span>" },
      { q: "What subsidy is offered under Bihar Paan Vikas Yojana 2026?", a: "<span class='hl-num'>50%</span> subsidy up to ₹<span class='hl-num hl-bg-num'>35,250</span>" },
      { q: "How many holidays were confirmed in the Bihar School Holiday Calendar 2026 on 24 April?", a: "<span class='hl-num hl-bg-num'>75</span> holidays for the academic year" }
    ];

    mcqs.forEach((m, i) => {
      html += `<div class="mb-3 p-3 rounded-lg ${i % 2 === 0 ? 'bg-black/30' : 'bg-indigo-900/10'} border border-gray-700/30">`;
      html += `<p class="text-sm sm:text-base text-slate-200 font-medium"><span class="text-indigo-400 font-bold">Q${i+1}.</span> ${m.q}</p>`;
      html += `<p class="text-xs sm:text-sm text-slate-400 mt-1"><span class="text-emerald-400 font-semibold">Ans:</span> ${m.a}</p>`;
      html += `</div>`;
    });

    html += `</div></section>`;

    // ===== FOOTER =====
    html += `<div class="text-center py-4 sm:py-6 border-t border-gray-800 mt-4 sm:mt-6">
      <p class="text-[10px] sm:text-xs text-gray-600">
        <i class="fa-regular fa-copyright mr-1"></i> 2026 Bihar Current Affairs — April 2026 BPSC/UPSC Comprehensive Notes
      </p>
      <p class="text-[10px] text-gray-700 mt-1">Compiled from official Bihar government releases, PIB, and major news sources. For competitive exam preparation only.</p>
    </div>`;

    app.innerHTML = html;
  });
</script>
