<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {

    }
    .whitespace-keep { white-space: normal; word-break: keep-all; overflow-wrap: break-word; }
    @media (max-width: 640px) {
      .mobile-stack { flex-direction: column !important; }
      .mobile-full { width: 100% !important; }
      .mobile-text-sm { font-size: 0.75rem !important; }
      .mobile-p-2 { padding: 0.5rem !important; }

    .glow-card:hover {

    .gradient-top {

    .gradient-card-3 { background: linear-gradient(145deg, #0f1a1f, #0f172a); }

    .hl-ruler { color: #60a5fa; font-weight: 600; }
    .hl-date { color: #a78bfa; font-weight: 500; }
    .hl-policy { color: #34d399; font-weight: 600; }
    .hl-event { color: #fb923c; font-weight: 600; }
    .hl-term { color: #2dd4bf; font-weight: 600; }
    .hl-place { color: #a3e635; font-weight: 500; }
    .hl-num { color: #c084fc; font-weight: 600; }

    .hl-bg-dynasty { background: rgba(251, 191, 36, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-ruler { background: rgba(96, 165, 250, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-date { background: rgba(167, 139, 250, 0.15); padding: 0 4px; border-radius: 3px; }
    .hl-bg-policy { background: rgba(52, 211, 153, 0.15); padding: 0 4px; border-radius: 3px; }

      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;

      font-size: 1.05rem;
      font-weight: 600;

      color: #cbd5e1;
      margin-bottom: 0.5rem;
    }
    @media (max-width: 640px) {
      .content-text { font-size: 0.8rem; line-height: 1.6; }
    }

    .bullet-list {
      list-style: none;
      padding-left: 1rem;
    }
    .bullet-list li {
      position: relative;
      padding-left: 1.25rem;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    @media (max-width: 640px) {
      .bullet-list li { font-size: 0.78rem; }
    }
    .bullet-list li::before {
      content: '\f111';
      font-family: 'Font Awesome 6 Free';
      font-weight: 400;
      position: absolute;
      left: 0;
      top: 0.35rem;
      font-size: 0.4rem;
      color: #6366f1;
    }

    .timeline-item {
      border-left: 2px solid #6366f1;
      padding-left: 1rem;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #818cf8;

      color: #a78bfa;

      font-size: 0.85rem;
    }
    @media (max-width: 640px) {
      .timeline-year { font-size: 0.78rem; }

      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;

    .fact-box-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #818cf8;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;

      color: #94a3b8;
      line-height: 1.6;
    }

      overflow-x: auto;

      width: 100%;

      font-size: 0.82rem;

      .table-wrap table { font-size: 0.72rem; }

    }

    }

      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.025em;
    }

</head>
