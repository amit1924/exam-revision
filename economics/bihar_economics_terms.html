<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPSC Economics — 100+ Essential Economic Terms</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #e0e6f0;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    .term-card {
      background: linear-gradient(145deg, #131a2e, #0d1220);
      border-radius: 1rem;
      padding: 1.25rem;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .term-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      border-radius: 4px 0 0 4px;
      transition: height 0.3s ease;
    }
    .term-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.2);
    }
    .term-card:hover::before { height: 100%; }

    .cat-micro::before { background: #60a5fa; }
    .cat-micro { border-left: 4px solid #60a5fa; }
    .cat-macro::before { background: #f59e0b; }
    .cat-macro { border-left: 4px solid #f59e0b; }
    .cat-banking::before { background: #10b981; }
    .cat-banking { border-left: 4px solid #10b981; }
    .cat-international::before { background: #8b5cf6; }
    .cat-international { border-left: 4px solid #8b5cf6; }
    .cat-public::before { background: #ec4899; }
    .cat-public { border-left: 4px solid #ec4899; }
    .cat-development::before { background: #14b8a6; }
    .cat-development { border-left: 4px solid #14b8a6; }

    .term-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.3s ease;
      opacity: 0;
      margin-top: 0;
    }
    .term-card.active .term-details {
      max-height: 2000px;
      opacity: 1;
      margin-top: 1rem;
    }
    .term-card.active .expand-icon {
      transform: rotate(180deg);
    }
    .expand-icon {
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .info-box {
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      margin: 0.5rem 0;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .info-box.formula-box {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: #93c5fd;
    }
    .info-box.example-box {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #6ee7b7;
    }
    .info-box.mnemonic-box {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: #fde68a;
    }
    .info-box.funfact-box {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: #c4b5fd;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.7rem;
      border-radius: 9999px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .cat-filter-btn {
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #94a3b8;
      cursor: pointer;
      white-space: nowrap;
    }
    .cat-filter-btn:hover {
      background: rgba(99,102,241,0.12);
      border-color: rgba(99,102,241,0.3);
      color: #e2e8f0;
    }
    .cat-filter-btn.active {
      background: rgba(99,102,241,0.2);
      border-color: #6366f1;
      color: #fff;
      box-shadow: 0 0 20px rgba(99,102,241,0.15);
    }

    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 0.65rem 1.25rem 0.65rem 2.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: all 0.3s ease;
    }
    .search-input:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 25px rgba(99,102,241,0.08);
    }
    .search-input::placeholder { color: #475569; }

    .scroll-reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .scroll-reveal.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .gradient-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    }

    .stats-number {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @media (max-width: 640px) {
      .term-card { padding: 1rem; }
      .info-box { font-size: 0.75rem; padding: 0.6rem 0.75rem; }
      .cat-filter-btn { font-size: 0.7rem; padding: 0.35rem 0.7rem; }
      .search-input { font-size: 0.82rem; padding: 0.55rem 1rem 0.55rem 2.4rem; }
      .stats-number { font-size: 1.2rem; }
    }
  </style>
</head>
<body class="min-h-screen">

<div id="app" class="max-w-7xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');
    let html = '';

    // ======================= DATA =======================
    const terms = [
      // ===== MICROECONOMICS =====
      {
        id: 1, term: 'Demand', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Quantity of a good or service that consumers are willing and able to purchase at various prices during a given period.',
        formula: 'D = f(P, Y, T, Ps, Pc, E) — Demand is a function of Price, Income, Tastes, Prices of Substitutes, Prices of Complements, and Expectations.',
        example: 'When smartphone prices drop during Diwali sales, demand increases significantly as more people can afford them.',
        mnemonic: 'D = Desire + Ability to Pay. Without both, it\'s just a wish!',
        funfact: 'The word "demand" comes from Latin "demandare" meaning "to entrust" — but in economics, it\'s all about willingness & ability!'
      },
      {
        id: 2, term: 'Law of Demand', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Other things being equal, as the price of a good increases, quantity demanded decreases, and vice versa — an inverse relationship.',
        formula: 'P ↑ → Qd ↓  |  P ↓ → Qd ↑  (ceteris paribus)',
        example: 'If the price of samosas rises from \u20b910 to \u20b915, you will likely buy fewer samosas per visit.',
        mnemonic: 'Law of Demand = Price up, Demand down. Think: "P高高的, D低低的" (Price high, Demand low).',
        funfact: 'The Law of Demand was popularized by Alfred Marshall in 1890 — but Ibn Khaldun discussed it in the 14th century!'
      },
      {
        id: 3, term: 'Supply', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Quantity of a good or service that producers are willing and able to offer for sale at various prices during a given period.',
        formula: 'S = f(P, C, T, N, G) — Supply depends on Price, Cost of inputs, Technology, Number of firms, and Government policy.',
        example: 'A wheat farmer supplies more wheat when market prices rise because higher prices mean higher profits.',
        mnemonic: 'S = Producers willing to SELL at different prices. More price = More supply!',
        funfact: 'Supply curves always slope UPWARD — unlike demand, producers love higher prices!'
      },
      {
        id: 4, term: 'Law of Supply', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Other things being equal, as the price of a good increases, quantity supplied increases — a direct relationship.',
        formula: 'P ↑ → Qs ↑  |  P ↓ → Qs ↓  (ceteris paribus)',
        example: 'When gold prices hit \u20b97,500/gram, jewellers ramp up production and recycling of old gold.',
        mnemonic: 'Law of Supply = Price up, Supply up. Producers are happy when prices are high!',
        funfact: 'The supply curve can occasionally bend backwards (backward-bending supply curve for labor).'
      },
      {
        id: 5, term: 'Equilibrium Price', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The price at which quantity demanded equals quantity supplied — where the demand and supply curves intersect — also called market-clearing price.',
        formula: 'Qd = Qs at equilibrium price P*',
        example: 'If ₹50/kg is the price where buyers want exactly 1000 kg of rice and farmers supply exactly 1000 kg, ₹50 is the equilibrium price.',
        mnemonic: 'Equilibrium = Equal Demand & Supply. "EQ" = Equal!',
        funfact: 'At equilibrium price, there is neither a shortage (excess demand) nor a surplus (excess supply). Perfect balance!'
      },
      {
        id: 6, term: 'Elasticity of Demand', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Measures how responsive quantity demanded is to a change in price. If demand changes a lot when price changes, demand is elastic.',
        formula: 'Ed = %ΔQd / %ΔP  |  Ed > 1 = Elastic, Ed < 1 = Inelastic, Ed = 1 = Unit Elastic',
        example: 'Demand for luxury cars is elastic — a 10% price rise can cause a 20% drop in sales. Demand for salt is inelastic.',
        mnemonic: 'Elastic = "Ela" — stretches easily like a rubber band. Inelastic = rigid, doesn\'t stretch!',
        funfact: 'Addictive goods like cigarettes have very inelastic demand — even huge price hikes barely reduce consumption.'
      },
      {
        id: 7, term: 'Elasticity of Supply', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Measures how responsive quantity supplied is to a change in price. Producers can increase supply quickly if supply is elastic.',
        formula: 'Es = %ΔQs / %ΔP  |  Es > 1 = Elastic Supply, Es < 1 = Inelastic Supply',
        example: 'Supply of street food is elastic (can quickly make more), but supply of agricultural land is perfectly inelastic.',
        mnemonic: 'Elastic Supply = "Easy to increase". Think: manufacturing = elastic, mining = inelastic.',
        funfact: 'Time period matters greatly — supply is more elastic in the long run than in the short run (Marshall\'s period analysis).'
      },
      {
        id: 8, term: 'Consumer Surplus', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The difference between what a consumer is willing to pay and what they actually pay. The "extra satisfaction" received for free.',
        formula: 'CS = Willingness to Pay — Actual Price Paid  |  Area below demand curve and above price',
        example: 'You\'d pay ₹100 for a pizza but get it for ₹80 — your consumer surplus is ₹20 of happiness!',
        mnemonic: 'Consumer Surplus = "Bachat" (savings) — you got more than you paid for!',
        funfact: 'Consumer surplus is highest in competitive markets where prices are driven down to marginal cost.'
      },
      {
        id: 9, term: 'Producer Surplus', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The difference between what a producer receives and the minimum price they would accept. Extra revenue above cost.',
        formula: 'PS = Actual Price Received — Minimum Willingness to Sell  |  Area above supply curve and below price',
        example: 'A farmer would sell wheat at ₹2,000/quintal minimum but gets ₹2,500 — surplus of ₹500/quintal.',
        mnemonic: 'Producer Surplus = "Labh" (profit) — seller got more than expected!',
        funfact: 'Total surplus (CS + PS) measures the overall welfare created by a market — the "invisible hand" at work!'
      },
      {
        id: 10, term: 'Marginal Utility', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The additional satisfaction a consumer gets from consuming one more unit of a good or service.',
        formula: 'MU = ΔTotal Utility / ΔQuantity  |  MU = TUₙ — TUₙ₋₁',
        example: 'Your 1st slice of pizza gives immense joy (high MU), but the 5th slice gives very little extra satisfaction.',
        mnemonic: 'Marginal = "Extra". MU = Extra happiness from one more unit. First slice = heaven, sixth slice = regret!',
        funfact: 'Marginal Utility can even become negative — eating that 7th pizza slice when full!'
      },
      {
        id: 11, term: 'Diminishing Marginal Utility', cat: 'Microeconomics', catClass: 'micro',
        definition: 'As a consumer consumes more units of a good, the additional satisfaction from each extra unit decreases. The first gives the most joy.',
        formula: 'MU₁ > MU₂ > MU₃ > ... > MUn  |  Each successive unit gives less satisfaction',
        example: 'First sip of cold drink on a hot day = bliss. Third glass = meh. Fourth = unnecessary.',
        mnemonic: 'Diminishing = "Ghategi" (decreases). Each extra unit = less happiness. Think: "first bite best bite"!',
        funfact: 'This law is also called "Gossen\'s First Law" — discovered by Hermann Heinrich Gossen in 1854.'
      },
      {
        id: 12, term: 'Indifference Curve', cat: 'Microeconomics', catClass: 'micro',
        definition: 'A curve showing combinations of two goods that give a consumer equal satisfaction. The consumer is "indifferent" between them.',
        formula: 'IC: U(x, y) = constant  |  Slope = MRSxy = MUx/MUy',
        example: 'You are equally happy with either 4 apples + 2 bananas or 2 apples + 5 bananas — both points lie on the same IC.',
        mnemonic: 'Indifference = "Koi fark nahi padta" — all combinations give same happiness!',
        funfact: 'Indifference curves never intersect (transitivity) and are convex to origin (diminishing MRS).'
      },
      {
        id: 13, term: 'Budget Line', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Shows all combinations of two goods a consumer can buy given their income and the prices of the goods. The spending constraint.',
        formula: 'Px·X + Py·Y ≤ M  |  Slope = —Px/Py  |  X-intercept = M/Px, Y-intercept = M/Py',
        example: 'With ₹100, apples at ₹10 each and bananas at ₹5 each, you can buy max 10 apples or 20 bananas or any combination on the line.',
        mnemonic: 'Budget Line = "Seema Rekha" — marks what you can afford. Beyond the line = too expensive!',
        funfact: 'When income changes, the budget line shifts parallel. When price changes, it rotates — changing the slope.'
      },
      {
        id: 14, term: 'Production Function', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Shows the relationship between inputs (land, labor, capital) and the maximum output that can be produced.',
        formula: 'Q = f(L, K, N, E)  |  Q = A·K^α·L^β (Cobb-Douglas)  |  Where α + β = 1 for constant returns',
        example: 'A bakery: 5 workers + 2 ovens + 100 kg flour = 500 loaves of bread per day.',
        mnemonic: 'Production Function = "Input → Output" machine. What you put in determines what you get out!',
        funfact: 'The Cobb-Douglas production function was developed by Charles Cobb (mathematician) and Paul Douglas (economist).'
      },
      {
        id: 15, term: 'Returns to Scale', cat: 'Microeconomics', catClass: 'micro',
        definition: 'How output changes when ALL inputs are increased proportionally in the long run.',
        formula: 'If all inputs ↑ by λ%: Output ↑ by = λ% → Constant Returns | > λ% → Increasing Returns | < λ% → Decreasing Returns',
        example: 'Doubling all inputs (labor, capital, materials) → more than double output? That\'s increasing returns to scale!',
        mnemonic: 'Returns to Scale = Sab inputs badhao, kya hota hai? Increasing = double inputs, triple output!',
        funfact: 'Increasing returns to scale lead to natural monopolies (like power utilities).'
      },
      {
        id: 16, term: 'Economies of Scale', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Cost advantages that firms obtain due to larger scale of operation. Average cost falls as output increases.',
        formula: 'LRAC ↓ as Q ↑  |  Due to: specialization, bulk buying, technical efficiencies, financial economies',
        example: 'Amazon builds massive warehouses and negotiates huge discounts from suppliers — lower avg cost than small retailers.',
        mnemonic: 'Economies of Scale = "Jitna bada, utna sasta" — bigger = cheaper per unit!',
        funfact: 'The minimum efficient scale (MES) is the output level where LRAC is minimized.'
      },
      {
        id: 17, term: 'Diseconomies of Scale', cat: 'Microeconomics', catClass: 'micro',
        definition: 'When a firm becomes too large, average costs start rising due to management inefficiencies, communication problems, and coordination difficulties.',
        formula: 'LRAC ↑ as Q ↑ beyond optimal scale  |  Causes: bureaucracy, loss of control, worker alienation',
        example: 'A giant corporation with 100,000+ employees may suffer from slow decision-making and conflicting departments.',
        mnemonic: 'Diseconomies = "Zyada bada = problem" — too big to manage efficiently!',
        funfact: 'The optimal firm size balances economies and diseconomies of scale to minimize LRAC.'
      },
      {
        id: 18, term: 'Fixed Cost', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Costs that do NOT change with the level of output. Incurred even if production is zero. Short-run concept.',
        formula: 'FC = Constant  |  TFC = r·K (rent on capital)  |  AFC = TFC/Q (falls as Q rises)',
        example: 'Rent of ₹50,000/month for factory, insurance premium, annual license fee — same regardless of production.',
        mnemonic: 'Fixed Cost = "Fixed = Pakka kharcha" — pay even if you produce zero!',
        funfact: 'In the long run, ALL costs become variable — there are no fixed costs in the long run.'
      },
      {
        id: 19, term: 'Variable Cost', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Costs that change directly with the level of output. Zero when output is zero; increases as production increases.',
        formula: 'VC = f(Q)  |  TVC = w·L + m·M (wages + materials)  |  AVC = TVC/Q',
        example: 'Raw materials, electricity bills, wages of daily-wage workers — more production = higher cost.',
        mnemonic: 'Variable = "Badalta rehta hai" — changes with production level!',
        funfact: 'The shape of the variable cost curve reflects the law of diminishing returns.'
      },
      {
        id: 20, term: 'Marginal Cost', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The additional cost of producing ONE more unit of output. The most important cost concept for production decisions.',
        formula: 'MC = ΔTC / ΔQ  |  MC = TCₙ — TCₙ₋₁  |  MC = ΔTVC / ΔQ (since ΔFC = 0)',
        example: 'If total cost of 100 units is ₹5,000 and 101 units cost ₹5,045, MC = ₹45.',
        mnemonic: 'Marginal Cost = "Ek unit extra ka kharcha" — should you produce that extra unit? MC tells you!',
        funfact: 'The MC curve always intersects the AVC and ATC curves at their minimum points.'
      },
      {
        id: 21, term: 'Average Cost', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Total cost divided by the quantity of output. The cost per unit of production.',
        formula: 'ATC = TC / Q  |  ATC = AFC + AVC  |  U-shaped in short run due to diminishing returns',
        example: 'If total cost for 500 shirts is ₹2,50,000, average cost = ₹500 per shirt.',
        mnemonic: 'Average Cost = "Prati Unit Kharcha" — cost per unit. U-shaped like a smile!',
        funfact: 'The difference between price and average cost determines profit margin.'
      },
      {
        id: 22, term: 'Total Revenue', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The total income a firm receives from selling its goods or services. Price × Quantity.',
        formula: 'TR = P × Q  |  TR = ∫MR·dQ  |  TR = AR × Q',
        example: 'If a bakery sells 200 cakes at ₹500 each, Total Revenue = ₹1,00,000.',
        mnemonic: 'Total Revenue = "Total Aamdani" — price × quantity, simple!',
        funfact: 'Under perfect competition, TR is a straight line through origin (price constant). Under monopoly, it\'s an inverted U.'
      },
      {
        id: 23, term: 'Marginal Revenue', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The additional revenue from selling ONE more unit of output. Critical for profit maximization.',
        formula: 'MR = ΔTR / ΔQ  |  MR = TRₙ — TRₙ₋₁  |  MR = P(1 — 1/|Ed|)',
        example: 'If TR from 10 units is ₹1,000 and from 11 units is ₹1,080, MR = ₹80.',
        mnemonic: 'Marginal Revenue = "Ek unit aur bechne se kitni aamdani badhi?"',
        funfact: 'Profit maximization occurs where MR = MC — the golden rule of economics!'
      },
      {
        id: 24, term: 'Break-even Point', cat: 'Microeconomics', catClass: 'micro',
        definition: 'The level of output where total revenue equals total cost — no profit, no loss. The point where business becomes viable.',
        formula: 'TR = TC  |  Break-even Q = Fixed Cost / (Price — AVC)  |  Also: P = ATC',
        example: 'If FC = ₹1,00,000, price = ₹50, AVC = ₹30 → BEP = 1,00,000/20 = 5,000 units.',
        mnemonic: 'Break-even = "Na labh na hani" — zero profit, zero loss. The survival point!',
        funfact: 'Operating above break-even = profit; below = loss. Businesses MUST know their BEP!'
      },
      {
        id: 25, term: 'Perfect Competition', cat: 'Microeconomics', catClass: 'micro',
        definition: 'A market structure with many buyers and sellers, identical products, perfect information, and free entry/exit. Firms are price takers.',
        formula: 'P = AR = MR = MC = minimum ATC  |  Zero economic profit in long run  |  P = MC (efficient)',
        example: 'A wheat farmer in a mandi — thousands of farmers selling identical wheat. No one can influence price.',
        mnemonic: 'Perfect Competition = "Perfect Market" — many sellers, same product, no control over price!',
        funfact: 'Perfect competition is a theoretical ideal — no real market fully meets all conditions, but agriculture comes closest.'
      },
      {
        id: 26, term: 'Monopoly', cat: 'Microeconomics', catClass: 'micro',
        definition: 'A market structure with a SINGLE seller of a unique product with no close substitutes. The firm is a price maker with high barriers to entry.',
        formula: 'P > MR = MC  |  P > ATC (positive profits)  |  MR = P(1 — 1/|Ed|)',
        example: 'Indian Railways — the sole provider of railway transport across India. No competition on most routes.',
        mnemonic: 'Monopoly = "Mono = ONE seller" — sole king of the market!',
        funfact: 'Monopolies create deadweight loss — social welfare loss because price is above marginal cost.'
      },
      {
        id: 27, term: 'Oligopoly', cat: 'Microeconomics', catClass: 'micro',
        definition: 'A market dominated by a FEW large firms with significant barriers to entry. Firms are interdependent — actions of one affect others.',
        formula: 'Concentration Ratio CR₄ = Sum of market shares of top 4 firms  |  CR₄ > 60% = Oligopoly',
        example: 'Indian telecom: Jio, Airtel, VI — just 3 players controlling the entire market. One price change triggers all others.',
        mnemonic: 'Oligopoly = "Oligo = FEW" — kuch hi bade players, sab ek doosre ki nikal dekh rahe!',
        funfact: 'Game theory (Prisoner\'s Dilemma) is used to analyze oligopoly behavior — cartels like OPEC are classic examples.'
      },
      {
        id: 28, term: 'Monopolistic Competition', cat: 'Microeconomics', catClass: 'micro',
        definition: 'A market with many firms selling differentiated products. Each firm has some pricing power due to product differentiation.',
        formula: 'P > MR = MC (like monopoly)  |  Zero economic profit in long run (like competition)  |  P > min ATC (excess capacity)',
        example: 'Restaurants in a city — many options, each offers different cuisine/ambience. Each can set its own prices to some extent.',
        mnemonic: 'Monopolistic Competition = "Different hokar bhi compete" — product alag, lekin competition bhi hai!',
        funfact: 'Monopolistic competition leads to "excess capacity" — firms produce below their efficient scale.'
      },
      {
        id: 29, term: 'Price Discrimination', cat: 'Microeconomics', catClass: 'micro',
        definition: 'Charging different prices to different consumers for the SAME product, based on their willingness to pay, NOT on cost differences.',
        formula: '1st Degree: P = individual WTP  |  2nd Degree: P varies with quantity  |  3rd Degree: P varies by segment',
        example: 'Movie tickets: ₹100 for students, ₹250 for adults — same movie, different prices based on ability to pay.',
        mnemonic: 'Price Discrimination = "Alag-alag daam" — same product, different prices for different people!',
        funfact: 'Arbitrage (reselling) destroys price discrimination — that\'s why airlines restrict name changes on tickets.'
      },

      // ===== MACROECONOMICS =====
      {

    html += `<div class="flex items-center gap-2 text-xs text-gray-400 bg-black/30 px-4 py-2 rounded-xl border border-gray-700/50 whitespace-nowrap">`;
    html += `<i class="fa-regular fa-clock"></i><span>${terms.length} Terms · 6 Categories</span></div></div>`;
    html += `<div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">`;
    html += `<span class="px-3 py-1 rounded-full bg-blue-500/10 text-blue-300 text-xs border border-blue-500/20"><i class="fa-solid fa-chart-line mr-1"></i>Microeconomics (29)</span>`;
    html += `<span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-chart-pie mr-1"></i>Macroeconomics (30)</span>`;

    html += `<span class="px-3 py-1 rounded-full bg-purple-500/10 text-purple-300 text-xs border border-purple-500/20"><i class="fa-solid fa-globe mr-1"></i>International (20)</span>`;

    // ===== Stats Bar =====

    html += `<div class="bg-gradient-to-br from-[#131a2e] to-[#0d1220] rounded-xl p-3 sm:p-4 border border-amber-500/10 text-center"><div class="stats-number">6</div><div class="text-xs text-gray-400 mt-1">Categories</div></div>`;
    html += `<div class="bg-gradient-to-br from-[#131a2e] to-[#0d1220] rounded-xl p-3 sm:p-4 border border-emerald-500/10 text-center"><div class="stats-number">100%</div><div class="text-xs text-gray-400 mt-1">Free / BPSC Focused</div></div>`;
    html += `<div class="bg-gradient-to-br from-[#131a2e] to-[#0d1220] rounded-xl p-3 sm:p-4 border border-purple-500/10 text-center"><div class="stats-number">🏆</div><div class="text-xs text-gray-400 mt-1">Mnemonic Inside!</div></div></div>`;

    // ===== Search & Filters =====
    html += `<div class="mb-6 space-y-4">`;
    html += `<div class="relative max-w-xl mx-auto sm:mx-0">`;
    html += `<i class="fa-solid fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>`;
    html += `<input type="text" id="search-input" class="search-input" placeholder="Search any term..." autocomplete="off">`;
    html += `</div>`;
    html += `<div class="flex flex-wrap gap-2" id="filter-buttons">`;
    categories.forEach((cat, i) => {
      html += `<button class="cat-filter-btn ${i === 0 ? 'active' : ''}" data-cat="${cat}">${cat}</button>`;

    html += `</div></div>`;

    // ===== Terms Grid =====
    html += `<div id="terms-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

    terms.forEach((t, idx) => {

        'Microeconomics': 'text-blue-300 bg-blue-500/15 border-blue-500/25',
        'Macroeconomics': 'text-amber-300 bg-amber-500/15 border-amber-500/25',
        'Banking & Finance': 'text-emerald-300 bg-emerald-500/15 border-emerald-500/25',
        'International Economics': 'text-purple-300 bg-purple-500/15 border-purple-500/25',

      const termColors = {
        'Microeconomics': 'text-blue-300',
        'Macroeconomics': 'text-amber-300',
        'Banking & Finance': 'text-emerald-300',

        'Development Economics': 'text-teal-300'
      };

      html += `<div class="term-card cat-${t.catClass} scroll-reveal" data-category="${t.cat}" data-term="${t.term.toLowerCase()}">`;
      html += `<div class="flex items-start justify-between gap-3">`;
      html += `<div class="flex-1 min-w-0">`;
      html += `<div class="flex items-center gap-2 flex-wrap">`;
      html += `<span class="font-bold text-base sm:text-lg ${termColors[t.cat]}">${t.term}</span>`;

      // Mnemonic

      // Fun Fact
      html += `<div class="info-box funfact-box"><div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-star text-purple-400 text-xs"></i><span class="font-semibold text-purple-300 text-xs uppercase tracking-wider">Fun Fact / Stimulation Tip</span></div><div>${t.funfact}</div></div>`;

      html += `</div></div>`;
      html += `</div>`;
    });

    html += `</div>`; // end terms-container

    // ===== Footer =====
    html += `<div class="text-center py-6 border-t border-gray-800 mt-8">
      <p class="text-xs text-gray-600">
        <i class="fa-regular fa-copyright mr-1"></i> 2026 BPSC Economics Terms — 100+ Essential Concepts with Mnemonics
      </p>
      <p class="text-[10px] text-gray-700 mt-1">Compiled for Bihar Public Service Commission (BPSC) and UPSC competitive exam preparation. Learn smart with mnemonics!</p>
    </div>`;

    app.innerHTML = html;

    // ======================= INTERACTIVITY =======================

    // Expand/Collapse
    document.querySelectorAll('.term-card').forEach(card => {
      card.addEventListener('click', (e) => {
        // Don't toggle if user selected text
        if (window.getSelection().toString().length > 0) return;
        card.classList.toggle('active');
      });
    });

    // Search Filter
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      const activeCat = document.querySelector('.cat-filter-btn.active').dataset.cat;
      document.querySelectorAll('.term-card').forEach(card => {
        const term = card.dataset.term;
        const cat = card.dataset.category;
        const matchesSearch = term.includes(q);
        const matchesCat = activeCat === 'All' || cat === activeCat;
        if (matchesSearch && matchesCat) {
          card.style.display = '';
          setTimeout(() => { card.style.opacity = '1'; }, 10);
        } else {
          card.style.opacity = '0';
          setTimeout(() => { card.style.display = 'none'; }, 300);
        }
      });
    });

    // Category Filter
    document.querySelectorAll('.cat-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Trigger search
        const event = new Event('input');
        searchInput.dispatchEvent(event);
      });
    });

    // Intersection Observer for scroll-reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
  });
</script>
