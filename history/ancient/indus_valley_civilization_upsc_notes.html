<body class="text-gray-100 min-h-screen">

<div id="app" class="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>

<script>
  const DATA = {
    title: "Indus Valley Civilization (Harappan) — 6000 BCE to 1300 BCE",
    location: "NCERT Class 6 (OLD Ch 3), Class 6 (NEW Ch 6), Class 12 Theme 1",
    last_updated: "2026-06-08",
    source: "NCERT Class 6 Our Pasts I Ch 3, Class 6 NEW Ch 6, Class 12 Themes in Indian History Theme 1",
    chapters: [
      { class: 6, chapter: 3, name: "In the Earliest Cities", book: "Our Pasts I (OLD)" },
      { class: 6, chapter: 6, name: "The Beginnings of Indian Civilisation", book: "Our Pasts I (NEW)" },
      { class: 12, theme: 1, name: "Bricks, Beads and Bones: The Harappan Civilisation", book: "Themes in Indian History" }
    ]
  };

  document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');
    let html = '';

    // ===== HEADER =====
    html += `
      <div class="gradient-top rounded-2xl p-4 sm:p-8 mb-6 border border-indigo-500/20 text-center sm:text-left">
        <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between gap-3">
          <div>
            <div class="flex items-center gap-3 mb-2 justify-center sm:justify-start">
              <i class="fa-solid fa-landmark text-2xl sm:text-3xl text-amber-400"></i>
              <h1 class="text-xl sm:text-3xl font-bold text-white">${DATA.title}</h1>
            </div>
            <p class="text-indigo-300 text-sm flex items-center gap-2 justify-center sm:justify-start">
              <i class="fa-solid fa-book text-rose-400"></i> ${DATA.location}
            </p>
            <p class="text-gray-500 text-xs mt-1">
              <i class="fa-regular fa-calendar mr-1"></i>Updated: ${DATA.last_updated}
            </p>
          </div>
          <div class="flex items-center gap-2 text-xs text-gray-400 bg-black/30 px-4 py-2 rounded-xl border border-gray-700/50 whitespace-nowrap">
            <i class="fa-regular fa-clock"></i>
            <span>~4700 Years (6000 BCE - 1300 BCE)</span>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">
          <span class="px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-300 text-xs border border-indigo-500/20"><i class="fa-solid fa-check-circle text-emerald-400 mr-1"></i>NCERT Based</span>
          <span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-star mr-1"></i>UPSC Level</span>
          <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20"><i class="fa-solid fa-flag mr-1"></i>Zero to Advance</span>
        </div>
      </div>`;

    // ===== NAVIGATION INDEX =====
    html += `
      <div class="mb-6 gradient-card-1 rounded-xl p-4 border border-gray-700/30">
        <h2 class="text-base sm:text-lg font-bold text-white mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list text-indigo-400"></i> Table of Contents
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 text-xs sm:text-sm">
          <a href="#intro" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition"><i class="fa-solid fa-book-open text-amber-400 mr-1"></i> 1. Introduction</a>
          <a href="#discovery" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">2. Discovery & Excavation</a>
          <a href="#extent" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">3. Extent & Geographical Spread</a>
          <a href="#cities" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">4. Major Cities & Sites</a>
          <a href="#town-planning" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">5. Town Planning</a>
          <a href="#great-bath" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">6. Great Bath</a>
          <a href="#economy" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">7. Economy & Subsistence</a>
          <a href="#craft" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">8. Craft & Technology</a>
          <a href="#trade" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">9. Trade & Contact</a>
          <a href="#society" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">10. Society</a>
          <a href="#religion" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">11. Religion</a>
          <a href="#script" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">12. Script</a>
          <a href="#pottery" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">13. Harappan Pottery</a>
          <a href="#decline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">14. Decline of Harappan Civilization</a>
          <a href="#timeline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">15. Complete Timeline</a>
          <a href="#upsc-facts" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition"><i class="fa-solid fa-file-pen text-yellow-400 mr-1"></i> 16. UPSC Key Facts at a Glance</a>
        </div>
      </div>`;

    // ===== 1. INTRODUCTION =====
    html += `<section id="intro">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-book-open text-amber-400"></i> 1. Introduction — The Indus Valley Civilization</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      The <span class="hl-dynasty hl-bg-dynasty">Indus Valley Civilization (IVC)</span>, also called the <span class="hl-term hl-bg-term">Harappan Civilization</span>, is one of the world's <span class="hl-term">earliest urban civilizations</span> — alongside <span class="hl-term">Mesopotamia, Egypt, and China</span>. It was named after <span class="hl-place">Harappa</span> (Punjab province, Pakistan), the first site to be discovered. The civilization flourished in the <span class="hl-term">Indus river valley</span> and its tributaries, covering parts of modern <span class="hl-place">Pakistan, India, Afghanistan</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-clock text-cyan-400 text-xs"></i> Time Span & Periodization</h3>`;
    html += `<div class="table-wrap"><table><thead><tr><th>Phase</th><th>Period</th><th>Characteristics</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-dynasty">Early Harappan</span></td><td><span class="hl-date">6000-2600 BCE</span></td><td>Formative phase — early farming communities, domestication, trade networks beginning</td></tr>`;
    html += `<tr><td><span class="hl-dynasty hl-bg-dynasty">Mature Harappan</span></td><td><span class="hl-date hl-bg-date">2600-1900 BCE</span></td><td><span class="hl-term hl-bg-term">Urban phase</span> — peak prosperity, planned cities, standardised weights & seals, extensive trade</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Late Harappan</span></td><td><span class="hl-date">1900-1300 BCE</span></td><td>Decadent phase — gradual decline, cities abandoned, shift to rural settlement patterns</td></tr>`;
    html += `</tbody></table></div>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Key Concept</div><div class="fact-box-content">The Harappan Civilization is covered in <span class="hl-term">NCERT Class 12 Theme 1 "Bricks, Beads and Bones: The Harappan Civilisation"</span> — the <span class="hl-term hl-bg-term">dedicated chapter</span> in <span class="hl-term">Themes in Indian History</span>. Also in <span class="hl-term">Class 6 (OLD) Chapter 3 "In the Earliest Cities"</span> and <span class="hl-term">Class 6 (NEW) Chapter 6 "The Beginnings of Indian Civilisation"</span>. The timeline of <span class="hl-date">2600-1900 BCE</span> for the Mature Harappan phase is the <span class="hl-term hl-bg-term">most important chronological fact</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 2. DISCOVERY & EXCAVATION =====
    html += `<section id="discovery">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-compass text-amber-400"></i> 2. Discovery & Excavation</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      The story of the discovery of the Harappan Civilization is a fascinating chapter in the history of <span class="hl-term">Indian archaeology</span>. The sites were first noticed in the <span class="hl-date">1850s</span> when <span class="hl-term">railway lines</span> were being laid in the Punjab — engineers <span class="hl-event">carried off bricks</span> from the ancient mound of Harappa for ballast.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-users text-cyan-400 text-xs"></i> Key Archaeologists & Excavations</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Daya Ram Sahni</span> (<span class="hl-date">1921</span>) — <span class="hl-term hl-bg-term">first excavated Harappa</span>, marking the official discovery of the civilization</li>`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Rakhal Das Banerjee</span> (<span class="hl-date">1922</span>) — discovered <span class="hl-place hl-bg-place">Mohenjodaro</span> (Mound of the Dead)</li>`;
    html += `<li><span class="hl-ruler hl-bg-ruler">John Marshall</span> (<span class="hl-date">1924</span>) — <span class="hl-term hl-bg-term">Director General of ASI</span> who formally <span class="hl-event hl-bg-event">announced the discovery of a new civilization</span> to the world</li>`;
    html += `<li><span class="hl-ruler">R.E.M. Wheeler</span> (<span class="hl-date">1946</span>) — carried out <span class="hl-term">excavations at Harappa</span>, established the <span class="hl-term">chronological sequence</span> of the civilization</li>`;
    html += `<li><span class="hl-ruler">S.R. Rao</span> — excavated <span class="hl-place">Lothal</span> (Gujarat), discovered the <span class="hl-arch">dockyard</span></li>`;
    html += `<li><span class="hl-ruler">R.S. Bisht</span> — excavated <span class="hl-place">Dholavira</span> (Gujarat), revealed sophisticated <span class="hl-arch">water management system</span></li>`;
    html += `<li><span class="hl-ruler">B.K. Thapar</span> — excavated <span class="hl-place">Kalibangan</span> (Rajasthan)</li>`;
    html += `<li><span class="hl-ruler">Colin Mackenzie</span> (earlier) — first <span class="hl-term">Surveyor General of India</span>, surveyed the area but did <span class="hl-event">not recognize the significance</span></li>`;
    html += `<li><span class="hl-ruler">Alexander Cunningham</span> (first DG of ASI) — thought <span class="hl-term">Indian history began with Ganga valley cities</span>, missed the importance</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The discovery chronology is frequently tested: <span class="hl-ruler">Daya Ram Sahni</span> (Harappa 1921) → <span class="hl-ruler">Rakhal Das Banerjee</span> (Mohenjodaro 1922) → <span class="hl-ruler">John Marshall</span> (announced 1924). <span class="hl-ruler">Wheeler's</span> 1946 excavations at Harappa established the <span class="hl-term">chronological sequence</span>. The <span class="hl-term">railway brick theft (1850s)</span> is a famous anecdote.</div></div>`;
    html += `</div></section>`;

    // ===== 3. EXTENT & GEOGRAPHICAL SPREAD =====
    html += `<section id="extent">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-map text-amber-400"></i> 3. Extent & Geographical Spread</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      The Harappan Civilization was <span class="hl-term hl-bg-term">larger than contemporary Egypt and Mesopotamia combined</span>. It stretched over an enormous area:
    </p>`;

    html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">`;
    html += `<div class="bg-black/30 rounded-xl p-3 border border-indigo-500/20">`;
    html += `<h4 class="text-sm font-bold text-indigo-400 mb-2"><i class="fa-solid fa-arrow-up mr-1"></i> Northern Limit</h4>`;
    html += `<p class="text-xs text-slate-400"><span class="hl-place hl-bg-place">Manda</span> (<span class="hl-place">Jammu & Kashmir</span>)</p></div>`;
    html += `<div class="bg-black/30 rounded-xl p-3 border border-rose-500/20">`;
    html += `<h4 class="text-sm font-bold text-rose-400 mb-2"><i class="fa-solid fa-arrow-down mr-1"></i> Southern Limit</h4>`;
    html += `<p class="text-xs text-slate-400"><span class="hl-place hl-bg-place">Daimabad</span> (<span class="hl-place">Maharashtra</span>)</p></div>`;
    html += `<div class="bg-black/30 rounded-xl p-3 border border-amber-500/20">`;
    html += `<h4 class="text-sm font-bold text-amber-400 mb-2"><i class="fa-solid fa-arrow-left mr-1"></i> Western Limit</h4>`;
    html += `<p class="text-xs text-slate-400"><span class="hl-place hl-bg-place">Sutkagendor</span> (<span class="hl-place">Balochistan, Pakistan</span>) — on the Makran coast</p></div>`;
    html += `<div class="bg-black/30 rounded-xl p-3 border border-emerald-500/20">`;
    html += `<h4 class="text-sm font-bold text-emerald-400 mb-2"><i class="fa-solid fa-arrow-right mr-1"></i> Eastern Limit</h4>`;
    html += `<p class="text-xs text-slate-400"><span class="hl-place hl-bg-place">Alamgirpur</span> (<span class="hl-place">Uttar Pradesh</span>)</p></div>`;
    html += `</div>`;

    html += `<p class="content-text">
      Major sites in <span class="hl-term">Pakistan</span>: <span class="hl-place">Harappa, Mohenjodaro, Chanhudaro, Ganweriwala</span>. Major sites in <span class="hl-term">India</span>: <span class="hl-place">Rakhigarhi</span> (Haryana — <span class="hl-term hl-bg-term">largest Indian site</span>), <span class="hl-place">Dholavira</span> (Gujarat — water management), <span class="hl-place">Lothal</span> (Gujarat — dockyard), <span class="hl-place">Kalibangan</span> (Rajasthan — ploughed field), <span class="hl-place">Banawali</span> (Haryana), <span class="hl-place">Rangpur</span> (Gujarat), <span class="hl-place">Surkotada</span> (Gujarat). <span class="hl-place">Shortughai</span> (<span class="hl-term">Afghanistan</span>) — shows <span class="hl-arch">canal irrigation</span> evidence.
    </p>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term hl-bg-term">extent of the Harappan Civilization</span> is a frequently asked topic. Remember the four limits: <span class="hl-place">Manda</span> (N), <span class="hl-place">Daimabad</span> (S), <span class="hl-place">Sutkagendor</span> (W), <span class="hl-place">Alamgirpur</span> (E). The civilization was <span class="hl-term">larger than Egypt and Mesopotamia combined</span>. <span class="hl-place">Rakhigarhi</span> is the <span class="hl-term">largest Indian site</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 4. MAJOR CITIES & SITES =====
    html += `<section id="cities">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-city text-amber-400"></i> 4. Major Cities & Sites</h2>`;

    // Harappa
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-location-dot text-cyan-400 text-xs"></i> Harappa (Punjab, Pakistan)</h3>`;
