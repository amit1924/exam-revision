    html += `<li>None possessed the political acumen or personal authority of the first three Mauryan rulers</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-code-branch text-cyan-400 text-xs"></i> 2. Division of the Empire</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The empire was <span class="hl-event">divided into western and eastern parts</span> under different rulers</li>`;
    html += `<li><span class="hl-place">Taxila</span> in the northwest could not be effectively controlled from <span class="hl-place">Pataliputra</span></li>`;
    html += `<li>Provincial governors became <span class="hl-event">increasingly independent</span></li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-person-walking-arrow-right text-cyan-400 text-xs"></i> 3. Foreign Invasions (Bactrian Greeks)</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Bactrian Greeks</span> under <span class="hl-ruler">Demetrius</span> began invading the <span class="hl-place">northwestern part</span> of the empire</li>`;
    html += `<li>The <span class="hl-place">Khyber Pass</span> route was vulnerable to invasions</li>`;
    html += `<li>The northwestern provinces (<span class="hl-place">Gandhara, Punjab</span>) were lost to the Greeks</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-sack-dollar text-cyan-400 text-xs"></i> 4. Heavy Expenditure</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The <span class="hl-term">enormous bureaucracy and standing army</span> required huge financial resources</li>`;
    html += `<li>Ashoka's <span class="hl-policy">liberal donations to Buddhism</span> and his extensive public works drained the treasury</li>`;
    html += `<li>The <span class="hl-term">cost of maintaining the empire</span> exceeded the revenue generated</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-place-of-worship text-cyan-400 text-xs"></i> 5. Brahminical Reaction</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Ashoka's <span class="hl-policy">pro-Buddhist policies</span> are believed to have caused <span class="hl-event">resentment among Brahmins</span></li>`;
    html += `<li>The Brahmins, who were the <span class="hl-term">traditional priestly class</span>, lost their privileged position under the Mauryas</li>`;
    html += `<li>This may have led to <span class="hl-term">passive resistance and lack of support</span> for later Mauryan rulers</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-flag text-cyan-400 text-xs"></i> 6. Rise of Independent Provinces</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Provincial governors</span> (Kumaras and Aryaputras) became <span class="hl-event">powerful and autonomous</span></li>`;
    html += `<li>Remote provinces like <span class="hl-place">Taxila, Ujjayini, and Suvarnagiri</span> increasingly acted independently</li>`;
    html += `<li>By the time of <span class="hl-ruler">Brihadratha</span>, the Mauryan king controlled little beyond <span class="hl-place">Magadha</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-skull text-red-400 text-xs"></i> The End: Pushyamitra Shunga (185 BCE)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The <span class="hl-term">last Mauryan ruler</span> was <span class="hl-ruler hl-bg-ruler">Brihadratha</span> (<span class="hl-date">187-185 BCE</span>)</li>`;
    html += `<li>He was <span class="hl-event hl-bg-event">assassinated in 185 BCE</span> by his own commander-in-chief, <span class="hl-ruler hl-bg-ruler">Pushyamitra Shunga</span></li>`;
    html += `<li>Pushyamitra then founded the <span class="hl-dynasty hl-bg-dynasty">Shunga dynasty</span> (<span class="hl-date">185-73 BCE</span>)</li>`;
    html += `<li><span class="hl-event">The Mauryan Empire ended — 137 years after its founding</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term hl-bg-term">decline of the Mauryan Empire</span> is a <span class="hl-term hl-bg-term">classic UPSC question</span>. Key causes: <span class="hl-term">weak successors, division of empire, foreign invasions (Bactrian Greeks), heavy expenditure, Brahminical reaction, rise of provincial governors</span>. The <span class="hl-event hl-bg-event">assassination of Brihadratha by Pushyamitra Shunga (185 BCE)</span> marks the formal end. Historians debate which cause was most important — some emphasize <span class="hl-term">economic pressure</span>, others <span class="hl-term">Brahminical reaction</span>, and still others <span class="hl-term">administrative overextension</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 15. LATER MAURYAS =====
    html += `<section id="maurya-later">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-list-ol text-amber-400"></i> 15. Later Mauryas (232-185 BCE)</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      After Ashoka's death in <span class="hl-date">232 BCE</span>, the Mauryan Empire <span class="hl-event">declined rapidly</span> through a succession of <span class="hl-term">weak and short-lived rulers</span>. The empire fragmented and shrank with each passing decade.
    </p>`;

    html += `<div class="table-wrap"><table><thead><tr><th>Ruler</th><th>Reign</th><th>Key Facts</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-ruler">Kunala</span></td><td><span class="hl-date">232-? </span></td><td>Son of Ashoka; blinded in a conspiracy according to Buddhist tradition; did not actually rule (possibly)</td></tr>`;
    html += `<tr><td><span class="hl-ruler">Dasharatha</span></td><td><span class="hl-date">c. 232-224 BCE</span></td><td>Grandson of Ashoka; dedicated the <span class="hl-arch">Barabar Caves</span> to the Ajivikas; ruled only the eastern part</td></tr>`;
    html += `<tr><td><span class="hl-ruler">Samprati</span></td><td><span class="hl-date">c. 224-215 BCE</span></td><td>Son of Kunala; patron of <span class="hl-term">Jainism</span>; according to Jain tradition, he ruled a large empire</td></tr>`;
    html += `<tr><td><span class="hl-ruler">Salisuka</span></td><td><span class="hl-date">c. 215-202 BCE</span></td><td>Mentioned in the <span class="hl-term">Yuga Purana</span> as a <span class="hl-term">wicked and oppressive ruler</span></td></tr>`;
    html += `<tr><td><span class="hl-ruler">Devavarman</span></td><td><span class="hl-date">c. 202-195 BCE</span></td><td>Little is known about his reign</td></tr>`;
    html += `<tr><td><span class="hl-ruler">Satadhanvan</span></td><td><span class="hl-date">c. 195-187 BCE</span></td><td>Ruled a much-reduced kingdom</td></tr>`;
    html += `<tr><td><span class="hl-ruler hl-bg-ruler">Brihadratha</span></td><td><span class="hl-date">c. 187-185 BCE</span></td><td><span class="hl-event">Last Mauryan ruler</span>; assassinated by his commander <span class="hl-ruler">Pushyamitra Shunga</span> in <span class="hl-date">185 BCE</span></td></tr>`;
    html += `</tbody></table></div>`;

    html += `<p class="content-text mt-2">
      <span class="hl-ruler">Pushyamitra Shunga</span> then <span class="hl-event hl-bg-event">founded the Shunga dynasty (185-73 BCE)</span>, marking the beginning of the <span class="hl-term">post-Mauryan period</span>. The Shungas ruled primarily over the <span class="hl-place">Ganga plain</span> — a much smaller territory than the Mauryan Empire.
    </p>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term">Later Mauryas</span> are less important than the early rulers, but <span class="hl-ruler">Brihadratha</span> (the last ruler) and the <span class="hl-event">transition to the Shunga dynasty (185 BCE)</span> are key dates. <span class="hl-ruler">Samprati</span> is notable as a <span class="hl-term">Jain patron</span>. <span class="hl-ruler">Dasharatha</span> is known for the Barabar Caves. The rapid decline after Ashoka is primarily attributed to <span class="hl-term">weak leadership and administrative fragmentation</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 16. COMPLETE TIMELINE =====
    html += `<section id="timeline">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-timeline text-indigo-400"></i> 16. Complete Timeline (322 BCE - 185 BCE)</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;

    const timelineData = [
      { year: "c. 600 BCE", event: "Formation of the 16 Mahajanapadas in the Ganga plain", y: true },
      { year: "544-492 BCE", event: "Bimbisara's rule over Magadha (Haryanka dynasty)" },
      { year: "492-460 BCE", event: "Ajatashatru's rule; builds fort at Pataliputra" },
      { year: "345-322 BCE", event: "Nanda dynasty rules Magadha — immensely wealthy but unpopular", y: true },
      { year: "327-325 BCE", event: "Alexander's invasion of India creates political vacuum in NW", y: true },
      { year: "322 BCE", event: "Chandragupta Maurya overthrows Nandas — FOUNDATION OF MAURYAN EMPIRE", y: true },
      { year: "322-297 BCE", event: "Chandragupta Maurya's reign — establishes the first pan-Indian empire" },
      { year: "305 BCE", event: "Chandragupta defeats Seleucus Nicator; gains 4 eastern satrapies", y: true },
      { year: "c. 302 BCE", event: "Megasthenes (Greek ambassador) arrives at Pataliputra" },
      { year: "297-272 BCE", event: "Bindusara's reign — extends empire southward", y: true },
      { year: "268 BCE", event: "Ashoka's coronation as the third Mauryan emperor", y: true },
      { year: "261 BCE", event: "KALINGA WAR — Ashoka conquers Kalinga; horrified by bloodshed, converts to Buddhism", battle: true, y: true },
      { year: "260-232 BCE", event: "Ashoka implements Dhamma policy; inscribes edicts on rocks and pillars" },
      { year: "c. 250 BCE", event: "Third Buddhist Council held at Pataliputra under Moggaliputta Tissa" },
      { year: "c. 250 BCE", event: "Ashoka sends missionaries (Mahendra & Sanghamitta) to Sri Lanka", y: true },
      { year: "c. 250 BCE", event: "Barabar Caves dedicated to Ajivikas" },
      { year: "232 BCE", event: "Ashoka dies — Mauryan Empire begins rapid decline", y: true },
      { year: "232-185 BCE", event: "Later Mauryas: Dasharatha, Samprati, Salisuka, Devavarman, Satadhanvan, Brihadratha" },
      { year: "185 BCE", event: "Brihadratha assassinated by Pushyamitra Shunga — END OF MAURYAN EMPIRE", y: true },
      { year: "185 BCE", event: "Shunga dynasty begins under Pushyamitra Shunga", y: true },
      { year: "1837 CE", event: "James Prinsep deciphers Brahmi script — enables reading of Ashokan edicts", y: true }
    ];

    timelineData.forEach(t => {
      html += `<div class="timeline-item">`;
      html += `<span class="timeline-year">${t.year}</span>`;
      let badges = '';
      if (t.battle) badges += ' <span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/20 text-red-300 border border-red-500/30"><i class="fa-solid fa-crossed-swords mr-0.5"></i>Battle</span>';
      if (t.y) badges += ' <span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 border border-amber-500/30"><i class="fa-solid fa-star mr-0.5"></i>Key Event</span>';
      html += `<span class="text-xs text-slate-400" style="display:inline-flex;flex-wrap:wrap;gap:4px;margin-left:6px;">${badges}</span>`;
      html += `<p class="text-xs sm:text-sm text-slate-300 mt-0.5">${t.event}</p>`;
      html += `</div>`;
    });

    html += `</div></section>`;

    // ===== 17. UPSC KEY FACTS =====
    html += `<section id="upsc-facts">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-file-pen text-yellow-400"></i> 17. UPSC Key Facts — At a Glance</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-yellow-500/20">`;

    html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;

    // Card 1: Mauryan Rulers
    html += `<div class="bg-black/30 rounded-xl p-3 border border-amber-500/20">`;
    html += `<h4 class="text-sm font-bold text-amber-400 mb-2"><i class="fa-solid fa-crown mr-1"></i> Mauryan Rulers</h4>`;
    html += `<ul class="text-xs text-slate-400 space-y-1" style="list-style:none;padding-left:0;">`;
    html += `<li><span class="text-amber-300">Chandragupta (322-297 BCE):</span> Founder; defeated Seleucus 305 BCE; Megasthenes; converted to Jainism; Sallekhana death</li>`;
    html += `<li><span class="text-amber-300">Bindusara (297-272 BCE):</span> "Amitraghata" (slayer of enemies); Deimachus (Greek ambassador); extended southward</li>`;
    html += `<li><span class="text-amber-300">Ashoka (268-232 BCE):</span> Greatest Mauryan; Kalinga War 261 BCE; Dhamma policy; inscriptions; spread Buddhism</li>`;
    html += `<li><span class="text-amber-300">Later Mauryas:</span> Weak successors; empire declined; <span class="hl-ruler">Brihadratha</span> (last) killed by Pushyamitra Shunga 185 BCE</li>`;
    html += `<li><span class="text-amber-300">Capital:</span> <span class="hl-place">Pataliputra</span> (modern Patna)</li>`;
    html += `</ul></div>`;

    // Card 2: Ashokan Inscriptions
    html += `<div class="bg-black/30 rounded-xl p-3 border border-indigo-500/20">`;
    html += `<h4 class="text-sm font-bold text-indigo-400 mb-2"><i class="fa-solid fa-table mr-1"></i> Ashokan Inscriptions</h4>`;
    html += `<ul class="text-xs text-slate-400 space-y-1" style="list-style:none;padding-left:0;">`;
    html += `<li><span class="text-indigo-300">14 Major Rock Edicts:</span> Key locations: Shahbazgarhi, Mansehra (Kharosthi), Kalsi, Girnar, Dhauli, Jaugada, Sopara, Yerragudi, Kandahar (Greek/Aramaic)</li>`;
    html += `<li><span class="text-indigo-300">Minor Rock Edicts:</span> <span class="hl-term">Maski</span> — first to mention Ashoka by name ("Devanaampiya Asoka")</li>`;
    html += `<li><span class="text-indigo-300">7 Pillar Edicts:</span> Delhi-Topra, Delhi-Meerut, Allahabad, Lauriya-Areraj, Lauriya-Nandangarh, Rampurva, Sarnath</li>`;
    html += `<li><span class="text-indigo-300">Languages/Scripts:</span> Prakrit (Brahmi), Kharosthi (NW), Greek & Aramaic (Kandahar)</li>`;
    html += `<li><span class="text-indigo-300">MRE XIII:</span> Kalinga War — 100,000 killed, 150,000 deported</li>`;
    html += `<li><span class="text-indigo-300">Deciphered by:</span> <span class="hl-ruler">James Prinsep (1837 CE)</span></li>`;
    html += `</ul></div>`;

    // Card 3: Administration
    html += `<div class="bg-black/30 rounded-xl p-3 border border-emerald-500/20">`;
    html += `<h4 class="text-sm font-bold text-emerald-400 mb-2"><i class="fa-solid fa-building-columns mr-1"></i> Administration</h4>`;
    html += `<ul class="text-xs text-slate-400 space-y-1" style="list-style:none;padding-left:0;">`;
    html += `<li><span class="text-emerald-300">Central:</span> Emperor + <span class="hl-term">Mantriparishad</span> (council); Mantris, Mahamattas, Amatyas, Adhyakshyas</li>`;
    html += `<li><span class="text-emerald-300">Provincial:</span> 5 centres — <span class="hl-place">Pataliputra, Taxila, Ujjayini, Tosali, Suvarnagiri</span>; governed by Kumaras</li>`;
    html += `<li><span class="text-emerald-300">Local:</span> Pradeshika (district) → Sthanika (tax) → Gramika (village); units of 10, 200, 400 villages</li>`;
    html += `<li><span class="text-emerald-300">City (Pataliputra):</span> 6 committees of 5 — industry, foreigners, births/deaths, trade, public sales, tax</li>`;
    html += `<li><span class="text-emerald-300">Military:</span> 6 boards — infantry, cavalry, chariots, elephants, navy, transport; standing army, women archer bodyguard</li>`;
    html += `<li><span class="text-emerald-300">Revenue:</span> Land tax (bhaga 1/6th), state monopolies (mines, salt, forests, arms), Sita (crown lands)</li>`;
    html += `</ul></div>`;

    // Card 4: Sources of Mauryan History
    html += `<div class="bg-black/30 rounded-xl p-3 border border-rose-500/20">`;
    html += `<h4 class="text-sm font-bold text-rose-400 mb-2"><i class="fa-solid fa-book mr-1"></i> Sources of Mauryan History</h4>`;
    html += `<ul class="text-xs text-slate-400 space-y-1" style="list-style:none;padding-left:0;">`;
    html += `<li><span class="text-rose-300">Literary:</span> <span class="hl-term">Arthashastra</span> (Kautilya/Chanakya) — statecraft, economics; <span class="hl-term">Indica</span> (Megasthenes) — Greek ambassador's account (fragments)</li>`;
    html += `<li><span class="text-rose-300">Buddhist:</span> <span class="hl-term">Dipavamsa, Mahavamsa</span> (Sri Lankan chronicles) — Ashoka's Buddhist patronage</li>`;
    html += `<li><span class="text-rose-300">Jain:</span> References to Chandragupta's conversion to Jainism and Sallekhana death</li>`;
    html += `<li><span class="text-rose-300">Puranas:</span> Lists of Mauryan kings; <span class="hl-term">Rajatarangini</span> (Kalhana) — Kashmir history</li>`;
    html += `<li><span class="text-rose-300">Play:</span> <span class="hl-term">Mudrarakshasa</span> (Vishakhadatta) — dramatizes Chandragupta & Chanakya's rise</li>`;
    html += `<li><span class="text-rose-300">Archaeological:</span> Ashokan edicts (Brahmi), pillars, Lion Capital (national emblem), Barabar Caves, Sanchi Stupa, punch-marked coins</li>`;
    html += `</ul></div>`;

    // Card 5: Art & Architecture
    html += `<div class="bg-black/30 rounded-xl p-3 border border-pink-500/20">`;
    html += `<h4 class="text-sm font-bold text-pink-400 mb-2"><i class="fa-solid fa-landmark mr-1"></i> Art & Architecture</h4>`;
    html += `<ul class="text-xs text-slate-400 space-y-1" style="list-style:none;padding-left:0;">`;
    html += `<li><span class="text-pink-300">Pillars:</span> Monolithic Chunar sandstone; up to 15m, 50 tons; <span class="hl-term">Mauryan polish</span> (non-corrosive); animal capitals — Lion (Sarnath), Bull (Rampurva), Elephant (Sankissa)</li>`;
    html += `<li><span class="text-pink-300">Lion Capital:</span> Sarnath — <span class="hl-term">National Emblem of India</span></li>`;
    html += `<li><span class="text-pink-300">Barabar Caves:</span> Earliest rock-cut caves; gifted to Ajivikas; polished interiors; Lomas Rishi, Sudama</li>`;
    html += `<li><span class="text-pink-300">Palace:</span> 80-pillared hall at Pataliputra (excavated by Spooner); wooden palace described by Megasthenes</li>`;
    html += `<li><span class="text-pink-300">Stupas:</span> Sanchi Stupa (Mauryan origin); 84,000 stupas traditionally</li>`;
    html += `<li><span class="text-pink-300">Sculpture:</span> Didarganj Yakshi (Mauryan polish), Parkham Yaksha; first large-scale stone sculpture</li>`;
    html += `</ul></div>`;

    // Card 6: Reasons for Decline
    html += `<div class="bg-black/30 rounded-xl p-3 border border-red-500/20">`;
    html += `<h4 class="text-sm font-bold text-red-400 mb-2"><i class="fa-solid fa-chart-line-down mr-1"></i> Reasons for Decline</h4>`;
    html += `<ul class="text-xs text-slate-400 space-y-1" style="list-style:none;padding-left:0;">`;
    html += `<li><span class="text-red-300">Weak successors:</span> After Ashoka (232 BCE), all later rulers were incapable</li>`;
    html += `<li><span class="text-red-300">Division of empire:</span> Split into western and eastern halves; provincial governors became independent</li>`;
    html += `<li><span class="text-red-300">Foreign invasions:</span> Bactrian Greeks (Demetrius) invaded northwest</li>`;
    html += `<li><span class="text-red-300">Heavy expenditure:</span> Large bureaucracy and army; Ashoka's donations drained treasury</li>`;
    html += `<li><span class="text-red-300">Brahminical reaction:</span> Resentment against Ashoka's pro-Buddhist policies</li>`;
    html += `<li><span class="text-red-300">187-185 BCE:</span> Brihadratha (last Mauryan) assassinated by Pushyamitra Shunga → <span class="hl-dynasty">Shunga dynasty</span></li>`;
    html += `</ul></div>`;

    html += `</div>`;

    html += `<div class="mt-4 fact-box border-yellow-500/30"><div class="fact-box-title"><i class="fa-solid fa-star text-yellow-400"></i> Must-Know for UPSC Prelims</div><div class="fact-box-content">`;
    html += `The <span class="hl-dynasty hl-bg-dynasty">Mauryan Empire</span> (322-185 BCE): Founded by <span class="hl-ruler">Chandragupta Maurya</span> (322 BCE); <span class="hl-ruler">Bindusara</span> (Amitraghata); <span class="hl-ruler">Ashoka</span> (Kalinga War 261 BCE, Dhamma, inscriptions). <span class="hl-term">Arthashastra</span> (Kautilya), <span class="hl-term">Indica</span> (Megasthenes). <span class="hl-arch">Lion Capital at Sarnath</span> (national emblem). <span class="hl-term">Mauryan polish</span> (non-corrosive). <span class="hl-term">Brahmi script</span> deciphered by <span class="hl-ruler">James Prinsep (1837)</span>. <span class="hl-term">14 Major Rock Edicts, 7 Pillar Edicts</span>. <span class="hl-term">MRE XIII</span> — Kalinga War details. <span class="hl-term">Maski edict</span> — first to mention Ashoka by name. <span class="hl-term">5 provincial capitals</span>: Taxila, Ujjayini, Tosali, Suvarnagiri. <span class="hl-term">6-city commission</span> of Pataliputra. Last ruler: <span class="hl-ruler">Brihadratha</span> (assassinated 185 BCE by <span class="hl-ruler">Pushyamitra Shunga</span>). </div></div>`;

    html += `</div></section>`;

    // ===== FOOTER =====
    html += `<div class="text-center py-4 sm:py-6 border-t border-gray-800 mt-4 sm:mt-6">
      <p class="text-[10px] sm:text-xs text-gray-600">
        <i class="fa-regular fa-copyright mr-1"></i> ${DATA.last_updated.split('-')[0]} NCERT History — Mauryan Empire (322-185 BCE) UPSC Notes
      </p>
      <p class="text-[10px] text-gray-700 mt-1">Based on NCERT Class 6 Ch 7 (Our Pasts I), Class 12 Theme 2 (Themes in Indian History) & UPSC reference materials</p>
    </div>`;

    app.innerHTML = html;
  });
</script>
