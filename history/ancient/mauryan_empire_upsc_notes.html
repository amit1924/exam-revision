          <span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-star mr-1"></i>UPSC Level</span>
          <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20"><i class="fa-solid fa-flag mr-1"></i>Zero to Advance</span>
        </div>
      </div>`;

    // ===== NAVIGATION INDEX =====
    html += `
      <div class="mb-6 gradient-card-1 rounded-xl p-4 border border-gray-700/30">
        <h2 class="text-base sm:text-lg font-bold text-white mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list text-indigo-400"></i> Table of Contents
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 text-xs sm:text-sm">
          <a href="#maurya-intro" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition"><i class="fa-solid fa-crown text-amber-400 mr-1"></i> 1. Introduction</a>
          <a href="#maurya-sources" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">2. Sources for Mauryan History</a>
          <a href="#maurya-rise" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">3. Rise of Magadha & Background</a>
          <a href="#maurya-chandragupta" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">4. Chandragupta Maurya</a>
          <a href="#maurya-chanakya" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">5. Chanakya (Kautilya)</a>
          <a href="#maurya-bindusara" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">6. Bindusara</a>

          <a href="#maurya-inscriptions" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">8. Ashoka's Inscriptions</a>
          <a href="#maurya-admin" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">9. Mauryan Administration</a>
          <a href="#maurya-art" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">10. Art & Architecture</a>
          <a href="#maurya-dhamma" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">11. Ashoka's Dhamma</a>
          <a href="#maurya-society" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">12. Society</a>
          <a href="#maurya-economy" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">13. Economy</a>
          <a href="#maurya-decline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">14. Decline of Mauryan Empire</a>

        </div>
      </div>`;

    // ===== 1. INTRODUCTION =====
    html += `<section id="maurya-intro">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 1. Mauryan Empire — Introduction</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      The <span class="hl-dynasty hl-bg-dynasty">Maurya Empire</span> (<span class="hl-date">322-185 BCE</span>) was <span class="hl-term hl-bg-term">India's first pan-Indian empire</span> — the first to cover most of the <span class="hl-term">Indian subcontinent</span>. At its zenith, it stretched from <span class="hl-place">Afghanistan</span> in the northwest to <span class="hl-place">Bengal</span> in the east, from the <span class="hl-place">Himalayas</span> in the north to <span class="hl-place">Karnataka</span> in the south. It was <span class="hl-term hl-bg-term">the largest empire in Indian history until the Mughals</span>.
    </p>`;

    html += `<ul class="bullet-list">`;
    html += `<li>Founded by <span class="hl-ruler hl-bg-ruler">Chandragupta Maurya</span> in <span class="hl-date">322 BCE</span></li>`;
    html += `<li>Capital: <span class="hl-place hl-bg-place">Pataliputra</span> (modern <span class="hl-place">Patna, Bihar</span>)</li>`;
    html += `<li>Greatest ruler: <span class="hl-ruler hl-bg-ruler">Ashoka</span> (<span class="hl-date">268-232 BCE</span>)</li>`;
    html += `<li>Covered <span class="hl-term hl-bg-term">most of the Indian subcontinent</span> — first empire to do so</li>`;
    html += `<li>The empire is named after the <span class="hl-dynasty">Maurya dynasty</span></li>`;
    html += `<li>The Mauryan period marks the <span class="hl-term">transition from small republics and kingdoms to a unified imperial state</span> in India</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Key Concept</div><div class="fact-box-content">The Mauryan Empire is covered in <span class="hl-term">NCERT Class 6 Ch 7 "From a Kingdom to an Empire" (Our Pasts I)</span> and <span class="hl-term">NCERT Class 12 Theme 2 "Kings, Farmers and Towns: Early States and Economies" (Themes in Indian History)</span>. Class 6 provides a foundational overview, while Class 12 delves into the <span class="hl-term">archaeological and numismatic evidence</span> for early states. The Mauryan Empire is <span class="hl-term hl-bg-term">the most extensively documented early Indian empire</span> due to Ashoka's inscriptions.</div></div>`;
    html += `</div></section>`;

    // ===== 2. SOURCES FOR MAURYAN HISTORY =====
    html += `<section id="maurya-sources">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-book text-indigo-400"></i> 2. Sources for Mauryan History</h2>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-feather-pointed text-cyan-400 text-xs"></i> Literary Sources</h3>`;

    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Arthashastra</span> by <span class="hl-ruler hl-bg-ruler">Kautilya/Chanakya</span> — treatise on <span class="hl-term">statecraft, economics, military strategy</span>; parts probably composed by him, though the surviving text may be a later compilation</li>`;
    html += `<li><span class="hl-term hl-bg-term">Indica</span> by <span class="hl-ruler">Megasthenes</span> — <span class="hl-term">Greek ambassador</span> to Chandragupta's court; survives only in <span class="hl-event">fragments</span> quoted by later Greek writers (Strabo, Arrian, Diodorus)</li>`;
    html += `<li><span class="hl-term">Buddhist literature</span> — <span class="hl-term">Dipavamsa</span> and <span class="hl-term">Mahavamsa</span> (Sri Lankan chronicles) mention Ashoka's role in spreading Buddhism</li>`;
    html += `<li><span class="hl-term">Jaina literature</span> — references to Chandragupta's conversion to Jainism</li>`;
    html += `<li><span class="hl-term">Puranic literature</span> — lists of Mauryan kings in the Puranas</li>`;
    html += `<li><span class="hl-term">Sanskrit literary works</span> — later works like the <span class="hl-term">Mudrarakshasa</span> by <span class="hl-ruler">Vishakhadatta</span> (a Sanskrit play that dramatizes Chandragupta and Chanakya's overthrow of the Nandas)</li>`;
    html += `<li>Kashmiri historian <span class="hl-ruler">Kalhana's</span> <span class="hl-term">Rajatarangini</span> (12th century CE) — mentions Mauryan rule in Kashmir</li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-hard-hat text-cyan-400 text-xs"></i> Archaeological Sources</h3>`;

    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Ashokan inscriptions</span> on rocks and pillars — written in <span class="hl-term hl-bg-term">Brahmi script</span> (deciphered by <span class="hl-ruler hl-bg-ruler">James Prinsep</span> in <span class="hl-date">1837 CE</span>)</li>`;
    html += `<li><span class="hl-num">14 Major Rock Edicts</span>, Minor Rock Edicts, and <span class="hl-num">7 Pillar Edicts</span></li>`;
    html += `<li><span class="hl-arch hl-bg-arch">Sculpture and art</span> — <span class="hl-arch hl-bg-arch">Lion Capital at Sarnath</span> (now <span class="hl-term hl-bg-term">India's national emblem</span>)</li>`;
    html += `<li><span class="hl-arch">Ashokan pillars</span> with <span class="hl-term">highly polished surfaces</span> (non-corrosive) — a technological marvel</li>`;
    html += `<li><span class="hl-arch">Buddhist stupas</span> — including the original <span class="hl-arch">Sanchi Stupa</span> (later expanded)</li>`;
    html += `<li><span class="hl-arch">Barabar Caves</span> — rock-cut caves with <span class="hl-term">polished interiors</span>, gifted to Ajivikas</li>`;
    html += `<li><span class="hl-arch">Palace at Pataliputra</span> — <span class="hl-num">80-pillared hall</span>, excavated by <span class="hl-ruler">Spooner</span></li>`;
    html += `<li><span class="hl-term">Numismatic evidence</span> — <span class="hl-term">punch-marked silver coins</span> used by the Mauryas</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The deciphering of <span class="hl-term">Brahmi script</span> by <span class="hl-ruler hl-bg-ruler">James Prinsep (1837 CE)</span> was one of the <span class="hl-term hl-bg-term">most important breakthroughs in Indian historiography</span>. It allowed scholars to read Ashoka's edicts, which are the <span class="hl-term">earliest deciphered written records</span> from ancient India. The <span class="hl-term">Indica</span> by <span class="hl-ruler">Megasthenes</span> and the <span class="hl-term">Arthashastra</span> are the <span class="hl-term hl-bg-term">two most important literary sources</span> for the Mauryan period — but both must be used critically (Megasthenes wrote for a Greek audience; Arthashastra may be a later compilation).</div></div>`;
    html += `</div></section>`;

    // ===== 3. RISE OF MAGADHA & BACKGROUND =====
    html += `<section id="maurya-rise">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-chart-line text-amber-400"></i> 3. Rise of Magadha & Background</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      The <span class="hl-term hl-bg-term">16 Mahajanapadas</span> (great kingdoms/republics) emerged in the <span class="hl-date">6th century BCE</span> in the <span class="hl-place">Ganga plain</span>. Among them, four became the most powerful:
    </p>`;

    html += `<div class="table-wrap"><table><thead><tr><th>Mahajanapada</th><th>Capital</th><th>Significance</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-dynasty">Magadha</span></td><td><span class="hl-place">Rajgir → Pataliputra</span></td><td>Most powerful — became the core of the Mauryan Empire</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Koshala</span></td><td><span class="hl-place">Shravasti</span></td><td>Ruled by King Prasenajit; associated with the Ramayana</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Vatsa</span></td><td><span class="hl-place">Kaushambi</span></td><td>Ruled by King Udayana (famous in Buddhist literature)</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Avanti</span></td><td><span class="hl-place">Ujjayini</span></td><td>Major political centre in western India</td></tr>`;
    html += `</tbody></table></div>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-up text-cyan-400 text-xs"></i> Why Magadha Became the Most Powerful</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Fertile Ganga plain</span> — rich agricultural land supported a large population and surplus food</li>`;
    html += `<li><span class="hl-term hl-bg-term">Iron deposits</span> in <span class="hl-place">Rajgir</span> — enabled the production of <span class="hl-term">strong weapons</span> and agricultural implements</li>`;
    html += `<li><span class="hl-term hl-bg-term">Elephants</span> — Magadha had access to forest elephants, giving it a <span class="hl-term">major military advantage</span></li>`;
    html += `<li><span class="hl-term hl-bg-term">Strategic location</span> — the <span class="hl-place">Ganga</span> and <span class="hl-place">Son rivers</span> provided <span class="hl-term">water transport and trade routes</span></li>`;
    html += `<li>Capital at <span class="hl-place">Pataliputra</span> was a <span class="hl-term">natural fortress</span> — surrounded by rivers on all sides</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-users text-cyan-400 text-xs"></i> Pre-Mauryan Rulers of Magadha</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Bimbisara</span> (<span class="hl-date">544-492 BCE</span>) — <span class="hl-dynasty">Haryanka dynasty</span>; contemporary of <span class="hl-term">Buddha</span>; expanded Magadha through conquest and marriage alliances</li>`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Ajatashatru</span> (<span class="hl-date">492-460 BCE</span>) — son of Bimbisara; imprisoned his father; built the fort at <span class="hl-place">Pataliputra</span></li>`;
    html += `<li><span class="hl-ruler">Udayin</span> — shifted the capital from <span class="hl-place">Rajgir</span> to <span class="hl-place">Pataliputra</span></li>`;
    html += `<li><span class="hl-dynasty hl-bg-dynasty">Nanda dynasty</span> (<span class="hl-date">345-322 BCE</span>) — under <span class="hl-ruler">Mahapadma Nanda</span>, Magadha became <span class="hl-term">immensely wealthy and powerful</span>; but the Nandas were <span class="hl-event">unpopular due to heavy taxation</span></li>`;
    html += `<li><span class="hl-event hl-bg-event">Alexander's invasion</span> (<span class="hl-date">327-325 BCE</span>) — created a <span class="hl-term">political vacuum in the northwest</span>, which Chandragupta later exploited</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term hl-bg-term">16 Mahajanapadas</span> and the rise of <span class="hl-dynasty">Magadha</span> are fundamental topics. Remember the <span class="hl-num">4 most powerful</span>: <span class="hl-dynasty">Magadha, Koshala, Vatsa, Avanti</span>. The <span class="hl-num">5 advantages</span> of Magadha (fertile plain, iron, elephants, strategic location, river transport) are a <span class="hl-term hl-bg-term">classic UPSC question</span>. The <span class="hl-dynasty">Nanda dynasty</span> was <span class="hl-term">wealthy but unpopular</span> — this set the stage for Chandragupta's revolt.</div></div>`;
    html += `</div></section>`;

    // ===== 4. CHANDRAGUPTA MAURYA =====
    html += `<section id="maurya-chandragupta">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-1 text-amber-400"></i> 4. Chandragupta Maurya (322-297 BCE)</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-blue-500/20">`;

    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Chandragupta Maurya</span> was the <span class="hl-term hl-bg-term">founder of the Mauryan Empire</span> — India's first great imperial dynasty. His rise from obscurity to founder of a vast empire is one of the <span class="hl-term">most remarkable stories in Indian history</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-up-right-and-down-left-from-center text-cyan-400 text-xs"></i> Overthrow of the Nandas</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>With the help of his mentor <span class="hl-ruler">Chanakya</span> (also called <span class="hl-ruler">Kautilya/Vishnugupta</span>), Chandragupta <span class="hl-event hl-bg-event">overthrew the Nanda dynasty</span></li>`;
    html += `<li>The Nanda king <span class="hl-ruler">Dhana Nanda</span> was defeated and killed</li>`;
    html += `<li>Chandragupta established the <span class="hl-dynasty">Maurya dynasty</span> in <span class="hl-date">322 BCE</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crossed-swords text-cyan-400 text-xs"></i> Conflict with Seleucus Nicator (305 BCE)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Seleucus Nicator</span>, one of <span class="hl-ruler">Alexander's</span> generals, controlled the eastern satrapies (provinces) of the former Macedonian empire</li>`;
    html += `<li>Seleucus <span class="hl-event hl-bg-event">invaded India (305 BCE)</span> but was <span class="hl-battle">decisively defeated by Chandragupta</span></li>`;
    html += `<li>Treaty of <span class="hl-date">305 BCE</span>: Chandragupta received the <span class="hl-term">eastern satrapies</span> — <span class="hl-place">Gandhara (Kandahar)</span>, <span class="hl-place">Arachosia (Kandahar region)</span>, <span class="hl-place">Parapamisadae (Kabul valley)</span>, and <span class="hl-place">Gedrosia (Balochistan)</span></li>`;
    html += `<li>A <span class="hl-term">marriage alliance</span> was concluded — Seleucus gave his daughter (or a Greek princess) to Chandragupta</li>`;
    html += `<li><span class="hl-ruler">Megasthenes</span> was sent as the <span class="hl-term">Greek ambassador</span> to Chandragupta's court at Pataliputra</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-map text-cyan-400 text-xs"></i> Extent of the Empire</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>From <span class="hl-place">Afghanistan</span> in the northwest to <span class="hl-place">Bengal</span> in the east</li>`;
    html += `<li>From the <span class="hl-place">Himalayas</span> in the north to the <span class="hl-place">Narmada river</span> in the south</li>`;
    html += `<li>Included <span class="hl-place">Balochistan, Sindh, Punjab, Uttar Pradesh, Bihar, Bengal, Gujarat, parts of Madhya Pradesh and Rajasthan</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-place-of-worship text-cyan-400 text-xs"></i> Later Life & Death</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>In his later years, Chandragupta <span class="hl-event">embraced Jainism</span></li>`;
    html += `<li>He went to <span class="hl-place">Shravanabelagola</span> (in modern Karnataka) with the Jain saint <span class="hl-ruler">Bhadrabahu</span></li>`;
    html += `<li>He died by <span class="hl-term">Sallekhana</span> (<span class="hl-term">ritual fasting unto death</span>) according to <span class="hl-term">Jain tradition</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler hl-bg-ruler">Chandragupta Maurya</span> is a <span class="hl-term hl-bg-term">foundational figure</span> in Indian history. Key facts: <span class="hl-date">322 BCE</span> (founding of empire), <span class="hl-date">305 BCE</span> (victory over Seleucus), <span class="hl-term">4 eastern satrapies</span> gained from Seleucus (remember: <span class="hl-place">Gandhara, Arachosia, Parapamisadae, Gedrosia</span>), <span class="hl-ruler">Megasthenes</span> (Greek ambassador), conversion to <span class="hl-term">Jainism</span>, death by <span class="hl-term">Sallekhana</span> at <span class="hl-place">Shravanabelagola</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 5. CHANAKYA =====
    html += `<section id="maurya-chanakya">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-2 text-amber-400"></i> 5. Chanakya (Kautilya) — The Kingmaker</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;

    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Chanakya</span> (also known as <span class="hl-term">Kautilya</span> or <span class="hl-term">Vishnugupta</span>) was the <span class="hl-term">prime minister and chief advisor</span> to <span class="hl-ruler">Chandragupta Maurya</span>. He is <span class="hl-term hl-bg-term">one of the most brilliant political thinkers and strategists in Indian history</span> — often called the <span class="hl-term">"Indian Machiavelli"</span> (though he predates Machiavelli by over 1,800 years).
    </p>`;

    html += `<ul class="bullet-list">`;
    html += `<li>Authored the <span class="hl-term hl-bg-term">Arthashastra</span> — a comprehensive treatise on <span class="hl-term">statecraft, economic policy, military strategy, law, and diplomacy</span></li>`;
    html += `<li>The Arthashastra is divided into <span class="hl-num">15 books (adhyakas)</span> and <span class="hl-num">180 sections</span></li>`;
    html += `<li>He <span class="hl-event">discovered Chandragupta</span> as a child — according to legend, he saw the boy playing 'king' with his friends and recognized his potential</li>`;
    html += `<li><span class="hl-event">Planned and executed the overthrow</span> of the <span class="hl-dynasty">Nanda dynasty</span></li>`;
    html += `<li>Established the <span class="hl-dynasty">Mauryan Empire</span> under Chandragupta's rule</li>`;
    html += `<li>The play <span class="hl-term">Mudrarakshasa</span> by <span class="hl-ruler">Vishakhadatta</span> dramatizes Chanakya's political machinations — including his <span class="hl-term">use of deception, poison, and secret agents</span> to eliminate rivals</li>`;
    html += `<li>According to Jain tradition, Chanakya also accompanied Chandragupta to <span class="hl-place">Shravanabelagola</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-book-open text-cyan-400 text-xs"></i> Key Concepts from Arthashastra</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Saptanga theory</span> — the <span class="hl-num">7 elements</span> of state: <span class="hl-term">Swami (king), Amatya (minister), Janapada (territory), Durga (fort), Kosa (treasury), Danda (army), Mitra (ally)</span></li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Mandal theory</span> — concept of a <span class="hl-term">circle of states</span> in which the king's immediate neighbour is the natural enemy, and the neighbour's neighbour is the natural ally</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Dandaniti</span> — the science of <span class="hl-term">punishment and law enforcement</span></li>`;
    html += `<li><span class="hl-term">Use of spies (gudhapurushas)</span> — an extensive intelligence network</li>`;
    html += `<li>Detailed administration of <span class="hl-term">finance, trade, agriculture, mining, forestry, and taxation</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler hl-bg-ruler">Chanakya/Kautilya</span> and the <span class="hl-term hl-bg-term">Arthashastra</span> are <span class="hl-term hl-bg-term">extremely important for UPSC</span>. Key concepts: <span class="hl-term">Saptanga (7 elements of state)</span>, <span class="hl-policy">Mandal theory</span> (circle of states), <span class="hl-policy">Dandaniti</span>, the use of <span class="hl-term">spies</span>. The <span class="hl-term">Mudrarakshasa</span> (by Vishakhadatta) is a <span class="hl-term">Sanskrit play</span> that provides dramatic evidence of Chanakya's political methods. Note: Chanakya is also called <span class="hl-term">Vishnugupta</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 6. BINDUSARA =====
    html += `<section id="maurya-bindusara">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-3 text-amber-400"></i> 6. Bindusara (297-272 BCE)</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-blue-500/20">`;

    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Bindusara</span> was the <span class="hl-term">son of Chandragupta Maurya</span> and father of <span class="hl-ruler">Ashoka</span>. He ruled for approximately <span class="hl-num">25 years</span> (<span class="hl-date">297-272 BCE</span>).
    </p>`;

    html += `<ul class="bullet-list">`;
    html += `<li>The Greeks called him <span class="hl-term hl-bg-term">"Amitraghata"</span> — meaning <span class="hl-term">"slayer of enemies"</span></li>`;
    html += `<li>He <span class="hl-event">extended the Mauryan empire southward</span> up to <span class="hl-place">Karnataka</span></li>`;
    html += `<li>Ruled <span class="hl-term">almost the entire peninsula</span></li>`;
    html += `<li><span class="hl-ruler">Deimachus</span> was the <span class="hl-term">Greek ambassador</span> at Bindusara's court</li>`;
    html += `<li>Bindusara is said to have requested <span class="hl-ruler">Antiochus I (Soter)</span> of Syria to send him <span class="hl-term">sweet wine, dried figs, and a Sophist (philosopher)</span> — Antiochus sent the wine and figs but politely declined the philosopher</li>`;
    html += `<li>According to <span class="hl-term">Buddhist tradition</span>, Bindusara was a follower of <span class="hl-term">Ajivika philosophy</span></li>`;
    html += `<li>Two <span class="hl-term">inscriptions</span> of Ashoka mention Bindusara — the <span class="hl-term">Queens' Edict</span> and the commentary in the <span class="hl-term">Minor Rock Edict</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler">Bindusara</span> is often called the <span class="hl-term">"son of the founder and father of the greatest"</span> Mauryan ruler. His Greek title <span class="hl-term hl-bg-term">"Amitraghata" (slayer of enemies)</span> is frequently asked. The Greek ambassador <span class="hl-ruler">Deimachus</span> and his request to Antiochus for wine, figs, and a philosopher are unique facts. Bindusara's <span class="hl-term">southward expansion</span> set the stage for the empire's maximum extent under Ashoka.</div></div>`;
    html += `</div></section>`;

    // ===== 7. ASHOKA =====
    html += `<section id="maurya-ashoka">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-star text-yellow-400"></i> 7. Ashoka (268-232 BCE) — The Greatest Mauryan</h2>`;

    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-yellow-500/30">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Ashoka</span> (also called <span class="hl-term">Devapriya Priyadarshi</span> — "Beloved of the Gods, of Gracious Appearance") is <span class="hl-term hl-bg-term">the greatest ruler of the Mauryan Empire</span> and one of the most remarkable rulers in world history. He <span class="hl-event">transformed from a conquering warrior to a peace-loving Buddhist emperor</span> after the <span class="hl-battle">Kalinga War</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crown text-cyan-400 text-xs"></i> Early Life & Accession</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Son of <span class="hl-ruler">Bindusara</span> and Queen <span class="hl-term">Subhadrangi</span> (also called <span class="hl-term">Dharma</span>)</li>`;
    html += `<li>Fought a <span class="hl-event hl-bg-event">war of succession</span> against his brothers after Bindusara's death</li>`;
    html += `<li>According to <span class="hl-term">Buddhist tradition</span>, Ashoka killed <span class="hl-num">99</span> of his brothers to secure the throne — though this is likely <span class="hl-term">exaggerated</span></li>`;
    html += `<li><span class="hl-event hl-bg-event">Coronation</span> took place in <span class="hl-date">268 BCE</span></li>`;
    html += `<li>Buddhist sources call him <span class="hl-term">"Chandashoka"</span> (Ashoka the Fierce) in his early reign</li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-red-500/30">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crossed-swords text-red-400 text-xs"></i> The Kalinga War (261 BCE)</h3>`;
    html += `<p class="content-text">
      The <span class="hl-battle hl-bg-battle">Kalinga War (261 BCE)</span> was the <span class="hl-term hl-bg-term">defining event of Ashoka's life</span>. Kalinga (modern <span class="hl-place">Odisha</span>) was a prosperous kingdom on the eastern coast that resisted Mauryan expansion.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Ashoka <span class="hl-event hl-bg-event">invaded Kalinga in the 8th year of his reign</span> (<span class="hl-date">261 BCE</span>)</li>`;
    html += `<li>The <span class="hl-battle">war was exceptionally bloody</span> — Ashoka's own <span class="hl-term">Major Rock Edict XIII</span> states: <span class="hl-term hl-bg-term">"150,000 were deported, 100,000 were killed, and many more died"</span></li>`;
    html += `<li><span class="hl-event hl-bg-event">Horrified by the carnage</span>, Ashoka <span class="hl-event">converted to Buddhism</span></li>`;
    html += `<li>He <span class="hl-policy hl-bg-policy">gave up the policy of war and conquest</span> (<span class="hl-term">digvijaya</span> — conquest through war) and adopted <span class="hl-term hl-bg-term">dhammavijaya</span> (conquest through righteousness)</li>`;
    html += `<li>The Kalinga War is <span class="hl-term">the only war in history that directly resulted in the victor renouncing war</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-battle hl-bg-battle">Kalinga War (261 BCE)</span> is one of the <span class="hl-term hl-bg-term">most famous events in Indian history</span>. It is the <span class="hl-term hl-bg-term">supreme example of how war can change a ruler's heart</span>. Ashoka's own inscription (<span class="hl-term">Major Rock Edict XIII</span>) is the primary source. The conversion from <span class="hl-term">digvijaya</span> to <span class="hl-term">dhammavijaya</span> is a key conceptual shift. Remember the <span class="hl-num">specific numbers</span>: <span class="hl-num">100,000 killed, 150,000 deported</span>.</div></div>`;
    html += `</div>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-hand-holding-heart text-cyan-400 text-xs"></i> Dhamma & Buddhist Patronage</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>After Kalinga, Ashoka <span class="hl-event">embraced Buddhism</span> under the guidance of the Buddhist monk <span class="hl-ruler">Upagupta</span> (also called <span class="hl-term">Moggaliputta Tissa</span> in some traditions)</li>`;
    html += `<li>Adopted the policy of <span class="hl-policy hl-bg-policy">Dhamma</span> — a <span class="hl-term">moral code of righteousness</span>, not a religion</li>`;
    html += `<li><span class="hl-term hl-bg-term">Spread Buddhism</span> to <span class="hl-place">Sri Lanka, Southeast Asia, West Asia</span></li>`;
    html += `<li>Sent <span class="hl-term">missionaries</span> — including his own <span class="hl-term">son Mahendra and daughter Sanghamitta</span> — to <span class="hl-place">Sri Lanka</span></li>`;
    html += `<li>Held the <span class="hl-term hl-bg-term">Third Buddhist Council</span> at <span class="hl-place">Pataliputra</span> (under <span class="hl-ruler">Moggaliputta Tissa</span>) — this council led to the <span class="hl-term">splitting of the Buddhist sangha</span> and the dispatch of missionaries</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-map text-cyan-400 text-xs"></i> Extent of Ashoka's Empire</h3>`;
    html += `<p class="content-text">Ashoka's empire was the <span class="hl-term hl-bg-term">largest in Indian history up to that point</span>. Its boundaries:</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-place">Afghanistan</span> (NW) — including Kandahar and Herat</li>`;
    html += `<li><span class="hl-place">Bengal</span> (E)</li>`;
    html += `<li><span class="hl-place">Karnataka</span> (S) — up to <span class="hl-place">Chitradurga district</span></li>`;
    html += `<li><span class="hl-place">Himalayas</span> (N)</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-building-columns text-cyan-400 text-xs"></i> Provincial Capitals</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-place">Pataliputra</span> — capital</li>`;
    html += `<li><span class="hl-place">Taxila</span> — provincial capital of the northwest</li>`;
    html += `<li><span class="hl-place">Ujjayini</span> — provincial capital of the west</li>`;
    html += `<li><span class="hl-place">Tosali</span> — provincial capital of the east (Kalinga region)</li>`;
    html += `<li><span class="hl-place">Suvarnagiri</span> — provincial capital of the south (Karnataka)</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler hl-bg-ruler">Ashoka</span> is the <span class="hl-term hl-bg-term">most important Mauryan ruler</span> for UPSC. Key facts: <span class="hl-battle">Kalinga War (261 BCE)</span>, conversion to Buddhism, <span class="hl-policy">Dhamma</span> policy, <span class="hl-term">Third Buddhist Council</span>, sending of son <span class="hl-ruler">Mahendra</span> and daughter <span class="hl-ruler">Sanghamitta</span> to Sri Lanka, <span class="hl-num">5 provincial capitals</span> (<span class="hl-place">Taxila, Ujjayini, Tosali, Suvarnagiri</span>), and his <span class="hl-term">inscriptions on rocks and pillars</span>. He was the <span class="hl-term hl-bg-term">first ruler in Indian history to leave behind written inscriptions</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 8. ASHOKA'S INSCRIPTIONS =====
    html += `<section id="maurya-inscriptions">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-table text-indigo-400"></i> 8. Ashoka's Inscriptions</h2>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Ashoka was the first Indian ruler to inscribe his messages on rocks and pillars</span>. His inscriptions are <span class="hl-term hl-bg-term">the earliest deciphered written records from ancient India</span> and provide invaluable information about his reign, administration, and Dhamma.
    </p>`;
    html += `</div>`;

    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-mountain text-cyan-400 text-xs"></i> Major Rock Edicts (14)</h3>`;
    html += `<p class="content-text">
      The <span class="hl-num hl-bg-num">14 Major Rock Edicts (MREs)</span> are found engraved on <span class="hl-term">natural rock faces</span> at key locations across the empire. They represent Ashoka's <span class="hl-term">comprehensive statement of policy and Dhamma</span>.
    </p>`;
    html += `<div class="table-wrap"><table><thead><tr><th>Location</th><th>Modern Location</th><th>Script</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-place">Shahbazgarhi</span></td><td>Khyber-Pakhtunkhwa, Pakistan</td><td><span class="hl-term">Kharosthi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Mansehra</span></td><td>Khyber-Pakhtunkhwa, Pakistan</td><td><span class="hl-term">Kharosthi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Kalsi</span></td><td>Uttarakhand, India</td><td><span class="hl-term">Brahmi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Girnar</span></td><td>Junagadh, Gujarat</td><td><span class="hl-term">Brahmi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Dhauli</span></td><td>Odisha, India</td><td><span class="hl-term">Brahmi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Jaugada</span></td><td>Odisha, India</td><td><span class="hl-term">Brahmi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Sopara</span></td><td>Maharashtra, India</td><td><span class="hl-term">Brahmi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Yerragudi</span></td><td>Andhra Pradesh, India</td><td><span class="hl-term">Brahmi</span></td></tr>`;
    html += `<tr><td><span class="hl-place">Kandahar</span></td><td>Afghanistan</td><td><span class="hl-term">Greek & Aramaic</span> (bilingual)</td></tr>`;
    html += `</tbody></table></div>`;
    html += `</div>`;

    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-stairs text-cyan-400 text-xs"></i> Minor Rock Edicts</h3>`;
    html += `<p class="content-text">
      Found at many locations across India. They are <span class="hl-term">shorter and earlier</span> than the Major Rock Edicts. Key fact: the <span class="hl-term hl-bg-term">Minor Rock Edict at Maski (Karnataka)</span> is the <span class="hl-term hl-bg-term">first inscription to mention Ashoka by name</span> (<span class="hl-term">"Devanaampiya Asoka"</span>).
    </p>`;
    html += `</div>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-tree text-cyan-400 text-xs"></i> Pillar Edicts (7)</h3>`;
    html += `<p class="content-text">
      The <span class="hl-num hl-bg-num">7 Pillar Edicts</span> were inscribed on <span class="hl-term hl-bg-term">polished sandstone pillars</span> — a distinctive Mauryan <span class="hl-arch">technological marvel</span>. The pillars are <span class="hl-term">monolithic</span> (carved from a single piece of stone), up to <span class="hl-num">15m high</span>, weighing up to <span class="hl-num">50 tons</span>. They were <span class="hl-term">transported from Chunar (Mirzapur, UP)</span> to various locations across the empire. The <span class="hl-term hl-bg-term">non-corrosive polish</span> on these pillars is a <span class="hl-term">lost technology</span>.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-place">Delhi-Topra</span> pillar — originally at Topra, Haryana; moved to Delhi by <span class="hl-ruler">Firuz Shah Tughlaq</span></li>`;
    html += `<li><span class="hl-place">Delhi-Meerut</span> pillar — originally at Meerut; moved to Delhi by Firuz Shah Tughlaq</li>`;
    html += `<li><span class="hl-place">Allahabad (Prayagraj)</span> pillar — contains Ashokan edicts alongside later inscriptions by <span class="hl-ruler">Samudragupta</span> and <span class="hl-ruler">Jahangir</span></li>`;
    html += `<li><span class="hl-place">Lauriya-Areraj</span> (Bihar)</li>`;
    html += `<li><span class="hl-place">Lauriya-Nandangarh</span> (Bihar)</li>`;
    html += `<li><span class="hl-place">Rampurva</span> (Bihar) — crowned with a <span class="hl-arch">bull capital</span></li>`;
    html += `<li><span class="hl-place">Sarnath</span> (Uttar Pradesh) — the most famous, crowned with the <span class="hl-arch hl-bg-arch">Lion Capital</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-globe text-cyan-400 text-xs"></i> Languages & Scripts</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Prakrit</span> — the most common language, written in <span class="hl-term">Brahmi script</span></li>`;
    html += `<li><span class="hl-term">Kharosthi script</span> — used in the northwest (modern Pakistan/Afghanistan region)</li>`;
    html += `<li><span class="hl-term">Greek and Aramaic</span> — the <span class="hl-term">Kandahar bilingual inscription</span> is in Greek and Aramaic</li>`;
    html += `<li>Ashoka used <span class="hl-term">local languages and scripts</span> to ensure his message reached all subjects</li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-indigo-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-list-check text-cyan-400 text-xs"></i> Key Edicts & Their Contents</h3>`;
    html += `<div class="table-wrap"><table><thead><tr><th>Edict</th><th>Content</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-term">MRE I</span></td><td>Prohibition of animal sacrifice and festive gatherings</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE II</span></td><td>Medical treatment for humans and animals; planting medicinal herbs</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE III</span></td><td>Generosity to Brahmins and ascetics; every 5 years officers tour the empire</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE IV</span></td><td>Non-violence; reduction in killing of living creatures</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE V</span></td><td>Appointment of Dhamma Mahamattas (officers to spread Dhamma)</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE VI</span></td><td>Ashoka's desire to be constantly informed about the people's affairs</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE VII</span></td><td>Tolerance of all religions; request for harmony among all sects</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE VIII</span></td><td>Ashoka replaced royal hunts (vihara) with pilgrimages (dhamma-yatra)</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE IX</span></td><td>Condemnation of popular ceremonies; value of Dhamma practices</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE X</span></td><td>Ashoka desires only spiritual conquest (dhammavijaya)</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE XI</span></td><td>Praise of Dhamma; gifts do not matter as much as Dhamma practice</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE XII</span></td><td>Honour all sects; respect for others' beliefs</td></tr>`;
    html += `<tr><td><span class="hl-term hl-bg-term">MRE XIII</span></td><td><span class="hl-battle">THE KALINGA WAR EDICT</span> — describes the horrors of war; Ashoka's remorse; only conquest through Dhamma is true conquest</td></tr>`;
    html += `<tr><td><span class="hl-term">MRE XIV</span></td><td>Edicts have been inscribed in various forms for greater reach</td></tr>`;
    html += `</tbody></table></div>`;
    html += `</div>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">Ashoka's inscriptions are a <span class="hl-term hl-bg-term">highly important UPSC topic</span>. Key points: <span class="hl-num">14 Major Rock Edicts, 7 Pillar Edicts, Minor Rock Edicts</span>; the <span class="hl-term">Maski edict</span> first mentions Ashoka by name; <span class="hl-term">MRE XIII</span> is the Kalinga War edict; <span class="hl-term">Brahmi script</span> deciphered by <span class="hl-ruler">James Prinsep (1837)</span>; the <span class="hl-term">Kandahar</span> inscription is bilingual (Greek/Aramaic); <span class="hl-term">Chunar sandstone</span> pillars with <span class="hl-term">non-corrosive polish</span>. The <span class="hl-arch">Lion Capital at Sarnath</span> is India's national emblem.</div></div>`;
    html += `</div></section>`;

    // ===== 9. MAURYAN ADMINISTRATION =====
    html += `<section id="maurya-admin">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-building-columns text-emerald-400"></i> 9. Mauryan Administration</h2>`;

    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-sitemap text-cyan-400 text-xs"></i> Central Administration</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Emperor (King)</span> — source of all authority, commanded the army, headed the administration, made laws</li>`;
    html += `<li><span class="hl-term hl-bg-term">Mantriparishad</span> (Council of Ministers) — headed by the <span class="hl-term">Mantriparishad-adhyaksha</span> (Prime Minister)</li>`;
    html += `<li><span class="hl-term">Mantris</span> — ministers who advised the king on various matters</li>`;
    html += `<li><span class="hl-term">Mahamattas</span> — high-ranking officials</li>`;
    html += `<li><span class="hl-term">Amatyas</span> — administrative and judicial officers</li>`;
    html += `<li><span class="hl-term">Adhyakshyas</span> — heads of various departments (secretariat); there were numerous <span class="hl-term">Adhyakshyas</span> for different functions like trade, mining, agriculture, etc.</li>`;
    html += `</ul>`;

    html += `<div class="table-wrap"><table><thead><tr><th>Department</th><th>Official (Adhyakshya)</th><th>Function</th></tr></thead><tbody>`;
    html += `<tr><td>Trade & Commerce</td><td><span class="hl-term">Panyadhyakshya</span></td><td>Regulation of trade, weights, and measures</td></tr>`;
    html += `<tr><td>Mines & Metals</td><td><span class="hl-term">Akaradhyakshya</span></td><td>Management of mines and metal production</td></tr>`;
    html += `<tr><td>Agriculture</td><td><span class="hl-term">Sitadhyakshya</span></td><td>Management of crown lands (Sita)</td></tr>`;
    html += `<tr><td>Forestry</td><td><span class="hl-term">Kupyadhyakshya</span></td><td>Management of forest products</td></tr>`;
    html += `<tr><td>Salt</td><td><span class="hl-term">Lavanadhyakshya</span></td><td>Salt tax collection and regulation</td></tr>`;
    html += `<tr><td>Gold & Jewellery</td><td><span class="hl-term">Suvarnadhyakshya</span></td><td>Supervision of goldsmiths</td></tr>`;
    html += `</tbody></table></div>`;
    html += `</div>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-map-location-dot text-cyan-400 text-xs"></i> Provincial Administration</h3>`;
    html += `<p class="content-text">The empire was divided into <span class="hl-num">5 major political centres</span>:</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-place">Pataliputra</span> — the imperial capital</li>`;
    html += `<li><span class="hl-place">Taxila</span> — provincial centre for northwest</li>`;
    html += `<li><span class="hl-place">Ujjayini</span> — provincial centre for west</li>`;
    html += `<li><span class="hl-place">Tosali</span> — provincial centre for east (Kalinga)</li>`;
    html += `<li><span class="hl-place">Suvarnagiri</span> — provincial centre for south</li>`;
    html += `</ul>`;
    html += `<p class="content-text">Provinces were governed by <span class="hl-term">Kumara</span> (royal prince as viceroy) or <span class="hl-term">Aryaputra</span>. The local administration hierarchy included:</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Pradeshika</span> — governor/district magistrate in charge of districts</li>`;
    html += `<li><span class="hl-term">Sthanika</span> — tax collectors acting under Pradeshika</li>`;
    html += `<li><span class="hl-term">Nagaraka</span> — city administrator (as described in the Arthashastra)</li>`;
    html += `<li><span class="hl-term">Gramika</span> — village headman</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-layers text-cyan-400 text-xs"></i> Administrative Units</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Village (grama) — governed by <span class="hl-term">Gramika</span></li>`;
    html += `<li><span class="hl-num">10 villages</span> — under a <span class="hl-term">Sangrahani</span></li>`;
    html += `<li><span class="hl-num">200 villages</span> — under a <span class="hl-term">Karvatika</span></li>`;
    html += `<li><span class="hl-num">400 villages</span> — under a <span class="hl-term">Dronamukha</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-city text-cyan-400 text-xs"></i> City Administration (Pataliputra)</h3>`;
    html += `<p class="content-text">
      According to <span class="hl-ruler">Megasthenes'</span> account, Pataliputra was administered by a <span class="hl-term hl-bg-term">City Commission of 30 members</span> divided into <span class="hl-num">6 committees of 5 members each</span>:
    </p>`;
    html += `<div class="table-wrap"><table><thead><tr><th>#</th><th>Committee</th><th>Function</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-num">1</span></td><td>Industrial Arts</td><td>Regulation of manufacturing and crafts</td></tr>`;
    html += `<tr><td><span class="hl-num">2</span></td><td>Foreigners</td><td>Looking after welfare and surveillance of foreigners</td></tr>`;
    html += `<tr><td><span class="hl-num">3</span></td><td>Births & Deaths</td><td>Registration of births and deaths</td></tr>`;
    html += `<tr><td><span class="hl-num">4</span></td><td>Trade & Commerce</td><td>Regulation of trade, weights, measures</td></tr>`;
    html += `<tr><td><span class="hl-num">5</span></td><td>Public Sale</td><td>Supervision of public sales of goods</td></tr>`;
    html += `<tr><td><span class="hl-num">6</span></td><td>Tax Collection</td><td>Collection of taxes on merchandise (10% tax)</td></tr>`;
    html += `</tbody></table></div>`;
    html += `</div>`;

    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-shield-halved text-cyan-400 text-xs"></i> Military Administration</h3>`;
    html += `<p class="content-text">The Mauryan army was vast and well-organized. <span class="hl-ruler">Megasthenes</span> mentions a <span class="hl-term hl-bg-term">Military Board of 6 committees</span>, each with 5 members:</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Infantry (patti)</li>`;
    html += `<li>Cavalry (ashwa)</li>`;
    html += `<li>Chariots (ratha)</li>`;
    html += `<li>Elephants (gaja)</li>`;
    html += `<li>Navy (navy)</li>`;
    html += `<li>Transport & Supplies</li>`;
    html += `</ul>`;
    html += `<p class="content-text">The king had a <span class="hl-term">royal bodyguard of women archers</span>. The Mauryan army was one of the <span class="hl-term">largest standing armies of the ancient world</span>.</p>`;
    html += `</div>`;

    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-coins text-cyan-400 text-xs"></i> Economics & Revenue</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Land revenue</span> — the main source of income; usually <span class="hl-num">1/4th to 1/6th</span> of the produce</li>`;
    html += `<li><span class="hl-term">Sita</span> — crown lands cultivated directly by the state</li>`;
    html += `<li><span class="hl-term">Bali</span> — a voluntary offering that became a compulsory tax</li>`;
    html += `<li><span class="hl-term">Bhaga</span> — king's share of the produce</li>`;
    html += `<li>State controlled <span class="hl-term">mines, forests, salt, and irrigation</span></li>`;
    html += `<li>Trade and commerce were <span class="hl-term">regulated by the state</span></li>`;
    html += `<li>The Arthashastra details a <span class="hl-term hl-bg-term">comprehensive taxation system</span> covering virtually all economic activities</li>`;
    html += `<li>Punch-marked silver coins were used as <span class="hl-term">currency</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term hl-bg-term">Mauryan administration</span> is a <span class="hl-term hl-bg-term">very important topic for UPSC</span>. Key points: <span class="hl-term">Mantriparishad</span> (council of ministers), <span class="hl-term">6-city commission</span> of Pataliputra (from Megasthenes), <span class="hl-term">6 military boards</span>, the <span class="hl-term">Pradeshika-Sthanika-Gramika</span> hierarchy, and <span class="hl-term">Kumara/Aryaputra</span> as provincial governors. The <span class="hl-term">Arthashastra</span> provides the detailed framework of administration. The <span class="hl-term">Saptanga theory</span> (7 elements of state) is the theoretical foundation of Mauryan governance.</div></div>`;
    html += `</div></section>`;

    // ===== 10. ART & ARCHITECTURE =====
    html += `<section id="maurya-art">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-landmark text-pink-400"></i> 10. Mauryan Art & Architecture</h2>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;
    html += `<p class="content-text">
      The Mauryan period marks <span class="hl-term hl-bg-term">the beginning of large-scale stone sculpture and architecture in India</span>. The <span class="hl-term">royal patronage</span> of Ashoka and the <span class="hl-term">highly skilled craftsmen</span> produced some of the finest monuments of ancient India.
    </p>`;
    html += `</div>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-palace text-cyan-400 text-xs"></i> Royal Palaces</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Megasthenes</span> describes the palace at <span class="hl-place">Pataliputra</span> as a magnificent <span class="hl-arch">wooden palace with gilded pillars, golden vine decorations, silver birds, and richly decorated halls</span></li>`;
    html += `<li>The <span class="hl-arch">80-pillared hall</span> at Pataliputra was excavated by <span class="hl-ruler">Spooner</span> — it had stone pillars arranged in <span class="hl-num">10 rows of 8</span></li>`;
    html += `<li>The palace was located in a <span class="hl-term">large park with artificial lakes, fountains, and fish ponds</span></li>`;
    html += `<li>The wooden structure suggests a <span class="hl-term">tradition of wood architecture</span> that preceded the shift to stone</li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-tree text-cyan-400 text-xs"></i> Ashokan Pillars</h3>`;
    html += `<p class="content-text">
      The Ashokan pillars are <span class="hl-term hl-bg-term">the most iconic Mauryan architectural achievement</span>. They are <span class="hl-term">monolithic columns</span> made of <span class="hl-term">Chunar sandstone</span>, transported from <span class="hl-place">Mirzapur (Uttar Pradesh)</span> to various parts of the empire. The <span class="hl-term hl-bg-term">highly polished surface (Mauryan polish)</span> is a <span class="hl-term">technological marvel</span> — it has remained non-corrosive for over 2,000 years.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Each pillar is carved from a <span class="hl-term hl-bg-term">single piece of stone</span></li>`;
    html += `<li>Height: up to <span class="hl-num">15 meters</span> (50 feet)</li>`;
    html += `<li>Weight: up to <span class="hl-num">50 tons</span></li>`;
    html += `<li>Crowned with elaborate <span class="hl-arch">animal capitals</span> (lions, bulls, elephants)</li>`;
    html += `<li>The <span class="hl-arch hl-bg-arch">Lion Capital at Sarnath</span> — most famous — now the <span class="hl-term hl-bg-term">National Emblem of India</span></li>`;
    html += `<li>The <span class="hl-arch">Bull Capital at Rampurva</span></li>`;
    html += `<li>The <span class="hl-arch">Elephant Capital at Sankissa</span></li>`;
    html += `<li>The pillars were quarried at <span class="hl-place">Chunar (Mirzapur, UP)</span> and transported by <span class="hl-term">river (Ganga and Yamuna)</span> and then overland</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-arch">Ashokan pillars</span> and their <span class="hl-term">Mauryan polish</span> are frequently asked in UPSC. The <span class="hl-arch hl-bg-arch">Lion Capital at Sarnath</span> (national emblem) is the <span class="hl-term hl-bg-term">most important Mauryan artifact</span>. The pillars demonstrate the <span class="hl-term">technological sophistication</span> of Mauryan artisans. The <span class="hl-term">animal capitals</span> (lion, bull, elephant) are important. The <span class="hl-term">columns were monolithic</span> — single-piece stone.</div></div>`;
    html += `</div>`;

    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-cave text-cyan-400 text-xs"></i> Rock-Cut Caves (Barabar Caves)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The <span class="hl-arch hl-bg-arch">Barabar Caves</span> (in modern Bihar) are the <span class="hl-term hl-bg-term">earliest surviving rock-cut caves in India</span></li>`;
    html += `<li>They were <span class="hl-event">gifted by Ashoka to the Ajivika sect</span></li>`;
    html += `<li>The caves have <span class="hl-term hl-bg-term">highly polished interiors</span> — the same Mauryan polish technology</li>`;
    html += `<li>Key caves: <span class="hl-arch">Lomas Rishi Cave</span>, <span class="hl-arch">Sudama Cave</span></li>`;
    html += `<li>Lomas Rishi Cave has an <span class="hl-arch">elaborate arched entrance</span> imitating wooden architecture — showing the transition from wood to stone</li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-circle text-cyan-400 text-xs"></i> Stupas</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-arch">Stupas</span> were <span class="hl-term">mounds of earth or brick</span> built over Buddhist relics</li>`;
    html += `<li><span class="hl-arch hl-bg-arch">Sanchi Stupa</span> — originally built during Ashoka's time (later expanded during the <span class="hl-dynasty">Shungas</span> and <span class="hl-dynasty">Satavahanas</span>)</li>`;
    html += `<li>Ashoka is said to have built <span class="hl-num">84,000 stupas</span> across the empire — though this is a traditional number, it shows the scale of his patronage</li>`;
    html += `<li>Famous stupas include those at <span class="hl-place">Sanchi, Bharhut, Sarnath, Bodh Gaya</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crown text-cyan-400 text-xs"></i> Stone Sculpture</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The Mauryan period saw <span class="hl-term hl-bg-term">the first large-scale stone sculpture in India</span></li>`;
    html += `<li>Key sculptures: <span class="hl-arch">Didarganj Yakshi</span> (a female figure with Mauryan polish), <span class="hl-arch">Parkham Yaksha</span></li>`;
    html += `<li>These sculptures represent <span class="hl-term">folk deities (Yakshas and Yakshis)</span> — showing Mauryan integration of popular cults</li>`;
    html += `<li>Mauryan sculpture is characterized by <span class="hl-term">high polish, sturdy proportions, and dignified posture</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">Mauryan art is a <span class="hl-term hl-bg-term">major UPSC topic</span>. Key artifacts: <span class="hl-arch">Lion Capital (Sarnath)</span> — national emblem; <span class="hl-arch">Didarganj Yakshi</span> — Mauryan polish; <span class="hl-arch">Barabar Caves</span> — earliest rock-cut caves; <span class="hl-arch">Sanchi Stupa</span> — originally Mauryan; <span class="hl-arch">80-pillared hall at Pataliputra</span>. The <span class="hl-term">Mauryan polish</span> (non-corrosive) is a unique technological achievement. The <span class="hl-term">transition from wood to stone architecture</span> occurred during this period.</div></div>`;
    html += `</div></section>`;

    // ===== 11. ASHOKA'S DHAMMA =====
    html += `<section id="maurya-dhamma">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-hand-peace text-emerald-400"></i> 11. Ashoka's Dhamma</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;

    html += `<p class="content-text">
      <span class="hl-policy hl-bg-policy">Dhamma</span> (Sanskrit: <span class="hl-term">Dharma</span>) was <span class="hl-term hl-bg-term">not a religion but a moral code of conduct</span> that Ashoka propagated across his empire. It was a <span class="hl-term">practical ethical system</span> designed to create a harmonious society. <span class="hl-term hl-bg-term">Dhamma is one of the most original concepts in ancient Indian political thought</span> — a ruler using state resources to promote ethical behavior rather than religious doctrine.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-list-check text-cyan-400 text-xs"></i> Principles of Dhamma</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Non-violence (Ahimsa)</span> — no killing of living beings; banned unnecessary animal sacrifice</li>`;
    html += `<li><span class="hl-term">Respect to elders and teachers</span> — proper behaviour towards parents, gurus, and seniors</li>`;
    html += `<li><span class="hl-term">Kindness to slaves and servants</span> — humane treatment of the dependent</li>`;
    html += `<li><span class="hl-term">Generosity to Brahmins and ascetics</span> — charity and donations to religious figures of all sects</li>`;
    html += `<li><span class="hl-term">Tolerance of all religions</span> — respect for all sects and beliefs; no sectarian conflict</li>`;
    html += `<li><span class="hl-term">Truthfulness</span> — speaking the truth in all matters</li>`;
    html += `<li><span class="hl-term">Compassion</span> — kindness to all living beings</li>`;
    html += `<li><span class="hl-term">Purity and righteousness</span> — moral living</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-slash text-cyan-400 text-xs"></i> What Dhamma Was NOT</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>It was <span class="hl-term hl-bg-term">not a religion</span> — Ashoka did not ask people to convert to Buddhism</li>`;
    html += `<li>It did <span class="hl-term">not involve rituals or sacrifices</span> — Ashoka condemned these</li>`;
    html += `<li>It was <span class="hl-term">not a set of theological doctrines</span> — it was practical ethics</li>`;
    html += `<li>It did <span class="hl-term">not replace existing religions</span> — it was meant to coexist with them</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-paw text-cyan-400 text-xs"></i> Animal Welfare</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Banned <span class="hl-term">unnecessary animal killing</span></li>`;
    html += `<li>Stopped the <span class="hl-term">royal hunts</span> — replaced vihara (pleasure tours) with dhamma-yatra (pilgrimages)</li>`;
    html += `<li>Created <span class="hl-term">hospitals for animals</span> along with hospitals for humans</li>`;
    html += `<li>Reduced the number of animals killed in the royal kitchen — from thousands to a few</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-church text-cyan-400 text-xs"></i> Religious Tolerance</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Ashoka <span class="hl-term hl-bg-term">tolerated all religious sects</span> — Brahmins, Shramanas (wandering ascetics), Ajivikas, Jains, Buddhists</li>`;
    html += `<li>His <span class="hl-term">Major Rock Edict XII</span> explicitly says: <span class="hl-term hl-bg-term">"All sects deserve reverence"</span></li>`;
    html += `<li>He advocated <span class="hl-term">not only tolerance but active respect</span> for other sects</li>`;
    html += `<li>Donations were given to <span class="hl-term">all religious groups</span>, not just Buddhists</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-user-tie text-cyan-400 text-xs"></i> Dhamma Mahamattas</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Ashoka appointed <span class="hl-term hl-bg-term">Dhamma Mahamattas</span> — special officers to <span class="hl-term">spread and enforce Dhamma</span></li>`;
    html += `<li>They were deployed <span class="hl-term">across the empire</span> and even in <span class="hl-term">neighbouring kingdoms</span></li>`;
    html += `<li>Their duties included <span class="hl-term">relief work, welfare of prisoners, settling disputes, and promoting Dhamma</span></li>`;
    html += `<li>They were <span class="hl-term">different from regular administrative officers</span> — a unique creation of Ashoka</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-bullhorn text-cyan-400 text-xs"></i> Public Communication</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Ashoka had his <span class="hl-term">Dhamma messages inscribed on rocks and pillars</span> across the empire</li>`;
    html += `<li>The inscriptions were in <span class="hl-term">Prakrit (local language)</span> so that common people could understand</li>`;
    html += `<li>Different scripts (<span class="hl-term">Brahmi, Kharosthi, Greek, Aramaic</span>) were used in different regions</li>`;
    html += `<li>This was a <span class="hl-term hl-bg-term">remarkable act of public communication</span> — perhaps the first such effort in world history</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-policy hl-bg-policy">Ashoka's Dhamma</span> is a <span class="hl-term hl-bg-term">very important UPSC concept</span>. It is different from Buddhism — it was a <span class="hl-term">moral code, not a religion</span>. Key principles: <span class="hl-term">non-violence, tolerance, respect for elders, kindness to servants, truthfulness</span>. The <span class="hl-term">Dhamma Mahamattas</span> (officers) and the <span class="hl-term">rock edicts</span> were the tools of propagation. Ashoka's <span class="hl-term">religious tolerance</span> (MRE XII) and <span class="hl-term">animal welfare measures</span> are frequently asked. The shift from <span class="hl-term">digvijaya</span> (conquest by war) to <span class="hl-term">dhammavijaya</span> (conquest by righteousness) is a key conceptual framework.</div></div>`;
    html += `</div></section>`;

    // ===== 12. SOCIETY =====
    html += `<section id="maurya-society">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-users text-purple-400"></i> 12. Society under the Mauryas</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-purple-500/20">`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-layer-group text-cyan-400 text-xs"></i> Social Structure</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler">Megasthenes</span> mentions <span class="hl-num hl-bg-num">7 castes</span> in Indian society — though his classification differs from the traditional <span class="hl-term">varna system</span> (Brahmins, Kshatriyas, Vaishyas, Shudras)</li>`;
    html += `<li>The <span class="hl-term">varna system</span> was developing but not yet as rigid as in later periods</li>`;
    html += `<li><span class="hl-term">Slavery existed</span> but was <span class="hl-term">not widespread</span> compared to other ancient civilizations (e.g., Greece and Rome)</li>`;
    html += `<li>A clear <span class="hl-term">urban and rural divide</span> existed — cities like Pataliputra, Taxila, Ujjayini were major urban centres</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-place-of-worship text-cyan-400 text-xs"></i> Religious Landscape</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Buddhism</span> — royal patronage under Ashoka; Buddhism spread across the subcontinent and beyond</li>`;
    html += `<li><span class="hl-term">Jainism</span> — Chandragupta became a Jain ascetic in his later years</li>`;
    html += `<li><span class="hl-term">Ajivikas</span> — a heterodox sect; Ashoka gifted caves to them (Barabar Caves)</li>`;
    html += `<li><span class="hl-term">Brahmanical traditions</span> — continued to be followed by the majority; Ashoka respected Brahmins</li>`;
    html += `<li>The period was marked by <span class="hl-term hl-bg-term">religious coexistence and tolerance</span> — especially under Ashoka</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-person-dress text-cyan-400 text-xs"></i> Position of Women</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The society was <span class="hl-term">patriarchal</span></li>`;
    html += `<li>Women had <span class="hl-term">some property rights</span> — they could hold <span class="hl-term">Stridhana</span> (women's wealth)</li>`;
    html += `<li><span class="hl-term">Royal women</span> like Ashoka's daughter <span class="hl-ruler">Sanghamitta</span> played important roles (she became a Buddhist nun and went to Sri Lanka)</li>`;
    html += `<li>Ashoka's own <span class="hl-term">wives</span> are mentioned in inscriptions (e.g., <span class="hl-term">Karuvaki, Asandhimitra</span>)</li>`;
    html += `<li>The <span class="hl-term">Queens' Edict</span> mentions the gifts of Ashoka's second queen <span class="hl-term">Karuvaki</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-handshake text-cyan-400 text-xs"></i> Trade Guilds (Shrenis)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Shrenis</span> (trade guilds) were <span class="hl-term">important social and economic institutions</span></li>`;
    html += `<li>They regulated <span class="hl-term">prices, wages, quality standards, and trade practices</span></li>`;
    html += `<li>They also had <span class="hl-term">judicial functions</span> — disputes among members were settled by the guild</li>`;
    html += `<li>The Arthashastra mentions detailed regulations for guilds</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">Mauryan society was <span class="hl-term">cosmopolitan</span> with <span class="hl-term">multiple religious traditions coexisting</span>. Key facts: <span class="hl-term">Megasthenes' 7 castes</span>, <span class="hl-term">limited slavery</span>, <span class="hl-term">urban-rural divide</span>, <span class="hl-term">Shrenis (guilds)</span>, and <span class="hl-term">women's property rights (Stridhana)</span>. The <span class="hl-term">Queens' Edict</span> mentioning Queen <span class="hl-ruler">Karuvaki</span> is a unique source on Mauryan women.</div></div>`;
    html += `</div></section>`;

    // ===== 13. ECONOMY =====
    html += `<section id="maurya-economy">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-sack-dollar text-amber-400"></i> 13. Mauryan Economy</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-seedling text-cyan-400 text-xs"></i> Agriculture</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Agriculture was the <span class="hl-term hl-bg-term">primary economic activity</span></li>`;
    html += `<li>The state provided <span class="hl-term">irrigation facilities</span> — dams, tanks, canals</li>`;
    html += `<li><span class="hl-term">Sita</span> (crown lands) were cultivated directly by state-employed labourers</li>`;
    html += `<li>The state also <span class="hl-term">advanced loans to farmers</span> during times of distress</li>`;
    html += `<li>Major crops: <span class="hl-term">rice, wheat, barley, millets, pulses, cotton, sugarcane</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-ship text-cyan-400 text-xs"></i> Trade & Commerce</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Internal trade</span> flourished under the unified Mauryan administration</li>`;
    html += `<li><span class="hl-term hl-bg-term">External trade</span> with <span class="hl-place">Egypt, Southeast Asia, Sri Lanka, West Asia</span></li>`;
    html += `<li>The <span class="hl-term hl-bg-term">Uttarapatha</span> (Royal Highway) from <span class="hl-place">Pataliputra to Taxila</span> was the <span class="hl-term">most important trade route</span></li>`;
    html += `<li><span class="hl-place">Taxila</span> was the major centre on the trade route to <span class="hl-term">Central and West Asia</span></li>`;
    html += `<li><span class="hl-term">Pataliputra</span> was the hub connecting eastern and western trade routes</li>`;
    html += `<li><span class="hl-term">Punch-marked silver coins</span> were used as currency — these are the <span class="hl-term">earliest coins in India</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-industry text-cyan-400 text-xs"></i> State Monopolies</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Mines</span> — all mines were owned and operated by the state</li>`;
    html += `<li><span class="hl-term">Salt</span> — state monopoly; salt tax was a major revenue source</li>`;
    html += `<li><span class="hl-term">Forests</span> — state-controlled; provided timber, elephants, and forest products</li>`;
    html += `<li><span class="hl-term">Irrigation</span> — state-built and maintained waterworks; farmers paid water tax</li>`;
    html += `<li><span class="hl-term">Arms and weapons</span> — state monopoly; private possession was prohibited</li>`;
    html += `<li><span class="hl-term">Liquor</span> — production and sale regulated by the state</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-coins text-cyan-400 text-xs"></i> Taxation System</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The Arthashastra details an <span class="hl-term hl-bg-term">elaborate and comprehensive taxation system</span></li>`;
    html += `<li><span class="hl-term">Bhaga</span> — king's share of the agricultural produce (usually <span class="hl-num">1/6th</span>)</li>`;
    html += `<li><span class="hl-term">Bali</span> — originally a voluntary offering, became a compulsory tax</li>`;
    html += `<li><span class="hl-term">Kara</span> — a general tax</li>`;
    html += `<li><span class="hl-term">Shulka</span> — customs and tolls on trade goods</li>`;
    html += `<li><span class="hl-term">Pindakara</span> — lump-sum tax on villages</li>`;
    html += `<li><span class="hl-term">Hiranya</span> — tax paid in cash (gold/silver)</li>`;
    html += `<li>Taxes were collected by <span class="hl-term">Sthanikas</span> at the local level</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The Mauryan economy was <span class="hl-term hl-bg-term">highly regulated by the state</span>. Key facts: <span class="hl-term">state monopolies (mines, salt, forests, arms)</span>, <span class="hl-term">punch-marked coins</span>, <span class="hl-term">Uttarapatha trade route</span> (Pataliputra-Taxila highway), <span class="hl-term">external trade with Egypt, Sri Lanka, West Asia</span>, and the <span class="hl-term">comprehensive taxation system from Arthashastra</span>. The <span class="hl-term">Sitadhyakshya</span> (agriculture superintendent) and <span class="hl-term">Lavanadhyakshya</span> (salt superintendent) are examples of state-controlled departments.</div></div>`;
    html += `</div></section>`;

    // ===== 14. DECLINE OF MAURYAN EMPIRE =====
    html += `<section id="maurya-decline">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-chart-line-down text-red-400"></i> 14. Decline of the Mauryan Empire</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-red-500/20">`;

    html += `<p class="content-text">
      The <span class="hl-dynasty hl-bg-dynasty">Mauryan Empire</span> declined rapidly after the death of <span class="hl-ruler hl-bg-ruler">Ashoka in 232 BCE</span>. Within <span class="hl-num">47 years</span> of his death, the empire had collapsed completely. The reasons for decline are <span class="hl-term hl-bg-term">multiple and complex</span> — historians debate which was most important.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-list text-cyan-400 text-xs"></i> Causes of Decline</h3>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> 1. Weak Successors after Ashoka</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Ashoka died in <span class="hl-date">232 BCE</span></li>`;
    html += `<li>His successors — <span class="hl-ruler">Kunala, Dasharatha, Samprati, Salisuka, Devavarman, Satadhanvan, Brihadratha</span> — were <span class="hl-term">weak and incapable</span></li>`;
