<script>
  const DATA = {
    title: "Maratha Empire (1674-1818): Rise, Zenith & Fall",
    location: "NCERT Class 7-12 History, UPSC reference materials",
    last_updated: "2026-06-08",
    source: "NCERT Class 7-10 History, UPSC reference materials",
    chapters: [
      { class: 7, chapter: 10, name: "Eighteenth-Century Political Formations", book: "Our Pasts II" },
      { class: 8, chapter: 3, name: "The Rise of the Marathas", book: "Our Pasts III" },
      { class: 10, chapter: 2, name: "From Trade to Territory", book: "India and the Contemporary World II" },
      { class: 12, book: "Themes in Indian History", name: "Colonialism and the Countryside" }
    ]
  };

  document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');
    let html = '';

    // ===== HEADER =====
    html += `
      <div class="gradient-top rounded-2xl p-4 sm:p-8 mb-6 border border-indigo-500/20 text-center sm:text-left">
        <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between gap-3">
          <div>
            <div class="flex items-center gap-3 mb-2 justify-center sm:justify-start">
              <i class="fa-solid fa-chess-king text-2xl sm:text-3xl text-amber-400"></i>
              <h1 class="text-xl sm:text-3xl font-bold text-white">${DATA.title}</h1>
            </div>
            <p class="text-indigo-300 text-sm flex items-center gap-2 justify-center sm:justify-start">
              <i class="fa-solid fa-book text-rose-400"></i> ${DATA.location}
            </p>
            <p class="text-gray-500 text-xs mt-1">
              <i class="fa-regular fa-calendar mr-1"></i>Updated: ${DATA.last_updated}
            </p>
          </div>
          <div class="flex items-center gap-2 text-xs text-gray-400 bg-black/30 px-4 py-2 rounded-xl border border-gray-700/50 whitespace-nowrap">
            <i class="fa-regular fa-clock"></i>
            <span>144 Years (1674-1818)</span>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">
          <span class="px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-300 text-xs border border-indigo-500/20"><i class="fa-solid fa-check-circle text-emerald-400 mr-1"></i>NCERT Based</span>
          <span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-star mr-1"></i>UPSC Level</span>
          <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20"><i class="fa-solid fa-flag mr-1"></i>Zero to Advance</span>
        </div>
      </div>`;

    // ===== NAVIGATION INDEX =====
    html += `
      <div class="mb-6 gradient-card-1 rounded-xl p-4 border border-gray-700/30">
        <h2 class="text-base sm:text-lg font-bold text-white mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list text-indigo-400"></i> Table of Contents
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 text-xs sm:text-sm">
          <a href="#intro" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">1. Introduction & Origins</a>
          <a href="#shivaji" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">2. Chhatrapati Shivaji Maharaj</a>
          <a href="#sambhaji" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">3. Sambhaji (1680-1689)</a>
          <a href="#rajaram" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">4. Rajaram (1689-1700)</a>
          <a href="#tarabai" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">5. Tarabai's Regency</a>
          <a href="#shahu" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">6. Shahu vs Tarabai</a>
          <a href="#peshwas" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">7. Rise of the Peshwas</a>
          <a href="#administration" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">8. Maratha Administration</a>
          <a href="#confederacy" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">9. Maratha Confederacy</a>
          <a href="#anglo-maratha" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">10. Anglo-Maratha Wars</a>
          <a href="#navy" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">11. Maratha Navy</a>
          <a href="#culture" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">12. Culture, Society & Economy</a>
          <a href="#timeline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">13. Complete Timeline (1627-1818)</a>
          <a href="#upsc-facts" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">14. UPSC Key Facts at a Glance</a>
        </div>
      </div>`;

    // ===== 1. INTRODUCTION & ORIGINS =====
    html += `<section id="intro">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-scroll text-amber-400"></i> 1. Introduction & Origins of the Marathas</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;
    html += `<p class="content-text">
      The <span class="hl-dynasty hl-bg-dynasty">Marathas</span> are a group native to the <span class="hl-place hl-bg-place">Deccan plateau</span> (present-day <span class="hl-place">Maharashtra</span>). The <span class="hl-term">Marathi language</span> has a rich literary history since the <span class="hl-date">12th century</span>. In the <span class="hl-date">13th century</span>, the <span class="hl-dynasty hl-bg-dynasty">Yadava dynasty</span> ruled Maharashtra with <span class="hl-place">Devagiri (Daulatabad)</span> as capital. The early <span class="hl-date">14th century</span> saw the <span class="hl-dynasty hl-bg-dynasty">Khilji Sultanate</span> from Delhi defeat the Yadavas.
    </p>`;
    html += `<p class="content-text">
      Despite political changes, cultural traditions continued through the <span class="hl-term">Bhakti movement</span>. Saints: <span class="hl-ruler">Dnyaneshwar</span> (<span class="hl-date">13th c.</span>), <span class="hl-ruler">Namdev</span> (<span class="hl-date">14th c.</span>), <span class="hl-ruler">Tukaram</span> (<span class="hl-date">17th c.</span>), <span class="hl-ruler">Ramdas</span> (<span class="hl-date">17th c.</span>) — made Upanishads and Gita accessible in Marathi. These saints promoted <span class="hl-term">spiritual devotion, social organisation, and political awareness</span>.
    </p>`;
    html += `<p class="content-text">
      In the <span class="hl-date">17th century</span>, early attempts at Maratha sovereignty failed until <span class="hl-ruler hl-bg-ruler">Shivaji</span> emerged as a unifying leader who laid the foundation of Maratha power.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Key Concept</div><div class="fact-box-content">The <span class="hl-dynasty hl-bg-dynasty">Marathas</span> are discussed in NCER<span class="hl-term">T Class 7 Chapter 10</span> as a major post-Mughal power and in <span class="hl-term">NCERT Class 8 Chapter 3</span> with a dedicated chapter on <span class="hl-term hl-bg-term">"The Rise of the Marathas"</span>. Their story illustrates how local identities and <span class="hl-term">Bhakt</span>i movements shaped political consciousness.</div></div>`;
    html += `</div></section>`;

    // ===== 2. CHHATRAPATI SHIVAJI MAHARAJ =====
    html += `<section id="shivaji">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 2. Chhatrapati Shivaji Maharaj (1630-1680)</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-person-military-pointing text-cyan-400 text-xs"></i> Early Life & Background</h3>`;
    html += `<p class="content-text">
      Born <span class="hl-date">1630</span> at <span class="hl-place">Shivneri Fort</span> to <span class="hl-ruler hl-bg-ruler">Shahji Bhonsle</span> and <span class="hl-ruler">Jijabai</span>. Family: <span class="hl-term">Bhonsle clan</span>; Shahji served Deccan Sultanate<span class="hl-term">s (Ahmednagar, then Bijapur)</span>. Shahji obtained <span class="hl-place">Poona</span> as <span class="hl-term">jagir in 1636</span>. Shivaji was raised in Pune under <span class="hl-ruler">Jijabai's</span> guidance and <span class="hl-ruler">Dadaji Kondadev's</span> guardianship. He assumed full charge of the jagir in <span class="hl-date">1647</span> after Dadaji Kondadev's death.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-bullseye text-cyan-400 text-xs"></i> Vision: Hindavi Swarajya</h3>`;
    html += `<p class="content-text">
      Shivaji's vision was <span class="hl-term hl-bg-term">Hindavi Swarajya</span> — self-rule of the people, establishing a sovereign state free from foreign domination.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crosshairs text-cyan-400 text-xs"></i> Early Conquests (1646-1656)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Captured fort <span class="hl-place hl-bg-place">Torana</span> (<span class="hl-date">1646</span>) — first major conquest</li>`;
    html += `<li>Captured <span class="hl-place">Raigarh</span>, <span class="hl-place">Kondana</span>, <span class="hl-place">Purandhar</span> from Bijapur</li>`;
    html += `<li>Captured <span class="hl-place">Javli</span> from <span class="hl-ruler">Chandra Rao More</span> (<span class="hl-date">1656</span>) — eliminated rival Maratha chief</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crosshairs text-cyan-400 text-xs"></i> Major Battles</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-battle hl-bg-battle">Battle of Pratapgarh (1659)</span>: <span class="hl-event">Killed Afzal Khan</span> (Bijapur general sent by Adil Shah II) — a turning point. Shivaji used <span class="hl-term">guerrilla tactics (ganimi kawa)</span> and a hidden dagger (wagh nakh)</li>`;
    html += `<li><span class="hl-battle hl-bg-battle">Battle of Kolhapur (1659)</span>: Defeated <span class="hl-ruler">Rustemjaman</span> (Bijapur)</li>`;
    html += `<li><span class="hl-battle hl-bg-battle">Battle of Pavankhind (1660)</span>: <span class="hl-ruler">Siddi Johar</span> vs Shivaji; ceasefire negotiated after Maratha rear-guard heroics by <span class="hl-term">Baji Prabhu Deshpande</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-fire text-cyan-400 text-xs"></i> Conflict with Mughals</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Shaista Khan</span> appointed Governor of Deccan (<span class="hl-date">1660</span>) by <span class="hl-ruler">Aurangzeb</span></li>`;
    html += `<li><span class="hl-event hl-bg-event">Shivaji attacked Shaista Khan's camp (1663)</span> — Khan fled, lost his fingers; a humiliating blow to Mughal prestige</li>`;
    html += `<li>Plundered <span class="hl-place">Surat</span> (<span class="hl-date">1664</span>, <span class="hl-date">1670</span>) and <span class="hl-place">Ahmednagar</span></li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Treaty of Purandhar (1665)</span>: with <span class="hl-ruler">Mirza Raja Jai Singh</span>; Shivaji surrendered <span class="hl-num">23</span> forts, kept <span class="hl-num">12</span></li>`;
    html += `<li><span class="hl-event hl-bg-event">Visited Agra (1666)</span> — Aurangzeb insulted him (given low mansab); Shivaji <span class="hl-term">escaped from captivity</span> in fruit baskets</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crown text-cyan-400 text-xs"></i> Coronation (1674)</h3>`;
    html += `<p class="content-text">
      Crowned <span class="hl-ruler hl-bg-ruler">Chhatrapati</span> at <span class="hl-place">Raigad Fort</span> with <span class="hl-term">Vedic rituals</span>. Titles: <span class="hl-term">Haindava Dharma-Dharak</span> (Protector of Hinduism), <span class="hl-term">Chhatrapati</span>, <span class="hl-term">Shakakarta</span>. <span class="hl-place">Raigad</span> became capital.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-globe text-cyan-400 text-xs"></i> Later Conquests</h3>`;
    html += `<p class="content-text">
      <span class="hl-event">Dakshina Digvijaya (1677)</span> — southern campaign conquering <span class="hl-place">Gingee</span>, <span class="hl-place">Vellore</span>, <span class="hl-place">Tanjore</span>. Died <span class="hl-date">1680</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-shield-halved text-cyan-400 text-xs"></i> Military Innovations</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Guerrilla warfare (ganimi kawa)</span> — hit-and-run tactics suited to the hilly terrain</li>`;
    html += `<li><span class="hl-arch">Hill forts</span> — core of Maratha defence strategy; many forts captured and fortified</li>`;
    html += `<li><span class="hl-term hl-bg-term">Navy</span> — founded in <span class="hl-date">1657</span> to protect Konkan coast from Siddis, Portuguese, and British</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-users text-cyan-400 text-xs"></i> Ashtapradhan (Eight Ministers)</h3>`;
    html += `<p class="content-text">The council of eight ministers that administered the Maratha state:</p>`;
    html += `<div class="table-wrap"><table><thead><tr><th>#</th><th>Minister</th><th>Role</th></tr></thead><tbody>`;
    html += `<tr><td>1</td><td><span class="hl-term hl-bg-term">Peshwa</span></td><td>Prime Minister — head of administration</td></tr>`;
    html += `<tr><td>2</td><td><span class="hl-term hl-bg-term">Amatya</span></td><td>Finance & Accounts</td></tr>`;
    html += `<tr><td>3</td><td><span class="hl-term hl-bg-term">Mantri</span></td><td>Records & Documentation</td></tr>`;
    html += `<tr><td>4</td><td><span class="hl-term hl-bg-term">Sachiv</span></td><td>Correspondence & Royal Secretariat</td></tr>`;
    html += `<tr><td>5</td><td><span class="hl-term hl-bg-term">Samant</span></td><td>Foreign Affairs</td></tr>`;
    html += `<tr><td>6</td><td><span class="hl-term hl-bg-term">Senapati</span></td><td>Military Commander</td></tr>`;
    html += `<tr><td>7</td><td><span class="hl-term hl-bg-term">Pandit</span></td><td>Religious Affairs</td></tr>`;
    html += `<tr><td>8</td><td><span class="hl-term hl-bg-term">Nyayadhish</span></td><td>Chief Justice</td></tr>`;
    html += `</tbody></table></div>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-coins text-cyan-400 text-xs"></i> Revenue System</h3>`;
    html += `<ul class="bullet-list">`;
