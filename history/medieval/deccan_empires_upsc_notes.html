            <p class="text-gray-500 text-xs mt-1">
              <i class="fa-regular fa-calendar mr-1"></i>Updated: ${DATA.last_updated}
            </p>
          </div>
          <div class="flex items-center gap-2 text-xs text-gray-400 bg-black/30 px-4 py-2 rounded-xl border border-gray-700/50 whitespace-nowrap">
            <i class="fa-regular fa-clock"></i>
            <span>351 Years (1336-1687)</span>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">

          <span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-star mr-1"></i>UPSC Level</span>
          <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20"><i class="fa-solid fa-flag mr-1"></i>Zero to Advance</span>
        </div>
      </div>`;

    // ===== NAVIGATION INDEX =====
    html += `
      <div class="mb-6 gradient-card-1 rounded-xl p-4 border border-gray-700/30">
        <h2 class="text-base sm:text-lg font-bold text-white mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list text-indigo-400"></i> Table of Contents
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 text-xs sm:text-sm">
          <a href="#vijay-intro" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition"><i class="fa-solid fa-crown text-amber-400 mr-1"></i> 1. Vijayanagar — Introduction</a>
          <a href="#vijay-dynasties" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">2. Vijayanagar — Four Dynasties</a>
          <a href="#vijay-sangama" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">3. Sangama Dynasty</a>
          <a href="#vijay-saluva" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">4. Saluva Dynasty</a>
          <a href="#vijay-tuluva" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">5. Tuluva Dynasty — Golden Age</a>
          <a href="#vijay-talikota" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">6. Battle of Talikota (1565)</a>
          <a href="#vijay-aravidu" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">7. Aravidu Dynasty & Decline</a>
          <a href="#vijay-admin" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">8. Amara-Nayaka System</a>
          <a href="#vijay-society" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">9. Society & Economy</a>
          <a href="#vijay-arch" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">10. Architecture & Culture</a>
          <a href="#bahmani" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition"><i class="fa-solid fa-mosque text-green-400 mr-1"></i> 11. Bahmani Sultanate — Foundation</a>
          <a href="#bahmani-rulers" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">12. Bahmani Rulers</a>
          <a href="#bahmani-gawan" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">13. Mahmud Gawan</a>
          <a href="#bahmani-admin" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">14. Bahmani Administration</a>
          <a href="#bahmani-society" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">15. Bahmani Society & Economy</a>
          <a href="#bahmani-arch" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">16. Bahmani Art & Architecture</a>
          <a href="#bahmani-decline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">17. Decline of Bahmani</a>
          <a href="#deccan-sultanates" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition"><i class="fa-solid fa-flag text-rose-400 mr-1"></i> 18. The Five Deccan Sultanates</a>
          <a href="#deccan-contrib" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">19. Contributions of Deccan Sultanates</a>
          <a href="#timeline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">20. Complete Timeline (1336-1687)</a>
          <a href="#upsc-facts" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">21. UPSC Key Facts at a Glance</a>
        </div>
      </div>`;

    // ===== 1. VIJAYANAGAR — INTRODUCTION =====
    html += `<section id="vijay-intro">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 1. Vijayanagar Empire — Introduction & Discovery</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<p class="content-text">
      <span class="hl-dynasty hl-bg-dynasty">Vijayanagara</span> means <span class="hl-term">"City of Victory"</span> — both a <span class="hl-term">city (capital)</span> and an <span class="hl-term">empire</span>. It stretched from the <span class="hl-place">Krishna river</span> in the north to the <span class="hl-term">extreme south of the peninsula</span>. People remembered it as <span class="hl-place">Hampi</span> — named after the local mother goddess <span class="hl-term">Pampadevi</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-compass text-cyan-400 text-xs"></i> Discovery of Hampi Ruins</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Colonel Colin Mackenzie</span> (<span class="hl-date">1800</span>) — first <span class="hl-term">Surveyor General of India</span>, employee of <span class="hl-dynasty">East India Company</span> — discovered the ruins and prepared the <span class="hl-term">first survey map</span> based on memories of <span class="hl-term">priests of Virupaksha temple</span></li>`;
    html += `<li><span class="hl-ruler">Alexander Greenlaw</span> (<span class="hl-date">1856</span>) — took the <span class="hl-term">first detailed photographs</span> of the ruins</li>`;
    html += `<li><span class="hl-ruler">J.F. Fleet</span> (<span class="hl-date">1876</span>) — began <span class="hl-term">documenting inscriptions</span></li>`;
    html += `<li><span class="hl-ruler">John Marshall</span> (<span class="hl-date">1902</span>) — began <span class="hl-term">conservation work</span></li>`;
    html += `<li><span class="hl-place">Hampi</span> declared a <span class="hl-term">site of national importance (1976)</span> and <span class="hl-event hl-bg-event">UNESCO World Heritage Site (1986)</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-seedling text-cyan-400 text-xs"></i> Foundation (1336)</h3>`;
    html += `<p class="content-text">
      Founded in <span class="hl-date">1336</span> by two brothers: <span class="hl-ruler hl-bg-ruler">Harihara</span> and <span class="hl-ruler hl-bg-ruler">Bukka</span>, belonging to the <span class="hl-dynasty hl-bg-dynasty">Sangama dynasty</span>. Rulers called themselves <span class="hl-term">"Rayas"</span>. The empire consisted of people speaking <span class="hl-term">Kannada, Telugu, Tamil, Malayalam, Sanskrit</span>.
    </p>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Key Concept</div><div class="fact-box-content">Vijayanagara is covered in <span class="hl-term">NCERT Class 12 Theme 7 "An Imperial Capital: Vijayanagara"</span> — a dedicated chapter in <span class="hl-term">Themes in Indian History</span>. It is the <span class="hl-term hl-bg-term">most detailed NCERT source on any medieval Indian kingdom</span>, covering its urban layout, architecture, administration, and society. The <span class="hl-term">Hampi ruins</span> are one of the most important archaeological sites in India. The discovery by <span class="hl-ruler">Colin Mackenzie (1800)</span> is a landmark moment in Indian archaeology.</div></div>`;
    html += `</div></section>`;

    // ===== 2. FOUR DYNASTIES OVERVIEW =====
    html += `<section id="vijay-dynasties">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-tree text-amber-400"></i> 2. Four Dynasties of Vijayanagar</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<div class="table-wrap"><table><thead><tr><th>Dynasty</th><th>Period</th><th>Founder</th><th>Key Rulers</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-dynasty">Sangama</span></td><td><span class="hl-date">1336-1485</span></td><td><span class="hl-ruler">Harihara I & Bukka I</span></td><td>Deva Raya I, Deva Raya II</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Saluva</span></td><td><span class="hl-date">1485-1505</span></td><td><span class="hl-ruler">Saluva Narasimha</span></td><td>Short-lived dynasty</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Tuluva</span></td><td><span class="hl-date">1505-1570</span></td><td><span class="hl-ruler">Vira Narasimha</span></td><td><span class="hl-ruler hl-bg-ruler">Krishnadeva Raya</span> (greatest), Achyuta Raya, Sadasiva Raya</td></tr>`;
    html += `<tr><td><span class="hl-dynasty">Aravidu</span></td><td><span class="hl-date">1570-1646</span></td><td><span class="hl-ruler">Tirumala</span></td><td>Venkata II; Nayakas became independent; empire ended 1646</td></tr>`;
    html += `</tbody></table></div>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term">four dynasties of Vijayanagar</span> are frequently tested. The <span class="hl-dynasty hl-bg-dynasty">Tuluva dynasty</span> represents the <span class="hl-term hl-bg-term">Golden Age</span> under <span class="hl-ruler">Krishnadeva Raya (1509-1529)</span>. The <span class="hl-dynasty">Aravidu dynasty</span> was the last, declining after the <span class="hl-battle hl-bg-battle">Battle of Talikota (1565)</span>. Remember the sequence: <span class="hl-term">Sangama → Saluva → Tuluva → Aravidu</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 3. SANGAMA DYNASTY =====
    html += `<section id="vijay-sangama">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-1 text-amber-400"></i> 3. Sangama Dynasty (1336-1485)</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Harihara I (1336-1356)</span>: co-founder with <span class="hl-ruler">Bukka</span>, established the capital</li>`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Bukka I (1356-1377)</span>: expanded the empire, fought the <span class="hl-dynasty">Bahmani Sultanate</span></li>`;
    html += `<li><span class="hl-ruler">Harihara II (1377-1404)</span>: further expansion of territories</li>`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Deva Raya I (1406-1422)</span>: built <span class="hl-arch">dams, canals, forts</span>; fought <span class="hl-ruler">Firuz Shah Bahmani</span></li>`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Deva Raya II (1422-1446)</span>: called the <span class="hl-term hl-bg-term">"greatest of Sangama rulers"</span>; patronized literature (<span class="hl-term">Telugu, Kannada, Sanskrit</span>); built large <span class="hl-arch">irrigation works</span>; sent an embassy to <span class="hl-term">China</span>; Persian traveller <span class="hl-ruler">Abdur Razzaq</span> visited his court</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler">Deva Raya II</span> is often asked about as the <span class="hl-term">greatest Sangama ruler</span>. The visit of <span class="hl-ruler">Abdur Razzaq</span> (Persian traveller) and the embassy to China are key facts. His <span class="hl-term">patronage of Telugu, Kannada, and Sanskrit literature</span> is important.</div></div>`;
    html += `</div></section>`;

    // ===== 4. SALUVA DYNASTY =====
    html += `<section id="vijay-saluva">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-2 text-amber-400"></i> 4. Saluva Dynasty (1485-1505)</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Saluva Narasimha</span> seized power from the Sangama dynasty. This was a <span class="hl-term">short-lived dynasty</span> lasting only about <span class="hl-num">20 years</span>. It was followed by the <span class="hl-dynasty">Tuluva dynasty</span>.
    </p>`;
    html += `</div></section>`;

    // ===== 5. TULUVA DYNASTY — GOLDEN AGE =====
    html += `<section id="vijay-tuluva">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-3 text-amber-400"></i> 5. Tuluva Dynasty (1505-1570) — The Golden Age</h2>`;

    // Vira Narasimha
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> Vira Narasimha (1505-1509)</h3>`;

    // Krishnadeva Raya

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-star text-yellow-400 text-xs"></i> Krishnadeva Raya (1509-1529) — THE GREATEST RULER</h3>`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Krishnadeva Raya</span> is considered <span class="hl-term hl-bg-term">the most powerful Hindu ruler of India</span> and the <span class="hl-term">greatest emperor of Vijayanagar</span>. His reign represents the <span class="hl-term hl-bg-term">zenith of Vijayanagar power, prosperity, and cultural achievement</span>.
    </p>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-crossed-swords text-cyan-400 text-xs"></i> Military Campaigns</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Defeated <span class="hl-ruler">Adil Shah of Bijapur</span> — the most powerful of the Deccan Sultanates</li>`;

    html += `<li>Defeated the <span class="hl-dynasty">Gajapati of Odisha</span> — pushed the empire to its <span class="hl-term">maximum territorial extent</span></li>`;
    html += `<li>Expanded the empire from <span class="hl-place">Krishna river</span> in the north to <span class="hl-place">Cape Comorin (Kanyakumari)</span> in the south</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-building-columns text-cyan-400 text-xs"></i> Construction & Patronage</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Built fine <span class="hl-arch">temples and gopurams</span> — including the magnificent <span class="hl-arch hl-bg-arch">Virupaksha temple hall</span> and the <span class="hl-arch">eastern gopuram</span></li>`;
    html += `<li>Built the new suburban township <span class="hl-place">Nagalapuram</span> (named after his queen <span class="hl-ruler">Nagala Devi</span>)</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-feather-pointed text-cyan-400 text-xs"></i> Literature & Culture</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Himself a writer — composed <span class="hl-term hl-bg-term">Amuktamalyada</span> in <span class="hl-term">Telugu</span> (a poetic work on the life of the Tamil <span class="hl-term">Alvar saint Andal</span>)</li>`;
    html += `<li>His court had the famous <span class="hl-term hl-bg-term">Ashtadiggajas</span> (eight great poets), including <span class="hl-ruler">Allasani Peddana</span> (<span class="hl-term">Andhra Kavita Pitamaha</span> — father of Telugu poetry), <span class="hl-ruler">Nandi Thimmana</span>, <span class="hl-ruler">Dhurjati</span>, and others</li>`;
    html += `<li><span class="hl-term">Telugu, Kannada, Tamil, Sanskrit</span> all flourished under his patronage</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-ship text-cyan-400 text-xs"></i> Foreign Relations & Trade</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Prosperous trade</span> with the <span class="hl-dynasty">Portuguese</span> — especially in horses and firearms</li>`;
    html += `<li>Foreign travellers who visited his court: <span class="hl-ruler hl-bg-ruler">Domingo Paes</span> (Portuguese traveller who left a detailed account of Vijayanagar) and <span class="hl-ruler">Barbosa</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler hl-bg-ruler">Krishnadeva Raya (1509-1529)</span> is the <span class="hl-term hl-bg-term">most important ruler of Vijayanagar</span> for UPSC. Key points: <span class="hl-term">Amuktamalyada</span>, <span class="hl-term">Ashtadiggajas</span> (8 poets), <span class="hl-term">Allasani Peddana</span> (Andhra Kavita Pitamaha), capture of <span class="hl-place">Raichur Doab (1512)</span>, defeat of Adil Shah and Gajapati, construction of <span class="hl-arch">Nagalapuram</span> and the <span class="hl-arch">Virupaksha temple hall</span>, trade with Portuguese, and accounts of <span class="hl-ruler">Domingo Paes</span>.</div></div>`;
    html += `</div>`;

    // Achyuta Raya & Sadasiva
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> Achyuta Raya (1529-1542)</h3>`;
    html += `<p class="content-text">A <span class="hl-term">weaker ruler</span> compared to Krishnadeva Raya. His reign saw the beginning of internal conflicts and the rise of the <span class="hl-dynasty">Aravidu family</span> under <span class="hl-ruler">Rama Raya</span>.</p>`;

    html += `</div></section>`;

    // ===== 6. BATTLE OF TALIKOTA =====
    html += `<section id="vijay-talikota">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crossed-swords text-red-400"></i> 6. Battle of Talikota (1565)</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-red-500/30">`;
    html += `<p class="content-text">
      Also known as the <span class="hl-battle hl-bg-battle">Battle of Rakkasagi-Tangadagi</span>. Fought in <span class="hl-date">1565</span> between <span class="hl-dynasty">Vijayanagar</span> (led by <span class="hl-ruler hl-bg-ruler">Rama Raya</span>) and the <span class="hl-term">combined Deccan Sultanates</span> — <span class="hl-dynasty">Bijapur, Golconda, Ahmadnagar, Bidar, Berar</span>.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-event">Rama Raya was defeated and killed</span> — a catastrophic blow to Vijayanagar</li>`;

    html += `<li><span class="hl-place">Hampi</span> was <span class="hl-term">abandoned</span> and fell into ruin</li>`;
    html += `<li>The <span class="hl-dynasty">Aravidu dynasty</span> moved the capital first to <span class="hl-place">Penukonda</span>, then to <span class="hl-place">Chandragiri</span></li>`;
    html += `<li>The empire <span class="hl-event">declined gradually</span> and ended around <span class="hl-date">1646</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-battle hl-bg-battle">Battle of Talikota (1565)</span> is one of the <span class="hl-term hl-bg-term">most important battles in Indian history</span>. It marked the <span class="hl-event">end of the last great Hindu empire of South India</span>. The <span class="hl-term">combined Deccan Sultanates</span> alliance and the <span class="hl-event">sack of Hampi</span> are key facts. Note: the battle is also called <span class="hl-battle">Rakkasagi-Tangadagi</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 7. ARAVIDU DYNASTY =====
    html += `<section id="vijay-aravidu">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-4 text-amber-400"></i> 7. Aravidu Dynasty (1570-1646) & Decline</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;

    html += `<ul class="bullet-list">`;

    html += `<li>The empire <span class="hl-event hl-bg-event">fragmented into Nayaka states</span>: <span class="hl-place">Madurai</span> (under <span class="hl-ruler">Tirumala Nayaka</span>), <span class="hl-place">Tanjore</span>, <span class="hl-place">Gingee</span></li>`;
    html += `<li>The Vijayanagar Empire finally ended around <span class="hl-date">1646</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-dynasty">Aravidu dynasty</span> was the <span class="hl-term">last dynasty of Vijayanagar</span>. After Talikota, the empire <span class="hl-event">fragmented into Nayaka kingdoms</span> — <span class="hl-place">Madurai, Tanjore, Gingee</span> — which preserved Vijayanagar traditions. The <span class="hl-term">Nayaka system</span> continued in the south for many decades.</div></div>`;
    html += `</div></section>`;

    // ===== 8. AMARA-NAYAKA SYSTEM =====
    html += `<section id="vijay-admin">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-building-columns text-emerald-400"></i> 8. Administration — Amara-Nayaka System</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;

    html += `<p class="content-text">
      The <span class="hl-policy hl-bg-policy">Amara-Nayaka system</span> was the <span class="hl-term hl-bg-term">administrative backbone of the Vijayanagar Empire</span>. Under this system:
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Military commanders (Amara-nayakas)</span> were given <span class="hl-term">territories to govern</span> — similar to the <span class="hl-policy">Iqta system</span> of the <span class="hl-dynasty">Delhi Sultanate</span></li>`;
    html += `<li>Amara-nayakas sent <span class="hl-term">annual tribute</span> to the king and appeared at court with gifts</li>`;
    html += `<li>They <span class="hl-term">maintained troops</span> for the emperor's service</li>`;
    html += `<li>In return, they held <span class="hl-term">land (revenue assignments)</span></li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-sitemap text-cyan-400 text-xs"></i> Central Administration</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">King (Raya)</span> — supreme authority</li>`;
    html += `<li><span class="hl-term">Mahapradhana</span> — chief minister</li>`;
    html += `<li><span class="hl-term">Dandanayaka</span> — commander of the army</li>`;
    html += `<li>Empire divided into <span class="hl-term">Mandalas, Nadus, and villages</span></li>`;
    html += `<li><span class="hl-term">Land revenue</span> was the main source of income</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-policy hl-bg-policy">Amara-Nayaka system</span> is frequently compared with the <span class="hl-policy">Iqta system</span> of the Delhi Sultanate. Both involved <span class="hl-term">assigning revenue territories to military commanders in exchange for service</span>. However, the Amara-nayakas were <span class="hl-term">more autonomous</span> than Iqtadars and could <span class="hl-term">pass on their territories hereditarily</span> in practice.</div></div>`;
    html += `</div></section>`;

    // ===== 9. SOCIETY & ECONOMY =====

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term">economy of Vijayanagar</span> was heavily dependent on <span class="hl-term">trade</span> — especially the <span class="hl-term">horse trade</span> controlled by the Portuguese. The empire's <span class="hl-term">agricultural prosperity</span> was supported by extensive <span class="hl-arch">irrigation works</span>. The <span class="hl-term">Kudirai Chettis</span> (horse merchants) are a unique feature of Vijayanagar trade.</div></div>`;
    html += `</div></section>`;

    // ===== 10. ARCHITECTURE & CULTURE =====
    html += `<section id="vijay-arch">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-landmark text-pink-400"></i> 10. Architecture & Culture of Vijayanagar</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-pink-500/20">`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-city text-cyan-400 text-xs"></i> Physical Layout of the Capital</h3>`;
    html += `<p class="content-text">
      The city was located in a <span class="hl-term">natural basin</span> formed by the <span class="hl-place">Tungabhadra river</span>. It was an <span class="hl-term">arid zone</span>, so large <span class="hl-arch">reservoirs</span> were built to store water — including the <span class="hl-arch">Kamalapuram tank</span> and the <span class="hl-arch">Hiriya canal</span>. The city had <span class="hl-num">seven lines of forts</span> (mentioned by <span class="hl-ruler">Abdur Razzaq</span>).
    </p>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-building text-cyan-400 text-xs"></i> Royal Centre</h4>`;
    html += `<p class="content-text">
      Located in the <span class="hl-term">southwestern part</span> of the city. Contained <span class="hl-num">60+ temples</span> and <span class="hl-term">palace enclosures</span>. Key structures:
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-arch hl-bg-arch">Mahanavami Dibba</span> — a massive platform (<span class="hl-num">11,000 sq ft</span>, <span class="hl-num">40 ft</span> high) used for <span class="hl-term">ceremonies, worship of the image, horse sacrifice, and buffalo sacrifice</span></li>`;
    html += `<li><span class="hl-arch">Lotus Mahal</span> — a beautiful Indo-Islamic style palace</li>`;
    html += `<li><span class="hl-arch hl-bg-arch">Hazara Rama Temple</span> — known for its exquisite bas-reliefs depicting scenes from the <span class="hl-term">Ramayana</span></li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-place-of-worship text-cyan-400 text-xs"></i> Sacred Centre</h4>`;
    html += `<p class="content-text">
      Located at the <span class="hl-term">rocky northern end</span> on the banks of the <span class="hl-place">Tungabhadra</span>. Contained the most important temples:
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-arch hl-bg-arch">Virupaksha Temple</span> — the <span class="hl-term">main shrine</span> dedicated to <span class="hl-term">Virupaksha (a form of Shiva)</span>. <span class="hl-ruler">Krishnadeva Raya</span> built the <span class="hl-arch">hall</span> and the magnificent <span class="hl-arch">eastern gopuram</span>. The kings claimed to rule on behalf of <span class="hl-term">God Virupaksha</span></li>`;
    html += `<li><span class="hl-arch hl-bg-arch">Vitthala Temple</span> — dedicated to <span class="hl-term">Vitthala (a form of Vishnu)</span>. Famous for its <span class="hl-arch">stone chariot</span> (inspired by Konark's Sun Temple) and <span class="hl-arch">musical pillars</span> that produce musical notes when struck</li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-palette text-cyan-400 text-xs"></i> Architectural Features & Style</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Indo-Islamic architecture influence</span> — <span class="hl-arch">arches</span> and <span class="hl-arch">domes</span> over gates show clear Islamic influence</li>`;

    html += `<li>Kings used the title <span class="hl-term hl-bg-term">"Hindu Suratrana"</span> (Hindu Sultan) — showing their adoption of Islamic courtly titles even as they championed Hinduism</li>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-feather text-cyan-400 text-xs"></i> Culture & Literature</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Telugu, Kannada, Tamil, Sanskrit</span> — all four languages flourished</li>`;

    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term">architecture of Vijayanagar</span> is a <span class="hl-term hl-bg-term">major UPSC topic</span>. Key structures: <span class="hl-arch">Virupaksha Temple</span> (main shrine, Krishnadeva Raya's hall and eastern gopuram), <span class="hl-arch">Vitthala Temple</span> (stone chariot, musical pillars), <span class="hl-arch">Mahanavami Dibba</span> (ceremonial platform), <span class="hl-arch">Hazara Rama Temple</span> (Ramayana reliefs), <span class="hl-arch">Lotus Mahal</span>. Note the <span class="hl-term">Indo-Islamic architectural synthesis</span> and the term <span class="hl-term">"Hindu Suratrana"</span>.</div></div>`;

    // ===== 11. BAHMANI SULTANATE — FOUNDATION =====
    html += `<section id="bahmani">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-mosque text-green-400"></i> 11. Bahmani Sultanate — Foundation (1347)</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-green-500/20">`;

    html += `<p class="content-text">
      After the fall of the <span class="hl-dynasty">Yadavas</span> and <span class="hl-dynasty">Kakatiyas</span> to the <span class="hl-dynasty">Khaljis</span> and <span class="hl-dynasty">Tughlaqs</span>, <span class="hl-term">Muslim governorships</span> were established in the Deccan. <span class="hl-ruler">Muhammad bin Tughlaq</span> appointed <span class="hl-term">Amiran-i-sada</span> (chiefs of 100 villages). Revolts in the Deccan led to the establishment of an independent Bahmani Kingdom.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Founded by <span class="hl-ruler hl-bg-ruler">Alauddin Bahman Shah</span> (also known as <span class="hl-ruler">Hasan Gangu</span> / <span class="hl-ruler">Zafar Khan</span>) in <span class="hl-date">1347</span></li>`;
    html += `<li>Took the title: <span class="hl-term">Abu'l-Muzaffar Ala-ud-din Bahman Shah</span></li>`;
    html += `<li>Capital: <span class="hl-place">Ahsanabad (Gulbarga)</span></li>`;
    html += `<li>Kingdom spread over modern <span class="hl-place">Karnataka, Maharashtra, Andhra Pradesh</span></li>`;
    html += `<li>Name derived from the mythical Iranian hero <span class="hl-term">Bahman Shah</span></li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Context</div><div class="fact-box-content">The <span class="hl-dynasty">Bahmani Sultanate</span> is covered in <span class="hl-term">NCERT Class 7 Chapter 2 "New Kings and Kingdoms"</span> (in the context of the Deccan) and in <span class="hl-term">Class 12 Theme 7</span> (in the context of Vijayanagar's conflicts). The Bahmani-Vijayanagar rivalry is a <span class="hl-term hl-bg-term">crucial theme in medieval Deccan history</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 12. BAHMANI RULERS =====
    html += `<section id="bahmani-rulers">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-users text-green-400"></i> 12. Bahmani Rulers</h2>`;
