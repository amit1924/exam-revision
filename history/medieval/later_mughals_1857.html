<script>
  const DATA = {
    title: "Later Mughals (1707-1857): Decline & Fall",
    location: "NCERT Class 7-8 History, UPSC reference materials",
    last_updated: "2026-06-08",
    source: "NCERT Class 7-10 History, UPSC reference materials",
    chapters: [
      { class: 7, chapter: 10, name: "Eighteenth-Century Political Formations", book: "Our Pasts II" },
      { class: 8, chapter: 2, name: "From Trade to Territory", book: "Our Pasts III" },
      { class: 8, chapter: 5, name: "When People Rebel (1857)", book: "Our Pasts III" }
    ]
  };

  document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');
    let html = '';

    // ===== HEADER =====
    html += `
      <div class="gradient-top rounded-2xl p-4 sm:p-8 mb-6 border border-indigo-500/20 text-center sm:text-left">
        <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between gap-3">
          <div>
            <div class="flex items-center gap-3 mb-2 justify-center sm:justify-start">
              <i class="fa-solid fa-landmark text-2xl sm:text-3xl text-amber-400"></i>
              <h1 class="text-xl sm:text-3xl font-bold text-white">${DATA.title}</h1>
            </div>
            <p class="text-indigo-300 text-sm flex items-center gap-2 justify-center sm:justify-start">
              <i class="fa-solid fa-book text-rose-400"></i> ${DATA.location}
            </p>
            <p class="text-gray-500 text-xs mt-1">
              <i class="fa-regular fa-calendar mr-1"></i>Updated: ${DATA.last_updated}
            </p>
          </div>
          <div class="flex items-center gap-2 text-xs text-gray-400 bg-black/30 px-4 py-2 rounded-xl border border-gray-700/50 whitespace-nowrap">
            <i class="fa-regular fa-clock"></i>
            <span>150 Years (1707-1857)</span>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">
          <span class="px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-300 text-xs border border-indigo-500/20"><i class="fa-solid fa-check-circle text-emerald-400 mr-1"></i>NCERT Based</span>
          <span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-star mr-1"></i>UPSC Level</span>
          <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20"><i class="fa-solid fa-flag mr-1"></i>Zero to Advance</span>
        </div>
      </div>`;

    // ===== NAVIGATION INDEX =====
    html += `
      <div class="mb-6 gradient-card-1 rounded-xl p-4 border border-gray-700/30">
        <h2 class="text-base sm:text-lg font-bold text-white mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list text-indigo-400"></i> Table of Contents
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 text-xs sm:text-sm">
          <a href="#intro" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">1. Introduction</a>
          <a href="#bahadur-shah" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">2. Bahadur Shah I (1707-1712)</a>
          <a href="#jahandar-shah" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">3. Jahandar Shah (1712-1713)</a>
          <a href="#farrukh-siyar" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">4. Farrukh Siyar (1713-1719)</a>
          <a href="#sayyid-brothers" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">5. The Sayyid Brothers</a>
          <a href="#muhammad-shah" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">6. Muhammad Shah (1719-1748)</a>
          <a href="#ahmad-shah" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">7. Ahmad Shah (1748-1754)</a>
          <a href="#alamgir-ii" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">8. Alamgir II (1754-1759)</a>
          <a href="#shah-alam" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">9. Shah Alam II (1759-1806)</a>
          <a href="#akbar-ii" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">10. Akbar II (1806-1837)</a>
          <a href="#bahadur-shah-zafar" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">11. Bahadur Shah Zafar (1837-1857)</a>
          <a href="#causes-decline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">12. Causes of Decline</a>
          <a href="#regional-states" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">13. Rise of Regional States</a>
          <a href="#timeline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">14. Complete Timeline (1707-1862)</a>
          <a href="#upsc-facts" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">15. UPSC Key Facts</a>
        </div>
      </div>`;

    // ===== 1. INTRODUCTION =====
    html += `<section id="intro">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-scroll text-amber-400"></i> 1. Introduction</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;
    html += `<p class="content-text">
      The <span class="hl-dynasty hl-bg-dynasty">Mughal Empire</span> began its rapid decline after the death of <span class="hl-ruler hl-bg-ruler">Aurangzeb</span> in <span class="hl-date">1707</span>. Over the next <span class="hl-num">150</span> years (<span class="hl-date">1707-1857</span>), the empire saw <span class="hl-event">12 different emperors</span> — compared to just <span class="hl-num">6</span> in the first <span class="hl-num">200</span> years of its existence. Most of these later emperors were <span class="hl-term hl-bg-term">weak puppets</span> controlled by powerful nobles, factional groups, or outside forces.
    </p>`;
    html += `<p class="content-text">
      The period saw <span class="hl-event">foreign invasions</span> (<span class="hl-ruler">Nadir Shah</span> in <span class="hl-date">1739</span>, <span class="hl-ruler">Ahmad Shah Abdali</span> from <span class="hl-date">1748</span>), the <span class="hl-event">rise of independent regional states</span> (Bengal, Hyderabad, Awadh, Mysore, Marathas, Sikhs), and the <span class="hl-event">growing power of the British East India Company</span>. The empire was formally abolished after the <span class="hl-battle hl-bg-battle">1857 War of Independence</span> when the last emperor <span class="hl-ruler">Bahadur Shah Zafar</span> was exiled to Rangoon.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Key Concept</div><div class="fact-box-content">After <span class="hl-ruler hl-bg-ruler">Aurangzeb's</span> death in <span class="hl-date">1707</span>, the <span class="hl-term hl-bg-term">Mansabdari and Jagir systems</span> broke down, the <span class="hl-term">nobility became factionalized</span> (Turanis vs Iranis vs Hindustanis), and the empire's <span class="hl-event">economic base collapsed</span>. The Mughal Empire, which had been the <span class="hl-term">wealthiest empire in the world</span>, rapidly disintegrated.</div></div>`;
    html += `</div></section>`;

    // ===== 2. BAHADUR SHAH I =====
    html += `<section id="bahadur-shah">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 2. Bahadur Shah I (1707-1712)</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Bahadur Shah I</span> (also called <span class="hl-term">Shah Alam I</span> or <span class="hl-term">"Bahadur Shah"</span>) was the son of <span class="hl-ruler">Aurangzeb</span>. He ascended the throne at the age of <span class="hl-num">64</span> after a <span class="hl-event">war of succession</span> with his brothers.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-handshake text-cyan-400 text-xs"></i> Policy of Conciliation</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-policy hl-bg-policy">Abolished Jizya</span> — reversed Aurangzeb's policy</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Reconciled with Marathas</span> — recognized <span class="hl-term">Shahu</span> as the legitimate Maratha ruler</li>`;
    html += `<li><span class="hl-policy">Reconciled with Rajputs</span> — restored their mansabs and privileges</li>`;
    html += `<li>Released <span class="hl-term">Guru Gobind Singh's son</span> from prison</li>`;
    html += `<li>Attempted to win over <span class="hl-term">Sikhs</span> — but relations soured later</li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-people-group text-cyan-400 text-xs"></i> Court Factions</h3>`;
    html += `<p class="content-text">Three major noble factions competed for power:</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-term">Turani (Turan)</span> — Central Asian nobles, mostly Sunni Muslims</li>`;
    html += `<li><span class="hl-term hl-bg-term">Irani (Persian)</span> — Persian nobles, many Shia Muslims</li>`;
    html += `<li><span class="hl-term hl-bg-term">Hindustani (Indian)</span> — Indian Muslims and Rajputs</li>`;
    html += `</ul>`;
    html += `<p class="content-text">
      Bahadur Shah fought campaigns against <span class="hl-term">Marathas</span> and <span class="hl-term">Sikhs</span> but failed to achieve decisive victories. He died in <span class="hl-date">1712</span> at <span class="hl-place">Lahore</span>.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler">Bahadur Shah I</span> was the <span class="hl-event">last Mughal emperor</span> who exercised some degree of independent authority. After his death, the <span class="hl-term">nobles became the real power</span> behind the throne. He attempted to reverse Aurangzeb's orthodox policies but <span class="hl-event">lacked the resources and time</span> to stabilize the empire.</div></div>`;
    html += `</div></section>`;

    // ===== 3. JAHANDAR SHAH =====
    html += `<section id="jahandar-shah">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 3. Jahandar Shah (1712-1713)</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-blue-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Jahandar Shah</span>, son of <span class="hl-ruler">Bahadur Shah I</span>, became emperor with the support of <span class="hl-term">Zulfiqar Khan</span>, the powerful <span class="hl-term">Wazir</span>. He was the <span class="hl-event hl-bg-event">first Mughal ruler to completely abdicate power to a noble</span>.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-right text-cyan-400 text-xs"></i> Role of Zulfiqar Khan</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term hl-bg-ruler">Zulfiqar Khan</span> was the <span class="hl-term">Wazir (Prime Minister)</span> who controlled the entire administration</li>`;
    html += `<li>He adopted a policy of <span class="hl-policy">peace with Rajputs and Marathas</span></li>`;
    html += `<li>Attempted to <span class="hl-policy">restore the Mansabdari system</span> by granting new jagirs</li>`;
    html += `<li>These policies <span class="hl-event">alienated the orthodox nobles</span></li>`;
    html += `</ul>`;
    html += `<p class="content-text">
      Jahandar Shah was <span class="hl-event">murdered by Farrukh Siyar</span> after a brief reign of less than a year in <span class="hl-date">1713</span>. Zulfiqar Khan was also killed.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler">Jahandar Shah's</span> reign marked the <span class="hl-event hl-bg-event">beginning of the era of "Puppet Emperors"</span> in Mughal history. From this point onward, the emperor was a <span class="hl-term">ceremonial figurehead</span> while real power rested with nobles like Zulfiqar Khan and later the <span class="hl-term">Sayyid Brothers</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 4. FARRUKH SIYAR =====
    html += `<section id="farrukh-siyar">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 4. Farrukh Siyar (1713-1719)</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-red-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Farrukh Siyar</span> was the nephew of <span class="hl-ruler">Jahandar Shah</span>. He became emperor with the <span class="hl-event">crucial support of the Sayyid Brothers</span> — <span class="hl-term hl-bg-ruler">Hussain Ali Khan</span> and <span class="hl-term hl-bg-ruler">Abdullah Khan</span>.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-right text-cyan-400 text-xs"></i> Struggle with Sayyid Brothers</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The <span class="hl-term">Sayyid Brothers</span> (King Makers) installed Farrukh Siyar on the throne</li>`;
    html += `<li>They became the <span class="hl-event">real power behind the throne</span> — held all key positions</li>`;
    html += `<li>Farrukh Siyar tried to overthrow them by <span class="hl-term">conspiring with other nobles</span> (e.g., Mir Jumla, Muhammad Shah)</li>`;
    html += `<li>His attempts <span class="hl-event">failed</span> — the Sayyid Brothers discovered the plots</li>`;
    html += `<li>In <span class="hl-date">1719</span>, Farrukh Siyar was <span class="hl-event">deposed, blinded, and murdered</span> by the Sayyid Brothers</li>`;
    html += `</ul>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-event hl-bg-event">murder of Farrukh Siyar (1719)</span> was a turning point. It showed that the emperor was <span class="hl-term">no longer sacrosanct</span> — nobles could now kill and replace emperors at will. This set a dangerous precedent.</div></div>`;
    html += `</div></section>`;

    // ===== 5. THE SAYYID BROTHERS =====
    html += `<section id="sayyid-brothers">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 5. The Sayyid Brothers — The King Makers (1713-1720)</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-purple-500/20">`;
    html += `<p class="content-text">
      <span class="hl-term hl-bg-ruler">Abdullah Khan</span> and <span class="hl-term hl-bg-ruler">Hussain Ali Khan</span> (the <span class="hl-term hl-bg-event">Sayyid Brothers</span>) were two powerful <span class="hl-term">Barha Sayyid</span> nobles who <span class="hl-event">controlled the Mughal court</span> from <span class="hl-date">1713 to 1720</span>. They are known as the <span class="hl-term hl-bg-term">"King Makers"</span> of the Mughal Empire.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-right text-cyan-400 text-xs"></i> Installed & Removed Emperors</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Installed <span class="hl-ruler hl-bg-ruler">Farrukh Siyar</span> (1713) — then deposed and murdered him (1719)</li>`;
    html += `<li>Installed <span class="hl-ruler hl-bg-ruler">Rafi-ud-Darajat</span> (1719) — reigned only <span class="hl-num">~3 months</span>, died of illness</li>`;
    html += `<li>Installed <span class="hl-ruler hl-bg-ruler">Shah Jahan II</span> (1719) — reigned only <span class="hl-num">~2 months</span>, died of illness</li>`;
    html += `<li>Installed <span class="hl-ruler hl-bg-ruler">Muhammad Shah</span> (1719) — the <span class="hl-num">17-year-old</span> prince</li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-circle-info text-cyan-400 text-xs"></i> Downfall</h3>`;
    html += `<p class="content-text">
      <span class="hl-ruler">Muhammad Shah</span>, with the help of <span class="hl-term hl-bg-ruler">Nizam-ul-Mulk</span>, defeated and killed the Sayyid Brothers in <span class="hl-date">1720</span>. Hussain Ali Khan was assassinated, and Abdullah Khan was defeated at the <span class="hl-battle">Battle of Hasanpur (1720)</span> and later poisoned.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term hl-bg-event">Sayyid Brothers</span> demonstrated the <span class="hl-term">extreme weakness of the Mughal emperors</span> after Aurangzeb. Their rise and fall showed that <span class="hl-event">noble factions could make and unmake emperors</span>. This period marked the <span class="hl-term hl-bg-term">lowest point of Mughal imperial prestige</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 6. MUHAMMAD SHAH =====
    html += `<section id="muhammad-shah">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 6. Muhammad Shah (1719-1748) — "Rangeela"</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-orange-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Muhammad Shah</span> was nicknamed <span class="hl-term hl-bg-event">"Rangeela" (the pleasure-loving)</span> for his love of music, art, and entertainment. His reign of <span class="hl-num">29</span> years saw both <span class="hl-event">cultural efflorescence</span> and <span class="hl-event">political catastrophe</span>.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-right text-cyan-400 text-xs"></i> Early Reign</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Became emperor at age <span class="hl-num">17</span> — installed by Sayyid Brothers</li>`;
    html += `<li>Defeated the <span class="hl-term">Sayyid Brothers</span> in <span class="hl-date">1720</span> with help of <span class="hl-ruler hl-bg-ruler">Nizam-ul-Mulk</span></li>`;
    html += `<li><span class="hl-ruler">Nizam-ul-Mulk Asaf Jah I</span> founded the independent <span class="hl-dynasty">Hyderabad state</span> in <span class="hl-date">1724</span> — this was a <span class="hl-event hl-bg-event">major blow to Mughal authority</span></li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-bolt text-cyan-400 text-xs"></i> Nadir Shah's Invasion (1738-1739)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Nadir Shah</span>, the ruler of <span class="hl-place">Persia (Iran)</span>, invaded India in <span class="hl-date">1738</span></li>`;
    html += `<li><span class="hl-battle hl-bg-battle">Battle of Karnal (1739)</span> — Mughal army <span class="hl-event">decisively defeated</span> despite numerical superiority</li>`;
    html += `<li>Nadir Shah entered <span class="hl-place">Delhi</span> and <span class="hl-event hl-bg-event">looted the city</span> — a <span class="hl-event">massacre of ~30,000 people</span></li>`;
    html += `<li>The <span class="hl-arch">Peacock Throne</span> was taken to Persia (used as a symbol of Persian monarchy)</li>`;
    html += `<li>The <span class="hl-term">Kohinoor diamond</span> was taken by Nadir Shah</li>`;
    html += `<li>Nadir Shah <span class="hl-event">annexed all territories west of the Indus</span> (Kabul, Kandahar, Sindh, etc.)</li>`;
    html += `<li>He left India but the <span class="hl-event">Mughal Empire never recovered</span></li>`;
    html += `</ul>`;
    html += `<p class="content-text">
      <span class="hl-event">Decline accelerated rapidly</span> after Nadir Shah's invasion. The empire's <span class="hl-term">military weakness, depleted treasury, and loss of prestige</span> were now apparent to all.
    </p>`;
    html += `<p class="content-text">
      Muhammad Shah died in <span class="hl-date">1748</span>. Despite his weaknesses, he was a <span class="hl-term">patron of arts and culture</span> — Urdu poetry and music flourished during his reign.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-battle hl-bg-battle">Battle of Karnal (1739)</span> and <span class="hl-ruler">Nadir Shah's invasion</span> is one of the <span class="hl-event">most devastating events in Indian history</span>. The <span class="hl-term">Peacock Throne</span> and <span class="hl-term">Kohinoor diamond</span> — symbols of Mughal wealth and power — were lost forever. The <span class="hl-event">Mughal Empire was mortally wounded</span> and never regained its former glory.</div></div>`;
    html += `</div></section>`;

    // ===== 7. AHMAD SHAH BAHADUR =====
    html += `<section id="ahmad-shah">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 7. Ahmad Shah Bahadur (1748-1754)</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Ahmad Shah Bahadur</span> was the son of <span class="hl-ruler">Muhammad Shah</span>. He was a <span class="hl-term">weak and incompetent ruler</span> who was completely dominated by his Wazir, <span class="hl-term hl-bg-ruler">Safdar Jung</span> (the Nawab of Awadh).
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crosshairs text-cyan-400 text-xs"></i> Ahmad Shah Abdali's Invasions</h3>`;

    html += `<li><span class="hl-ruler hl-bg-ruler">Ahmad Shah Abdali (Durrani)</span>, a former general of Nadir Shah, invaded India for the first time in <span class="hl-date">1748</span></li>`;
    html += `<li>He ruled <span class="hl-place">Afghanistan</span> and launched repeated invasions of India</li>`;
    html += `<li>The <span class="hl-term">Mughals could not effectively resist</span> his incursions</li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-right text-cyan-400 text-xs"></i> Rise of Marathas</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>After Nadir Shah's invasion, the <span class="hl-term hl-bg-term">Marathas became the dominant power</span> in Delhi politics</li>`;
    html += `<li>They effectively <span class="hl-event">controlled large parts of North India</span></li>`;
    html += `<li>Ahmad Shah was <span class="hl-event">deposed and blinded</span> in <span class="hl-date">1754</span> by <span class="hl-term">Ghazi-ud-Din Feroze Jung III (Imad-ul-Mulk)</span></li>`;
    html += `</ul>`;
    html += `</div></section>`;

    // ===== 8. ALAMGIR II =====
    html += `<section id="alamgir-ii">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 8. Alamgir II (1754-1759)</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Alamgir II</span> was the son of <span class="hl-ruler">Jahandar Shah</span>. He was placed on the throne by <span class="hl-term hl-bg-ruler">Ghazi-ud-Din Feroze Jung III (Imad-ul-Mulk)</span>, who became the <span class="hl-term">de facto ruler</span>.

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crosshairs text-cyan-400 text-xs"></i> Third Battle of Panipat (1761)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The <span class="hl-battle hl-bg-battle">Third Battle of Panipat (14 January 1761)</span> was fought between the <span class="hl-term">Marathas</span> and <span class="hl-term">Ahmad Shah Abdali (Durrani)</span></li>`;

    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-circle-info text-cyan-400 text-xs"></i> Murder of Alamgir II</h3>`;
    html += `<p class="content-text">
      Alamgir II was <span class="hl-event hl-bg-event">murdered by Ghazi-ud-Din (Imad-ul-Mulk) in 1759</span> — a shocking act that demonstrated the <span class="hl-term">complete moral and political decay</span> of the Mughal nobility.
    </p>`;
    html += `</div></section>`;

    // ===== 9. SHAH ALAM II =====
    html += `<section id="shah-alam">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 9. Shah Alam II (1759-1806) — The Longest Reigning Later Mughal</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-emerald-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Shah Alam II</span> was the son of <span class="hl-ruler">Alamgir II</span>. He reigned for <span class="hl-num">47</span> years (<span class="hl-date">1759-1806</span>) — the <span class="hl-term">longest reign among the Later Mughals</span>. His reign saw the <span class="hl-event hl-bg-event">final transition of power from Mughals to the British</span>.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crosshairs text-cyan-400 text-xs"></i> Battle of Buxar (1764)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Fought on <span class="hl-date">22 October 1764</span> at <span class="hl-place">Buxar (Bihar)</span></li>`;
    html += `<li>The combined forces of <span class="hl-ruler">Shah Alam II</span> (Mughal), <span class="hl-ruler">Shuja-ud-Daulah</span> (Awadh), and <span class="hl-ruler">Mir Qasim</span> (Bengal) were <span class="hl-event">decisively defeated</span> by the <span class="hl-term">British East India Company</span> under <span class="hl-ruler">Major Hector Munro</span></li>`;
    html += `<li>This was a <span class="hl-event hl-bg-event">turning point in Indian history</span> — it established British military supremacy</li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-file-signature text-cyan-400 text-xs"></i> Treaty of Allahabad (1765)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Signed in <span class="hl-date">August 1765</span> between <span class="hl-ruler">Shah Alam II</span> and <span class="hl-ruler">Robert Clive</span> (British East India Company)</li>`;
    html += `<li>The British <span class="hl-event hl-bg-policy">granted the <span class="hl-term">Diwani (right to collect revenue)</span> of Bengal, Bihar, and Orissa</span> to the Company</li>`;
    html += `<li>In return, the Company paid an <span class="hl-term">annual tribute of ₹26 lakh</span> to the emperor</li>`;
    html += `<li>Shah Alam II was to reside at <span class="hl-place">Allahabad</span> under British protection</li>`;
    html += `<li>The emperor became a <span class="hl-term hl-bg-event">British pensioner</span> — a ceremonial figurehead</li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-circle-info text-cyan-400 text-xs"></i> Later Life</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Shah Alam II was <span class="hl-event">blinded in 1788</span> by <span class="hl-term hl-bg-ruler">Ghulam Qadir Rohilla</span> (a Rohilla chief who captured Delhi)</li>`;
    html += `<li>The <span class="hl-term hl-bg-policy">Pitt's India Act (1784)</span> was passed during his reign — established dual control of British Indian affairs</li>`;
    html += `<li>He died a <span class="hl-term">helpless pensioner</span> under British control in <span class="hl-date">1806</span></li>`;
    html += `</ul>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-battle hl-bg-battle">Battle of Buxar (1764)</span> and <span class="hl-policy hl-bg-policy">Treaty of Allahabad (1765)</span> mark the <span class="hl-event hl-bg-event">beginning of British colonial rule in India</span>. The Mughal emperor formally <span class="hl-term">ceded sovereignty over Bengal, Bihar, and Orissa</span> — the richest provinces of the empire. From this point, the Mughal emperor was <span class="hl-term">merely a British puppet</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 10. AKBAR II =====
    html += `<section id="akbar-ii">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 10. Akbar II (1806-1837) — A Ceremonial Emperor</h2>`;
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Akbar II</span>, son of <span class="hl-ruler">Shah Alam II</span>, ruled as a <span class="hl-term">titular emperor</span> with no real power. The British East India Company <span class="hl-event">controlled everything</span> — the emperor was a mere <span class="hl-term">ceremonial figurehead</span>.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-arrow-right text-cyan-400 text-xs"></i> Key Aspects</h3>`;

    html += `<li>British officials <span class="hl-event">treated the emperor with diminishing respect</span></li>`;
    html += `<li>Died in <span class="hl-date">1837</span> — succeeded by his son <span class="hl-ruler">Bahadur Shah Zafar</span></li>`;
    html += `</ul>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">During <span class="hl-ruler">Akbar II's</span> reign, the <span class="hl-dynasty hl-bg-dynasty">Mughal Empire</span> existed <span class="hl-term">only in name</span>. The British had <span class="hl-event">complete control</span> over the emperor's movements, communications, and finances. The Mughal Empire was <span class="hl-term">already dead in practice</span> — only the formal abolition remained.</div></div>`;
    html += `</div></section>`;

    // ===== 11. BAHADUR SHAH ZAFAR =====
    html += `<section id="bahadur-shah-zafar">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crown text-amber-400"></i> 11. Bahadur Shah Zafar (1837-1857) — The Last Mughal Emperor</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-red-500/20">`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Bahadur Shah Zafar</span> was the <span class="hl-event hl-bg-event">LAST Mughal emperor</span>. He was a <span class="hl-term">nominal ruler</span> who reigned only in name under British suzerainty. He was also a noted <span class="hl-term">Urdu poet</span> who wrote poignant verses about his fate.
    </p>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crosshairs text-cyan-400 text-xs"></i> The 1857 War of Independence</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The <span class="hl-battle hl-bg-battle">Indian Rebellion of 1857</span> (also called the <span class="hl-term">Sepoy Mutiny</span> or <span class="hl-term">First War of Independence</span>) began in <span class="hl-date">May 1857</span></li>`;
    html += `<li>Rebel sepoys from <span class="hl-place">Meerut</span> marched to Delhi and <span class="hl-event">proclaimed Bahadur Shah Zafar as the Emperor of Hindustan</span></li>`;
    html += `<li>Zafar <span class="hl-event">reluctantly accepted</span> the leadership of the rebellion</li>`;
    html += `<li>The Red Fort became the <span class="hl-term">headquarters of the rebellion</span></li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-circle-info text-cyan-400 text-xs"></i> Aftermath & Exile</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The British <span class="hl-event">recaptured Delhi in September 1857</span> after fierce fighting</li>`;
    html += `<li>Zafar was <span class="hl-event">tried for rebellion</span> by a British military court</li>`;
    html += `<li>He was <span class="hl-event">exiled to Rangoon (Burma)</span> — never returned to India</li>`;
    html += `<li>He died in exile in <span class="hl-date">1862</span> at the age of <span class="hl-num">87</span></li>`;
    html += `<li>His tomb in <span class="hl-place">Yangon (Rangoon)</span> remains a historic site</li>`;
    html += `</ul>`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-pen-fancy text-cyan-400 text-xs"></i> Poetic Works</h3>`;
    html += `<p class="content-text">
      Bahadur Shah Zafar was a <span class="hl-term">skilled Urdu poet</span>. His most famous couplet, written during his exile, reflects the tragedy of the last Mughal:
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-quote-left"></i> Zafar's Famous Couplet</div><div class="fact-box-content"><em>"Na kisi ki aankh ka noor hoon, na kisi ke dil ka qarar hoon;<br>Jo kisi ke kaam na aa sake, main wo ek musht-e-ghubar hoon."</em><br><br>(I am neither the light of anyone's eye, nor the comfort of anyone's heart;<br>I am that handful of dust that is of no use to anyone.)</div></div>`;
    html += `<p class="content-text">
      With Zafar's exile, the <span class="hl-dynasty hl-bg-dynasty">Mughal Empire</span>, which had ruled India for over <span class="hl-num">330</span> years, <span class="hl-event hl-bg-event">came to a definitive end</span>.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-event hl-bg-event">1857 Rebellion</span> was the <span class="hl-term">last attempt to restore the Mughal Empire</span>. After its failure, the British <span class="hl-term">abolished the Mughal dynasty</span> and transferred power from the East India Company to the <span class="hl-term">British Crown (Queen Victoria)</span> through the <span class="hl-policy hl-bg-policy">Government of India Act, 1858</span>.</div></div>`;
    html += `</div></section>`;

    // ===== 12. CAUSES OF DECLINE =====
    html += `<section id="causes-decline">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-chart-line-down text-red-400"></i> 12. Causes of Decline of the Mughal Empire</h2>`;
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;

    html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;

    // Cause 1
    html += `<div class="bg-black/30 rounded-xl p-3 border border-red-500/20">`;
    html += `<h4 class="text-sm font-bold text-red-400 mb-2"><i class="fa-solid fa-1 mr-1"></i> Weak Successors</h4>`;
    html += `<p class="text-xs text-slate-400 leading-relaxed">After <span class="hl-ruler hl-bg-ruler">Aurangzeb</span> (<span class="hl-date">1707</span>), the Mughal emperors were <span class="hl-term">weak, incompetent, and pleasure-loving</span>. They were controlled by nobles and could not provide strong leadership. <span class="hl-event">12 emperors in 150 years</span> — constant instability at the top.</p></div>`;

    // Cause 2
    html += `<div class="bg-black/30 rounded-xl p-3 border border-red-500/20">`;
    html += `<h4 class="text-sm font-bold text-red-400 mb-2"><i class="fa-solid fa-2 mr-1"></i> Breakdown of Mansabdari & Jagir System</h4>`;
    html += `<p class="text-xs text-slate-400 leading-relaxed">The <span class="hl-term hl-bg-term">Mansabdari system</span> collapsed under its own weight. There were <span class="hl-event">more mansabdars than available jagirs</span> (jagirdari crisis). Nobles became <span class="hl-term">corrupt</span> and revenue collection <span class="hl-event">oppressive</span>. The <span class="hl-term">administrative machinery</span> ground to a halt.</p></div>`;

    // Cause 3
    html += `<div class="bg-black/30 rounded-xl p-3 border border-red-500/20">`;
    html += `<h4 class="text-sm font-bold text-red-400 mb-2"><i class="fa-solid fa-3 mr-1"></i> Economic Depletion</h4>`;
    html += `<p class="text-xs text-slate-400 leading-relaxed"><span class="hl-term">Constant wars</span> (Deccan campaigns, rebellions), <span class="hl-term">lavish spending</span> by nobles, and <span class="hl-term">declining trade</span> depleted the treasury. <span class="hl-ruler">Nadir Shah's</span> invasion (<span class="hl-date">1739</span>) <span class="hl-event">looted immense wealth</span>. Agriculture declined due to oppressive taxation — peasants abandoned land.</p></div>`;

    // Cause 4
