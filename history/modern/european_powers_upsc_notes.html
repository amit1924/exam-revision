<div id="app" class="max-w-6xl mx-auto px-3 sm:px-6 py-4 sm:py-8"></div>

<script>
  const DATA = {
    title: "European Powers in India (1498-1857): Trade, Conquest & Empire",
    location: "NCERT Class 8-12 History, UPSC reference materials",
    last_updated: "2026-06-08",
    source: "NCERT Class 8-12 History, UPSC reference materials",
    chapters: [
      { class: 8, chapter: 2, name: "From Trade to Territory", book: "Our Pasts III" },
      { class: 8, chapter: 4, name: "The Colonial Era in India", book: "Tapestry of the Past" },
      { class: 12, book: "Themes in Indian History", name: "Colonialism Themes" }
    ]
  };

  document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');
    let html = '';

    // ===== HEADER =====
    html += `
      <div class="gradient-top rounded-2xl p-4 sm:p-8 mb-6 border border-indigo-500/20 text-center sm:text-left">
        <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between gap-3">
          <div>
            <div class="flex items-center gap-3 mb-2 justify-center sm:justify-start">
              <i class="fa-solid fa-ship text-2xl sm:text-3xl text-cyan-400"></i>
              <h1 class="text-xl sm:text-3xl font-bold text-white">${DATA.title}</h1>
            </div>
            <p class="text-indigo-300 text-sm flex items-center gap-2 justify-center sm:justify-start">
              <i class="fa-solid fa-book text-rose-400"></i> ${DATA.location}
            </p>
            <p class="text-gray-500 text-xs mt-1">
              <i class="fa-regular fa-calendar mr-1"></i>Updated: ${DATA.last_updated}
            </p>
          </div>
          <div class="flex items-center gap-2 text-xs text-gray-400 bg-black/30 px-4 py-2 rounded-xl border border-gray-700/50 whitespace-nowrap">
            <i class="fa-regular fa-clock"></i>
            <span>359 Years (1498-1857)</span>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">
          <span class="px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-300 text-xs border border-indigo-500/20"><i class="fa-solid fa-check-circle text-emerald-400 mr-1"></i>NCERT Based</span>
          <span class="px-3 py-1 rounded-full bg-amber-500/10 text-amber-300 text-xs border border-amber-500/20"><i class="fa-solid fa-star mr-1"></i>UPSC Level</span>
          <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20"><i class="fa-solid fa-flag mr-1"></i>Zero to Advance</span>
        </div>
      </div>`;

    // ===== NAVIGATION INDEX =====
    html += `
      <div class="mb-6 gradient-card-1 rounded-xl p-4 border border-gray-700/30">
        <h2 class="text-base sm:text-lg font-bold text-white mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list text-indigo-400"></i> Table of Contents
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 text-xs sm:text-sm">
          <a href="#intro" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">1. Introduction — Why Europeans Came</a>
          <a href="#portuguese" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">2. The Portuguese (1498-1961)</a>
          <a href="#dutch" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">3. The Dutch (1602-1825)</a>
          <a href="#english" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">4. The English (1600-1858)</a>
          <a href="#anglo-mysore" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">5. Anglo-Mysore Wars</a>
          <a href="#anglo-maratha" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">6. Anglo-Maratha Wars</a>
          <a href="#anglo-sikh" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">7. Anglo-Sikh Wars</a>
          <a href="#french" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">8. The French (1664-1954)</a>
          <a href="#carnatic" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">9. Carnatic Wars</a>
          <a href="#danes" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">10. The Danes (1620-1845)</a>
          <a href="#admin" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">11. Company Administration</a>
          <a href="#impact" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">12. Impact of British Rule</a>
          <a href="#british-success" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">13. Reasons for British Success</a>
          <a href="#timeline" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">14. Complete Timeline (1498-1857)</a>
          <a href="#upsc-facts" class="text-indigo-300 hover:text-indigo-200 hover:bg-indigo-500/10 rounded-lg p-2 transition">15. UPSC Key Facts at a Glance</a>
        </div>
      </div>`;

    // ===== 1. INTRODUCTION =====
    html += `<section id="intro">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-globe text-emerald-400"></i> 1. Introduction — Why Europeans Came to India</h2>`;
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-gray-700/30">`;
    html += `<p class="content-text">
      India was the <span class="hl-term hl-bg-term">fabled land of riches</span> — spices, textiles, precious stones. Indian <span class="hl-term">cotton, silk, pepper, cloves, cardamom, cinnamon</span> were in extremely high demand in Europe. The traditional <span class="hl-term">land route through the Middle East</span> was controlled by <span class="hl-term">Arab and Italian merchants</span> who maintained a <span class="hl-policy hl-bg-policy">monopoly</span> on the spice trade.
    </p>`;
    html += `<p class="content-text">
      The <span class="hl-event hl-bg-event">Fall of Constantinople (1453)</span> to the <span class="hl-dynasty">Ottoman Turks</span> disrupted traditional trade routes, making them even more expensive and dangerous. This created an urgent need for <span class="hl-term">new sea routes to India</span>. The <span class="hl-term">Renaissance spirit of exploration</span>, combined with technological advances (<span class="hl-term">compass, astrolabe, better ships like the caravel</span>), made long sea voyages possible. European kings <span class="hl-term">sponsored expeditions</span> to break the Italian-Arab monopoly on Eastern trade.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-circle-info"></i> NCERT Key Concept</div><div class="fact-box-content">The coming of Europeans to India is covered in <span class="hl-term">NCERT Class 8 Chapter 2 "From Trade to Territory" (Our Pasts III)</span>. It explains how a <span class="hl-term">trading company</span> — the British East India Company — gradually became the <span class="hl-event">paramount political power</span> in India. The <span class="hl-term hl-bg-term">Age of Exploration</span> was driven by the search for new trade routes after the Ottoman conquest of Constantinople.</div></div>`;
    html += `</div></section>`;

    // ===== 2. THE PORTUGUESE =====
    html += `<section id="portuguese">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-flag text-green-400"></i> 2. The Portuguese (1498-1961)</h2>`;

    // Arrival
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-green-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-ship text-cyan-400 text-xs"></i> Arrival in India</h3>`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Vasco da Gama</span> reached <span class="hl-place">Calicut (Kerala)</span> on <span class="hl-date">May 20, 1498</span> — this was the <span class="hl-event hl-bg-event">first successful sea voyage from Europe to India</span> around Africa, discovering the sea route to India. The expedition was sponsored by <span class="hl-ruler">King Manuel I of Portugal</span>. Their main aim was the <span class="hl-term">spice trade</span> (pepper, cardamom, cinnamon from the Malabar coast). The first <span class="hl-term">factory</span> was established at <span class="hl-place">Calicut</span> in <span class="hl-date">1500</span> by <span class="hl-ruler">Pedro Alvares Cabral</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-user-tie text-cyan-400 text-xs"></i> Portuguese Viceroys & Key Governors</h3>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> Francisco de Almeida (1505-1509)</h4>`;
    html += `<p class="content-text">First Portuguese Viceroy. He formulated the <span class="hl-policy hl-bg-policy">"Blue Water Policy"</span> (cartaze system) — focused on <span class="hl-term">naval dominance</span>, controlling Indian Ocean trade through a system of <span class="hl-term">licenses (cartazes)</span> for ships. Every ship required a Portuguese permit to trade in the Indian Ocean.</p>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> Alfonso de Albuquerque (1509-1515)</h4>`;
    html += `<p class="content-text">Known as the <span class="hl-term hl-bg-term">"Real founder of the Portuguese empire in India"</span>. His major achievements:</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Captured <span class="hl-place hl-bg-place">Goa (1510)</span> from the <span class="hl-dynasty">Bijapur Sultan</span> — it became the Portuguese headquarters in India</li>`;
    html += `<li>Captured <span class="hl-place">Malacca (1511)</span> — controlled the vital spice route from the Far East</li>`;
    html += `<li>Captured <span class="hl-place">Ormuz (1515)</span> — controlled the Persian Gulf</li>`;
    html += `<li>Introduced a <span class="hl-term">permit system</span> for ships to trade in the Indian Ocean</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Abolished sati</span> in Portuguese territories</li>`;
    html += `<li>Encouraged Portuguese men to <span class="hl-term">marry local women</span> (policy of assimilation)</li>`;
    html += `<li>Established factories at <span class="hl-place">Cochin, Cannanore, Daman, Diu</span></li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> Nino da Cunha (1529-1538)</h4>`;
    html += `<p class="content-text">Shifted Portuguese headquarters from <span class="hl-place">Cochin</span> to <span class="hl-place">Goa</span>. Acquired <span class="hl-place">Diu (1535)</span> and <span class="hl-place">Bassein (1534)</span> through treaties with Bahadur Shah of Gujarat.</p>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-user text-cyan-400 text-xs"></i> Joao de Castro (1545-1548)</h4>`;
    html += `<p class="content-text">Restored Portuguese naval power after a period of decline. Known for his <span class="hl-term">military and naval reforms</span>.</p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-map-location-dot text-cyan-400 text-xs"></i> Portuguese Territories & Influence</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Major settlements:</span> <span class="hl-place">Goa</span> (capital), <span class="hl-place">Daman, Diu, Salsette, Bassein, Chaul, Bombay</span></li>`;
    html += `<li><span class="hl-term">East coast:</span> <span class="hl-place">San Thome (Chennai), Hooghly (Bengal)</span></li>`;
    html += `<li><span class="hl-term">Religious influence:</span> Jesuit missions — <span class="hl-ruler">St. Francis Xavier</span> arrived <span class="hl-date">1542</span> to spread Christianity</li>`;
    html += `<li>Notorious <span class="hl-term hl-bg-term">Goa Inquisition (1560-1812)</span> — temple destruction and forced conversions</li>`;
    html += `<li><span class="hl-term">Cultural impact:</span> Introduced <span class="hl-arch">printing press</span>, European architecture, new crops (<span class="hl-term">tobacco, potato, cashew, papaya, guava, pineapple</span>)</li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-chart-line-down text-cyan-400 text-xs"></i> Decline of the Portuguese</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-event">Marathas captured Salsette and Bassein</span> (<span class="hl-date">1739</span>)</li>`;
    html += `<li>Fierce competition from <span class="hl-term">Dutch and English</span> — more efficient trading companies</li>`;
    html += `<li>Decline of Portuguese naval power after the union of Portugal with Spain (<span class="hl-date">1580-1640</span>)</li>`;
    html += `<li><span class="hl-place">Bombay</span> ceded to England (<span class="hl-date">1661</span>) as dowry of <span class="hl-ruler">Catherine of Braganza</span> to <span class="hl-ruler">Charles II</span></li>`;
    html += `<li>Retained only <span class="hl-place">Goa, Daman, Diu</span></li>`;
    html += `<li>Finally <span class="hl-event hl-bg-event">annexed by India in 1961</span> (Operation Vijay)</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The Portuguese were the <span class="hl-term">first Europeans to establish a colonial presence in India</span>. <span class="hl-ruler">Albuquerque's</span> capture of <span class="hl-place">Goa (1510)</span> and <span class="hl-place">Malacca (1511)</span> established Portuguese dominance in the Indian Ocean. The <span class="hl-policy hl-bg-policy">"Blue Water Policy"</span> of <span class="hl-ruler">Almeida</span> and the <span class="hl-term">permit system</span> of <span class="hl-ruler">Albuquerque</span> are frequently asked in UPSC. The <span class="hl-event hl-bg-event">Portuguese declined due to competition from the Dutch and English</span>, who had better organisational structures (joint-stock companies).</div></div>`;
    html += `</div></section>`;

    // ===== 3. THE DUTCH =====
    html += `<section id="dutch">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-flag text-orange-400"></i> 3. The Dutch (1602-1825)</h2>`;
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-orange-500/20">`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-building text-cyan-400 text-xs"></i> Arrival & Establishment</h3>`;
    html += `<p class="content-text">
      The <span class="hl-term hl-bg-term">Dutch East India Company (VOC — Vereenigde Oostindische Compagnie)</span> was formed in <span class="hl-date">1602</span>, the <span class="hl-term">first multinational corporation</span> and the first to issue stock. The first Dutch factory was established at <span class="hl-place">Masulipatnam</span> (<span class="hl-date">1605</span>) on the Coromandel Coast.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Main factories: <span class="hl-place">Pulicat</span> (<span class="hl-date">1610</span> — became main Dutch settlement), <span class="hl-place">Surat</span>, <span class="hl-place">Cochin</span>, <span class="hl-place">Nagapatnam</span>, <span class="hl-place">Chinsurah (Bengal)</span></li>`;
    html += `<li>Main focus: <span class="hl-term">spice trade from Maluku</span> (nutmeg, cloves, mace), <span class="hl-term">Malabar pepper</span>, <span class="hl-term">Coromandel textiles</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crossed-swords text-cyan-400 text-xs"></i> Anglo-Dutch Rivalry</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Dutch <span class="hl-event">expelled the Portuguese from the Malabar coast</span> (<span class="hl-date">1663</span> — capture of <span class="hl-place">Cochin</span>)</li>`;
    html += `<li>Dutch became <span class="hl-event">dominant in the spice trade</span>, especially in Indonesia (Dutch East Indies)</li>`;
    html += `<li>Anglo-Dutch rivalry in India — the Dutch were <span class="hl-term">more numerous than the English</span> till the mid-<span class="hl-date">18th century</span></li>`;
    html += `</ul>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-chart-line-down text-cyan-400 text-xs"></i> Decline of the Dutch</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>The Dutch <span class="hl-event">focused more on Indonesia</span> (Dutch East Indies) than India, where spices were more profitable</li>`;
    html += `<li>The Carnatic Wars and the <span class="hl-event">Anglo-French struggle</span> weakened the Dutch position in India</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Treaty of Vienna (1815)</span>: Dutch ceded all Indian possessions to the British</li>`;
    html += `<li>By <span class="hl-date">1825</span>, the Dutch had <span class="hl-event hl-bg-event">completely left India</span></li>`;
    html += `<li><span class="hl-place">Batavia (Jakarta)</span> became the Dutch headquarters for the East Indies</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-term hl-bg-term">Dutch East India Company (VOC)</span> was the <span class="hl-term">first joint-stock company</span> and the <span class="hl-term">most valuable company in history</span>. The Dutch were <span class="hl-term">more powerful than the English in India until the mid-18th century</span>, but they <span class="hl-event">chose to focus on Indonesia</span> rather than India. Their factories at <span class="hl-place">Pulicat</span> and <span class="hl-place">Chinsurah</span> are important locations. The <span class="hl-policy hl-bg-policy">Treaty of Vienna (1815)</span> finally ended Dutch presence in India.</div></div>`;
    html += `</div></section>`;

    // ===== 4. THE ENGLISH =====
    html += `<section id="english">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-flag text-blue-400"></i> 4. The English (1600-1858)</h2>`;

    // East India Company
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-blue-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-building text-cyan-400 text-xs"></i> East India Company (EIC) — Foundation</h3>`;
    html += `<p class="content-text">
      The English East India Company was <span class="hl-event hl-bg-event">founded on December 31, 1600</span> — a charter granted by <span class="hl-ruler">Queen Elizabeth I</span>. Its full name was <span class="hl-term">"Governor and Company of Merchants of London Trading into the East Indies"</span>. The first voyage was commanded by <span class="hl-ruler">Sir James Lancaster</span> (<span class="hl-date">1601</span>). <span class="hl-ruler">Captain William Hawkins</span> arrived at Emperor <span class="hl-ruler">Jahangir's</span> court (<span class="hl-date">1609</span>) and obtained permission to establish a factory at <span class="hl-place">Surat</span>.
    </p>`;
    html += `<p class="content-text">
      <span class="hl-ruler hl-bg-ruler">Sir Thomas Roe</span> visited <span class="hl-ruler">Jahangir's</span> court (<span class="hl-date">1615-1618</span>) as the first English ambassador — he <span class="hl-event">secured trade concessions</span> and laid the <span class="hl-term">foundation for English trade in India</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-warehouse text-cyan-400 text-xs"></i> Early Factories in India</h3>`;
    html += `<div class="table-wrap"><table><thead><tr><th>Factory</th><th>Year</th><th>Details</th></tr></thead><tbody>`;
    html += `<tr><td><span class="hl-place">Surat</span></td><td><span class="hl-date">1613</span></td><td>First English factory in India — established through Sir Thomas Roe's efforts</td></tr>`;
    html += `<tr><td><span class="hl-place">Masulipatnam</span></td><td><span class="hl-date">1616</span></td><td>On the Coromandel Coast</td></tr>`;
    html += `<tr><td><span class="hl-place">Madras</span></td><td><span class="hl-date">1639</span></td><td><span class="hl-arch">Fort St. George</span> — obtained from the Raja of Chandragiri; became Madras Presidency</td></tr>`;
    html += `<tr><td><span class="hl-place">Bombay</span></td><td><span class="hl-date">1661</span></td><td>Received as dowry of <span class="hl-ruler">Catherine of Braganza</span> to <span class="hl-ruler">Charles II</span>; given to EIC in <span class="hl-date">1668</span>; became Bombay Presidency</td></tr>`;
    html += `<tr><td><span class="hl-place">Hooghly</span></td><td><span class="hl-date">1651</span></td><td>First English factory in Bengal</td></tr>`;
    html += `<tr><td><span class="hl-place">Calcutta</span></td><td><span class="hl-date">1690</span></td><td>Founded by <span class="hl-ruler">Job Charnock</span>; <span class="hl-arch">Fort William</span> built <span class="hl-date">1696</span>; became Calcutta Presidency</td></tr>`;
    html += `</tbody></table></div>`;

    html += `<p class="content-text mt-2">
      The Company had <span class="hl-term">three Presidencies</span>: <span class="hl-term">Madras (1640)</span>, <span class="hl-term">Bombay (1668)</span>, and <span class="hl-term">Calcutta (1690)</span> — each under a Governor.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-users-between-lines text-cyan-400 text-xs"></i> Conflict with Bengal Nawabs</h3>`;
    html += `<p class="content-text">
      Emperor <span class="hl-ruler">Farrukh Siyar's</span> <span class="hl-policy hl-bg-policy">firman (1717)</span> granted the EIC <span class="hl-term">duty-free trade in Bengal</span> and the right to issue <span class="hl-term">dastaks</span> (passes). However, Bengal Nawabs like <span class="hl-ruler">Murshid Quli Khan</span>, <span class="hl-ruler">Alivardi Khan</span>, and <span class="hl-ruler">Sirajuddaulah</span> <span class="hl-event">resisted the EIC's misuse</span> of these trade privileges.
    </p>`;
    html += `<p class="content-text">
      The <span class="hl-event hl-bg-event">Black Hole Tragedy (1756)</span>: <span class="hl-ruler">Sirajuddaulah</span> captured Calcutta; prisoners were confined in a small dungeon, and many died of suffocation. This incident became a <span class="hl-term">pretext for war</span>.
    </p>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crossed-swords text-cyan-400 text-xs"></i> Battle of Plassey (1757)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler hl-bg-ruler">Robert Clive</span> conspired with <span class="hl-ruler">Mir Jafar</span> (Sirajuddaulah's commander) to overthrow the Nawab</li>`;
    html += `<li>Fought <span class="hl-date">June 23, 1757</span> at <span class="hl-place">Plassey (Palashi)</span>, near Murshidabad</li>`;
    html += `<li><span class="hl-ruler">Mir Jafar</span> did not fight; <span class="hl-ruler hl-bg-event">Sirajuddaulah was defeated and killed</span></li>`;
    html += `<li><span class="hl-ruler">Mir Jafar</span> became the Nawab of Bengal — a <span class="hl-term">puppet ruler</span></li>`;
    html += `<li>The EIC gained <span class="hl-event hl-bg-event">immense wealth and political influence</span></li>`;
    html += `<li>This was the <span class="hl-term">first major military victory of the Company in India</span></li>`;
    html += `<li><span class="hl-ruler">Clive</span> became the Governor of Bengal</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-battle hl-bg-battle">Battle of Plassey (1757)</span> is considered the <span class="hl-term hl-bg-term">foundation of British rule in India</span>. It was <span class="hl-event">more a conspiracy than a battle</span> — Clive had secured Mir Jafar's betrayal beforehand. The EIC's victory gave it <span class="hl-term">unlimited access to Bengal's wealth</span>, which was used to finance further British expansion across India.</div></div>`;

    html += `<h3 class="subsection-heading"><i class="fa-solid fa-crossed-swords text-cyan-400 text-xs"></i> Battle of Buxar (1764)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Fought <span class="hl-date">October 22, 1764</span> at <span class="hl-place">Buxar</span></li>`;
    html += `<li>The combined forces of <span class="hl-ruler">Mir Qasim</span> (Nawab of Bengal), <span class="hl-ruler">Shuja-ud-Daulah</span> (Nawab of Awadh), and Mughal Emperor <span class="hl-ruler">Shah Alam II</span> vs the British under <span class="hl-ruler">Major Hector Munro</span></li>`;
    html += `<li>The British won a <span class="hl-event hl-bg-event">decisive victory</span></li>`;
    html += `</ul>`;

    html += `<h4 class="subsection-heading" style="font-size:0.9rem;"><i class="fa-solid fa-file-signature text-cyan-400 text-xs"></i> Treaty of Allahabad (1765)</h4>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler">Shah Alam II</span> granted the <span class="hl-policy hl-bg-policy">Diwani</span> (right to collect revenue) of <span class="hl-place">Bengal, Bihar, and Orissa</span> to the EIC</li>`;
    html += `<li>The Company agreed to pay Rs. <span class="hl-num">26 lakh</span> per year to the Mughal emperor as tribute</li>`;
    html += `<li>Awadh became a <span class="hl-policy">subsidiary ally</span> of the Company</li>`;
    html += `<li>The EIC became the <span class="hl-event hl-bg-event">de facto ruler of Bengal</span> — a political power, not just a trading company</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-battle hl-bg-battle">Battle of Buxar (1764)</span> and the <span class="hl-policy hl-bg-policy">Treaty of Allahabad (1765)</span> were <span class="hl-term hl-bg-term">more important than Plassey</span> in establishing British political supremacy. The <span class="hl-policy hl-bg-policy">Diwani of Bengal</span> gave the Company <span class="hl-term">direct access to the vast revenues of Bengal</span>, which it used to finance its wars of expansion across India.</div></div>`;
    html += `</div></section>`;

    // ===== 5. ANGLO-MYSORE WARS =====
    html += `<section id="anglo-mysore">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crossed-swords text-red-400"></i> 5. Anglo-Mysore Wars (1767-1799)</h2>`;

    // First
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-1 text-cyan-400 text-xs"></i> First Anglo-Mysore War (1767-1769)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler">Hyder Ali</span> vs British, Marathas, and Nizam</li>`;
    html += `<li>Hyder Ali <span class="hl-event">almost captured Madras</span> — the British were forced to negotiate</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Treaty of Madras (1769)</span>: status quo restored; mutual restitution of conquests</li>`;
    html += `</ul>`;
    html += `</div>`;

    // Second
    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-2 text-cyan-400 text-xs"></i> Second Anglo-Mysore War (1780-1784)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler">Hyder Ali</span> formed a coalition with the <span class="hl-term">Marathas and Nizam</span></li>`;
    html += `<li><span class="hl-battle hl-bg-battle">Battle of Pollilur (1780)</span>: <span class="hl-ruler">Tipu Sultan</span> <span class="hl-event">defeated the British</span> — worst British defeat in India till then</li>`;
    html += `<li><span class="hl-ruler">Sir Eyre Coote</span> defeated Hyder Ali at <span class="hl-battle">Porto Novo (1781)</span></li>`;
    html += `<li><span class="hl-ruler">Hyder Ali</span> died (<span class="hl-date">1782</span>); <span class="hl-ruler hl-bg-ruler">Tipu Sultan</span> continued the war</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Treaty of Mangalore (1784)</span>: status quo — <span class="hl-term">Tipu's greatest diplomatic victory</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    // Third
    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-3 text-cyan-400 text-xs"></i> Third Anglo-Mysore War (1790-1792)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler">Tipu Sultan</span> invaded <span class="hl-place">Travancore</span> (a British ally)</li>`;
    html += `<li><span class="hl-ruler">Lord Cornwallis</span> led the British forces personally</li>`;
    html += `<li>Tipu was <span class="hl-event">defeated</span>; <span class="hl-policy hl-bg-policy">Treaty of Srirangapatnam (1792)</span></li>`;
    html += `<li>Tipu <span class="hl-event">ceded half his territory</span> and paid an indemnity of Rs. <span class="hl-num">3.3 crore</span></li>`;
    html += `<li>His two sons were taken as <span class="hl-term">hostages</span> by the British</li>`;
    html += `</ul>`;
    html += `</div>`;

    // Fourth
    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-red-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-4 text-cyan-400 text-xs"></i> Fourth Anglo-Mysore War (1799)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-ruler">Lord Wellesley</span> was Governor-General</li>`;
    html += `<li>The British attacked <span class="hl-place">Mysore</span> from all sides</li>`;
    html += `<li><span class="hl-event hl-bg-event">Tipu Sultan died</span> defending <span class="hl-place">Srirangapatnam</span> on <span class="hl-date">May 4, 1799</span></li>`;
    html += `<li>Mysore was divided between the <span class="hl-term">British, Nizam, and the restored Wodeyar dynasty</span></li>`;
    html += `<li><span class="hl-event hl-bg-event">End of the Mysore threat</span> to British supremacy in India</li>`;
    html += `</ul>`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content"><span class="hl-ruler hl-bg-ruler">Tipu Sultan</span> is remembered as a <span class="hl-term">fierce anti-colonial ruler</span> who resisted the British until his death. He was known as the <span class="hl-term">"Tiger of Mysore"</span>. His innovative use of <span class="hl-term">rockets (Mysorean rockets)</span> and his <span class="hl-term">modern administration</span> are important. The <span class="hl-battle hl-bg-battle">Battle of Pollilur (1780)</span> and the <span class="hl-policy hl-bg-policy">Treaty of Mangalore (1784)</span> are key events. His <span class="hl-event hl-bg-event">death at Srirangapatnam (1799)</span> marked the end of the only serious challenge to British power in South India.</div></div>`;
    html += `</div>`;

    // Subsidiary Alliance
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-file-contract text-cyan-400 text-xs"></i> Subsidiary Alliance — Lord Wellesley (1798-1805)</h3>`;
    html += `<p class="content-text">
      The <span class="hl-policy hl-bg-policy">Subsidiary Alliance</span> was a system under which Indian rulers had to:
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Maintain <span class="hl-term">British troops in their territory</span></li>`;
    html += `<li>Pay a <span class="hl-term">subsidy</span> for the maintenance of those troops</li>`;
    html += `<li>Not allowed to have an <span class="hl-term">independent foreign policy</span></li>`;
    html += `<li>Not employ <span class="hl-term">Europeans</span> without British approval</li>`;
    html += `</ul>`;
    html += `<p class="content-text">
      First accepted by the <span class="hl-term">Nizam of Hyderabad (1798)</span>. Others who accepted: <span class="hl-term">Mysore, Awadh, Peshwa</span> (Treaty of Bassein <span class="hl-date">1802</span>), Rajput states, Scindia, Bhonsle.
    </p>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-policy hl-bg-policy">Subsidiary Alliance</span> was <span class="hl-ruler">Lord Wellesley's</span> masterstroke — it made Indian rulers <span class="hl-term">puppets of the British</span> while technically preserving their thrones. The <span class="hl-policy hl-bg-policy">Treaty of Bassein (1802)</span> with Peshwa <span class="hl-ruler">Baji Rao II</span> was the most significant, as it <span class="hl-event">led to the Anglo-Maratha Wars</span> and the eventual British takeover of the Maratha territories.</div></div>`;
    html += `</div></section>`;

    // ===== 6. ANGLO-MARATHA WARS =====
    html += `<section id="anglo-maratha">`;
    html += `<h2 class="section-heading"><i class="fa-solid fa-crossed-swords text-red-400"></i> 6. Anglo-Maratha Wars (1775-1819)</h2>`;

    html += `<div class="gradient-card-2 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-1 text-cyan-400 text-xs"></i> First Anglo-Maratha War (1775-1782)</h3>`;
    html += `<p class="content-text"><span class="hl-event">Cause:</span> British supported <span class="hl-ruler">Raghunathrao (Raghoba)</span> against Peshwa <span class="hl-ruler">Madhavrao II</span></p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-policy">Treaty of Surat (1775)</span>: Raghunathrao ceded <span class="hl-place">Salsette & Bassein</span> to British</li>`;
    html += `<li><span class="hl-policy">Treaty of Purandhar (1776)</span>: annulled Treaty of Surat</li>`;
    html += `<li><span class="hl-battle hl-bg-battle">Battle of Wadgaon (1779)</span>: Marathas defeated the British</li>`;
    html += `<li><span class="hl-policy hl-bg-policy">Treaty of Salbai (1782)</span>: status quo; British retained Salsette</li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-3 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-2 text-cyan-400 text-xs"></i> Second Anglo-Maratha War (1803-1805)</h3>`;
    html += `<p class="content-text"><span class="hl-event">Cause:</span> <span class="hl-policy hl-bg-policy">Treaty of Bassein (1802)</span> — Peshwa <span class="hl-ruler">Baji Rao II</span> accepted subsidiary alliance</p>`;
    html += `<ul class="bullet-list">`;
    html += `<li><span class="hl-term">Scindia and Bhonsle</span> opposed the treaty; war followed</li>`;
    html += `<li>British victories: <span class="hl-battle hl-bg-battle">Battle of Delhi (1803)</span> — capture of Delhi; <span class="hl-battle hl-bg-battle">Laswari (1803)</span>; <span class="hl-battle hl-bg-battle">Assaye (1803)</span> — the latter won by <span class="hl-ruler">Arthur Wellesley</span> (future Duke of Wellington)</li>`;
    html += `<li><span class="hl-ruler">Shah Alam II</span> became a British pensioner</li>`;
    html += `<li><span class="hl-policy">Treaty of Rajghat (1805)</span> with Holkar</li>`;
    html += `<li>Outcome: <span class="hl-event">Scindia and Bhonsle lost significant territories</span></li>`;
    html += `</ul>`;
    html += `</div>`;

    html += `<div class="gradient-card-4 rounded-xl p-4 sm:p-5 mb-4 border border-rose-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-3 text-cyan-400 text-xs"></i> Third Anglo-Maratha War (1817-1819)</h3>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Governor-General: <span class="hl-ruler">Lord Hastings</span></li>`;
    html += `<li>Peshwa <span class="hl-ruler">Baji Rao II</span> attacked British residency at <span class="hl-place">Poona (Pune)</span> in <span class="hl-date">1817</span></li>`;
    html += `<li>British defeated Peshwa at <span class="hl-battle hl-bg-battle">Khadki (Kirkee)</span> and <span class="hl-battle">Koregaon (1818)</span></li>`;
    html += `<li>Maratha chiefs <span class="hl-term">Scindia, Holkar, Bhonsle</span> defeated one by one</li>`;
    html += `<li><span class="hl-event hl-bg-event">Baji Rao II surrendered (1818)</span>; Peshwaship abolished</li>`;
    html += `<li><span class="hl-event hl-bg-event">Maratha Empire dissolved</span>; territories annexed to British India</li>`;
    html += `<li>British <span class="hl-term">paramountcy established</span> over the entire subcontinent</li>`;
    html += `</ul>`;
    html += `</div>`;

    // Doctrine of Lapse
    html += `<div class="gradient-card-1 rounded-xl p-4 sm:p-5 mb-4 border border-amber-500/20">`;
    html += `<h3 class="subsection-heading"><i class="fa-solid fa-file-circle-xmark text-cyan-400 text-xs"></i> Doctrine of Lapse — Lord Dalhousie (1848-1856)</h3>`;
    html += `<p class="content-text">
      Under this policy, if an Indian ruler died <span class="hl-term">without a male heir</span>, his kingdom would <span class="hl-event">"lapse" to the British</span>. The ruler could not adopt a successor without British approval.
    </p>`;
    html += `<ul class="bullet-list">`;
    html += `<li>Annexed states: <span class="hl-place">Satara (1848)</span>, <span class="hl-place">Jaitpur</span>, <span class="hl-place">Sambalpur</span>, <span class="hl-place">Udaipur (1852)</span>, <span class="hl-place">Jhansi (1854)</span>, <span class="hl-place">Nagpur (1854)</span></li>`;
    html += `<li><span class="hl-place">Awadh (1856)</span> was annexed on grounds of <span class="hl-term">"misgovernment"</span> — not through Doctrine of Lapse</li>`;
    html += `<li><span class="hl-ruler">Rani Lakshmibai</span> of Jhansi was <span class="hl-event">denied adoption rights</span> — a major cause of the <span class="hl-date">1857</span> Rebellion</li>`;
    html += `</ul>`;
    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-policy hl-bg-policy">Doctrine of Lapse</span> was the <span class="hl-term hl-bg-term">most aggressive British annexation policy</span> before 1857. It <span class="hl-event">alienated the Indian ruling class</span> and was a leading cause of the <span class="hl-battle hl-bg-battle">Revolt of 1857</span>. <span class="hl-ruler">Rani Lakshmibai's</span> Jhansi annexation and <span class="hl-ruler">Nana Saheb's</span> pension denial were direct consequences.</div></div>`;
    html += `</div></section>`;

    // ===== 7. ANGLO-SIKH WARS =====
    html += `<section id="anglo-sikh">`;

    html += `<div class="fact-box"><div class="fact-box-title"><i class="fa-solid fa-star"></i> UPSC Key Point</div><div class="fact-box-content">The <span class="hl-event hl-bg-event">Anglo-French rivalry in India (Carnatic Wars)</span> was decisive in determining which European power would dominate India. <span class="hl-ruler">Robert Clive's</span> capture of <span class="hl-place">Arcot (1751)</span> and <span class="hl-battle hl-bg-battle">Battle of Wandiwash (1760)</span> were turning points. The <span class="hl-policy hl-bg-policy">Treaty of Paris (1763)</span> ended French political ambitions in India. <span class="hl-ruler">Dupleix</span> is considered the <span class="hl-term">French equivalent of Clive</span> — he established French influence but was <span class="hl-event">recalled due to lack of support from France</span>.</div></div>`;
